<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPS E1/E2 — Atelier timeline émotionnelle</title>
<link rel="stylesheet" href="assets/cps_kit.css?v=20260618-simple">
<style>
.cps{max-width:800px}
.cps-prompt .cps-img,.cps-lesson .cps-img{max-height:420px;width:auto}
@media (max-width:640px){
  .cps{max-width:100%;padding:12px}
  .cps-prompt .cps-img,.cps-lesson .cps-img{max-height:300px}
}
</style>
</head>
<body>
<div id="cps-app"></div>
<script src="assets/cps_kit.js?v=20260618-simple"></script>
<script>
var IMG = {
  declencheur:"assets/emotions/scenes/timeline-card-1-declencheur.jpg",
  emotion:"assets/emotions/scenes/timeline-card-2-emotion.jpg",
  corps:"assets/emotions/scenes/timeline-card-3-corps.jpg",
  strategie:"assets/emotions/scenes/timeline-card-4-strategie.jpg",
  resultat:"assets/emotions/scenes/timeline-card-5-resultat.jpg",
  respirer:"assets/emotions/scenes/timeline-strategy-respiration.jpg",
  telephone:"assets/emotions/scenes/timeline-strategy-evitement-telephone.jpg",
  aide:"assets/emotions/scenes/timeline-strategy-demander-aide.jpg",
  oral:"assets/emotions/scenes/scene-peur-oral.png",
  colere:"assets/emotions/scenes/scene-colere-atelier.png",
  tristesse:"assets/emotions/scenes/scene-tristesse-recre.png",
  joie:"assets/emotions/scenes/scene-joie-reussite.png",
  besoin:"assets/emotions/e1-1/mecanisme-besoin.jpg",
  action:"assets/emotions/e1-1/mecanisme-action.jpg",
  stress:"assets/emotions/e2-3/diagnostic-stress-bd.jpg",
  signaux:"assets/emotions/e2-3/signaux-corps-stress.jpg",
  moi:"assets/emotions/e2-3/strategies-agir-sur-moi.jpg",
  probleme:"assets/emotions/e2-3/strategies-agir-sur-probleme.jpg",
  reussite:"assets/emotions/e1-jury/dossier-reussite-feedback.jpg",
  exclusion:"assets/emotions/e1-jury/dossier-exclusion-groupe.jpg",
  consigne:"assets/emotions/e1-jury/dossier-consigne-securite.jpg",
  fierte:"assets/emotions/e1-vocab/nuance-fierte-feedback.jpg"
};

var PIECE = function(bonne){
  return [
    {"l":"Déclencheur : ce qui arrive","ok":bonne==="declencheur"},
    {"l":"Émotion : le mot précis","ok":bonne==="emotion"},
    {"l":"Corps + intensité","ok":bonne==="corps"},
    {"l":"Besoin touché","ok":bonne==="besoin"},
    {"l":"Stratégie choisie","ok":bonne==="strategie"},
    {"l":"Résultat vérifié","ok":bonne==="resultat"}
  ];
};
var CHOIX_STRAT = function(bonne){
  return [
    {"l":"Agir sur moi","ok":bonne==="moi"},
    {"l":"Agir sur le problème","ok":bonne==="probleme"},
    {"l":"Message-je","ok":bonne==="message"},
    {"l":"Faire durer le positif","ok":bonne==="positif"},
    {"l":"Piège qui aggrave","ok":bonne==="piege"}
  ];
};
var EMOTIONS = function(bonne){
  return [
    {"l":"Peur / stress / inquiétude","ok":bonne==="peur"},
    {"l":"Colère / frustration","ok":bonne==="colere"},
    {"l":"Tristesse / solitude","ok":bonne==="tristesse"},
    {"l":"Joie / fierté","ok":bonne==="joie"}
  ];
};
var BD = function(label,bubbles,note,people){
  return {"panels":[{"label":label,"people":people||[{"name":"Noa"},{"name":"A","side":"right"}],"bubbles":bubbles,"note":note}]};
};
var CARTES = function(bonne){
  return [
    {"img":IMG.declencheur,"alt":"Noa reçoit une information stressante","l":"Déclencheur","ok":bonne==="declencheur","ex":"Oui : c'est l'événement qui lance la réaction."},
    {"img":IMG.emotion,"alt":"Noa cherche à nommer son émotion","l":"Émotion","ok":bonne==="emotion","ex":"Oui : il met un mot sur ce qu'il ressent."},
    {"img":IMG.corps,"alt":"Noa ressent les signes corporels du stress","l":"Corps","ok":bonne==="corps","ex":"Oui : souffle, poitrine, épaules et tension donnent des indices."},
    {"img":IMG.besoin,"alt":"schéma d'un besoin touché par l'émotion","l":"Besoin","ok":bonne==="besoin","ex":"Oui : le besoin aide à comprendre ce qui compte."},
    {"img":IMG.strategie,"alt":"Noa prépare ses notes","l":"Stratégie","ok":bonne==="strategie","ex":"Oui : il choisit une action au lieu de rester bloqué."},
    {"img":IMG.resultat,"alt":"Noa semble plus calme","l":"Résultat","ok":bonne==="resultat","ex":"Oui : on vérifie l'effet de la stratégie."}
  ];
};

CPS.init({
  "theme":"emo",
  "code":"E1 + E2",
  "ref":"Identifier, exprimer et réguler ses émotions et son stress",
  "icon":"🧭",
  "title":"Atelier timeline émotionnelle",
  "subtitle":"Analyser une situation, choisir une stratégie, vérifier l'effet.",
  "parcours":[
    {
      "temps":"decouvre",
      "type":"lesson",
      "title":"💡 Une émotion se comprend dans le temps",
      "audio":"Dans cet atelier, tu suis Noa, un personnage fictif. Tu vas reconstruire une timeline émotionnelle complète : déclencheur, émotion, corps, besoin, stratégie, résultat. L'objectif est de ne pas répondre au hasard : on observe, on nomme, on choisit, puis on vérifie l'effet.",
      "blocks":[
        {"ic":"🎭","html":"On travaille avec <strong>Noa</strong>, un personnage fictif : pas besoin de raconter une situation personnelle."},
        {"img":IMG.stress,"alt":"mini BD d'un élève qui analyse son stress","html":"La timeline transforme une réaction floue en enquête : qu'est-ce qui arrive, qu'est-ce que je ressens, de quoi ai-je besoin ?"},
        {"ic":"🎬","html":"<strong>Déclencheur</strong> : l'événement qui lance l'émotion. Ce n'est pas encore la réaction."},
        {"ic":"🧠","html":"<strong>Émotion</strong> : le mot précis. Stress, peur, frustration, solitude, fierté..."},
        {"img":IMG.signaux,"alt":"élèves montrant des signaux corporels de stress","html":"<strong>Corps + intensité</strong> : souffle, ventre, mains, posture. L'intensité aide à choisir le bon moment pour agir."},
        {"ic":"❤️","html":"<strong>Besoin</strong> : clarté, sécurité, respect, lien, aide, reconnaissance, calme."},
        {"ic":"🧰","html":"<strong>Stratégie</strong> : agir sur moi, agir sur le problème, parler en message-je, ou faire durer une émotion agréable."},
        {"ic":"✅","html":"<strong>Résultat</strong> : je vérifie si ça aide vraiment. Si non, j'ajuste."}
      ],
      "cta":"▶️ Je commence les missions"
    },

    {
      "temps":"entraine",
      "type":"imagepick",
      "tag":"Mission 1",
      "instr":"Associe chaque morceau de la timeline à la bonne image.",
      "items":[
        {"text":"Cherche le déclencheur : ce qui vient d'arriver et met Noa sous pression.","options":CARTES("declencheur")},
        {"text":"Cherche l'émotion : Noa commence à mettre un mot sur ce qu'il vit.","options":CARTES("emotion")},
        {"text":"Cherche le corps : les signaux physiques sont les plus visibles.","options":CARTES("corps")},
        {"text":"Cherche le besoin : ce qui compte derrière l'émotion.","options":CARTES("besoin")},
        {"text":"Cherche la stratégie : Noa choisit une action utile.","options":CARTES("strategie")},
        {"text":"Cherche le résultat : Noa vérifie l'effet de ce qu'il a fait.","options":CARTES("resultat")}
      ]
    },

    {
      "temps":"entraine",
      "type":"cardpick",
      "variant":"quiz",
      "tag":"Mission 2",
      "instr":"Dans la situation, quelle pièce de la timeline est mise en avant ?",
      "demo":{
        "comic":BD("Annonce",[
          {"who":"right","text":"Demain, tu parleras devant le groupe."},
          {"who":"left","text":"C'est l'information qui lance la réaction."}
        ],"On repère d'abord ce qui arrive."),
        "text":"Noa découvre qu'il devra parler devant le groupe demain.",
        "opts":PIECE("declencheur"),
        "ex":"C'est le déclencheur : l'information qui met la situation sous pression."
      },
      "items":[
        {
          "comic":BD("Signaux physiques",[
            {"who":"left","kind":"warn","text":"Mon souffle devient court."},
            {"who":"left","text":"Mes épaules se tendent."}
          ],"Le corps donne des indices sur l'intensité.",[{"name":"Noa"}]),
          "text":"Noa sent son souffle devenir court et ses épaules se tendre.",
          "opts":PIECE("corps"),
          "ex":"Ce sont les signaux du corps. Ils indiquent aussi l'intensité."
        },
        {
          "comic":BD("Ce qui compte",[
            {"who":"left","kind":"warn","text":"Je ne sais pas exactement ce qu'on attend de moi."},
            {"who":"right","text":"Le besoin touché est la clarté."}
          ],"Le besoin explique pourquoi l'émotion prend de la place."),
          "text":"Derrière son stress, Noa a surtout besoin de clarté : il ne sait pas ce qu'on attend de lui.",
          "opts":PIECE("besoin"),
          "ex":"Le besoin touché explique pourquoi la situation compte autant."
        },
        {
          "comic":BD("Mot précis",[
            {"who":"left","text":"Stress ? Peur ? Honte ?"},
            {"who":"left","kind":"good","text":"Je choisis : inquiétude."}
          ],"Préciser le mot aide à choisir la suite.",[{"name":"Noa","tone":"calm"}]),
          "text":"Noa hésite entre stress, peur et honte. Il choisit finalement : « inquiétude ».",
          "opts":PIECE("emotion"),
          "ex":"Il affine le mot émotionnel. Le mot précis aide à mieux choisir la suite."
        },
        {
          "comic":BD("Plan d'action",[
            {"who":"left","kind":"good","text":"Je respire lentement."},
            {"who":"left","text":"Puis j'écris trois idées pour mon oral."}
          ],"La stratégie agit sur le corps puis sur le problème.",[{"name":"Noa","tone":"calm"}]),
          "text":"Noa respire lentement, puis écrit trois idées pour son oral.",
          "opts":PIECE("strategie"),
          "ex":"C'est la stratégie : il agit sur son corps et sur le problème."
        },
        {
          "comic":BD("Vérification",[
            {"who":"left","kind":"good","text":"Avant : 8/10."},
            {"who":"left","text":"Après dix minutes : 5/10."}
          ],"On vérifie l'effet réel de la stratégie.",[{"name":"Noa","tone":"calm"}]),
          "text":"Après dix minutes, Noa vérifie : son stress est passé de 8/10 à 5/10.",
          "opts":PIECE("resultat"),
          "ex":"C'est le résultat. On vérifie l'effet réel au lieu de supposer."
        }
      ]
    },

    {
      "temps":"entraine",
      "type":"cardpick",
      "variant":"quiz",
      "tag":"Mission 3",
      "instr":"Choisis la stratégie la plus adaptée à la timeline.",
      "items":[
        {
          "img":IMG.corps,
          "alt":"Noa a le souffle court",
          "text":"Timeline : déclencheur repéré, émotion nommée, intensité 8/10. Noa risque de parler trop vite.",
          "opts":CHOIX_STRAT("moi"),
          "ex":"À forte intensité, agir sur soi d'abord est souvent utile : respirer, pause courte, redescendre."
        },
        {
          "img":IMG.consigne,
          "alt":"élève inquiet face à une consigne de sécurité",
          "text":"Timeline : l'émotion vient surtout d'une consigne floue. Besoin touché : clarté et sécurité.",
          "opts":CHOIX_STRAT("probleme"),
          "ex":"Ici, on agit sur le problème : demander une précision ou organiser la première étape."
        },
        {
          "img":IMG.exclusion,
          "alt":"élève à l'écart d'un groupe",
          "text":"Timeline : tristesse et frustration. Besoin touché : lien et participation.",
          "opts":CHOIX_STRAT("message"),
          "ex":"Un message-je peut aider : je ressens..., quand..., j'aimerais participer à..."
        },
        {
          "img":IMG.reussite,
          "alt":"élève fier après un retour positif",
          "text":"Timeline : réussite, fierté, énergie. Besoin rempli : reconnaissance.",
          "opts":CHOIX_STRAT("positif"),
          "ex":"Ici, on fait durer le positif : savourer, remercier, garder une trace, refaire ce qui marche."
        },
        {
          "img":IMG.telephone,
          "alt":"Noa regarde son téléphone tard le soir",
          "text":"Timeline : Noa évite son stress jusqu'à tard avec son téléphone. Résultat probable : fatigue demain.",
          "opts":CHOIX_STRAT("piege"),
          "ex":"C'est un piège : soulagement court, mais fatigue et stress plus forts ensuite."
        }
      ]
    },

    {
      "temps":"situation",
      "type":"order",
      "title":"🧩 Mission 4 — Reconstruis la timeline complète",
      "instr":"Clique les cartes dans l'ordre. Il y a maintenant six étapes.",
      "audio":"Remets les cartes dans le bon ordre : déclencheur, émotion, corps et intensité, besoin, stratégie, résultat.",
      "steps":[
        "Déclencheur : une information met Noa sous pression.",
        "Émotion : Noa nomme ce qu'il ressent avec un mot précis.",
        "Corps + intensité : Noa repère souffle court, tension, niveau de stress.",
        "Besoin : Noa comprend ce qui compte, par exemple clarté ou sécurité.",
        "Stratégie : Noa choisit une action adaptée.",
        "Résultat : Noa vérifie si la stratégie a aidé."
      ],
      "stepImages":[IMG.declencheur, IMG.emotion, IMG.corps, IMG.besoin, IMG.strategie, IMG.resultat],
      "stepAlts":[
        "Noa reçoit une information",
        "Noa nomme son émotion",
        "Noa repère son corps",
        "besoin derrière l'émotion",
        "Noa choisit une stratégie",
        "Noa vérifie le résultat"
      ]
    },

    {
      "temps":"situation",
      "type":"scenario",
      "tag":"Mission 5",
      "scenes":[
        {
          "img":IMG.oral,
          "alt":"élève tendu avant un oral",
          "text":"Oral dans dix minutes. L'élève a le ventre serré, pense qu'il va rater, et son stress est à 8/10.",
          "audio":"Oral dans dix minutes. L'élève a le ventre serré, pense qu'il va rater, et son stress est à huit sur dix.",
          "choices":[
            {
              "l":"Je fais d'abord redescendre le corps, puis je prépare trois idées simples.",
              "good":true,
              "fb":"Oui. Intensité forte : agir sur soi d'abord, puis agir sur le problème."
            },
            {
              "l":"Je regarde mon téléphone jusqu'au dernier moment pour oublier.",
              "good":false,
              "fb":"Ça peut soulager quelques secondes, mais ça évite la préparation et peut augmenter le stress."
            },
            {
              "l":"Je me dis que je suis nul et je ne fais rien.",
              "good":false,
              "fb":"La pensée aggrave l'émotion. La timeline sert justement à retrouver une action possible."
            }
          ]
        },
        {
          "img":IMG.colere,
          "alt":"élève en colère devant un travail cassé",
          "text":"Un camarade a déplacé ton matériel. Ton travail est abîmé. Tu sens la colère monter.",
          "audio":"Un camarade a déplacé ton matériel. Ton travail est abîmé. Tu sens la colère monter.",
          "choices":[
            {
              "l":"Je respire, puis je formule : « Je ressens de la colère quand mon matériel est déplacé. J'ai besoin qu'on répare ou qu'on prévienne. »",
              "good":true,
              "fb":"Très bien. Tu combines régulation du corps, besoin de respect/réparation et message-je."
            },
            {
              "l":"Je l'accuse directement devant tout le monde.",
              "good":false,
              "fb":"La colère est compréhensible, mais l'accusation risque d'aggraver la situation."
            },
            {
              "l":"Je ne dis rien et je garde tout pour moi.",
              "good":false,
              "fb":"Le silence peut laisser le besoin non traité. Il faut une forme d'expression constructive."
            }
          ]
        },
        {
          "img":IMG.reussite,
          "alt":"élève fier après une réussite",
          "text":"Tu réussis une tâche difficile et ton professeur le remarque. Tu ressens de la fierté.",
          "audio":"Tu réussis une tâche difficile et ton professeur le remarque. Tu ressens de la fierté.",
          "choices":[
            {
              "l":"Je savoure le moment, je remercie, et je retiens ce qui m'a aidé à réussir.",
              "good":true,
              "fb":"Oui. La timeline sert aussi pour les émotions agréables : on les fait durer et on capitalise."
            },
            {
              "l":"Je dis que c'est rien et je passe à autre chose.",
              "good":false,
              "fb":"Tu minimises. La fierté peut devenir confiance si tu la laisses exister."
            },
            {
              "l":"Je compare tout de suite avec ceux qui ont moins bien réussi.",
              "good":false,
              "fb":"Comparer peut abîmer le lien. On peut être fier sans écraser les autres."
            }
          ]
        }
      ]
    },

    {
      "temps":"point",
      "type":"wrap",
      "keep":[
        {"ic":"🧭","html":"Une timeline complète aide à voir : <strong>déclencheur → émotion → corps/intensité → besoin → stratégie → résultat</strong>."},
        {"ic":"🔎","html":"On ne choisit pas une stratégie au hasard : l'intensité et le besoin guident la décision."},
        {"ic":"❤️","html":"Si l'intensité est forte, je peux agir sur moi d'abord : pause, respiration, mouvement, soutien."},
        {"ic":"🧩","html":"Si le problème est clair, je peux agir dessus : demander une précision, préparer, organiser, réparer."},
        {"ic":"💬","html":"Si un besoin relationnel est touché, le message-je aide à exprimer sans accuser."},
        {"ic":"🌤️","html":"Si l'émotion est agréable, je peux la faire durer : savourer, partager, remercier, garder une trace."}
      ],
      "self":[
        "Je sais reconstruire une timeline émotionnelle complète.",
        "Je sais repérer déclencheur, émotion, corps, besoin, stratégie et résultat.",
        "Je sais choisir une stratégie selon l'intensité et le besoin.",
        "Je sais éviter une réaction piège qui aggrave.",
        "Je sais utiliser la timeline avec une émotion agréable ou désagréable."
      ]
    }
  ]
});
</script>
</body>
</html>
