<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPS E1/E2 — Atelier timeline émotionnelle</title>
<link rel="stylesheet" href="assets/cps_kit.css">
<style>
.cps{max-width:920px}
.cps-head{border-radius:18px}
.cps-lesson .cps-img{max-height:380px;width:auto}
.cps-prompt .cps-img{max-height:340px;width:auto}
.cps-prompt .tx{max-width:700px;margin:0 auto}
@media (max-width:640px){
  .cps{max-width:100%;padding:12px}
  .cps-lesson .cps-img{max-height:none}
  .cps-prompt .cps-img{max-height:280px}
}
</style>
</head>
<body>
<div id="cps-app"></div>
<script src="assets/cps_kit.js"></script>
<script>
var IMG = {
  declencheur:"assets/emotions/scenes/timeline-card-1-declencheur.jpg",
  emotion:"assets/emotions/scenes/timeline-card-2-emotion.jpg",
  corps:"assets/emotions/scenes/timeline-card-3-corps.jpg",
  strategie:"assets/emotions/scenes/timeline-card-4-strategie.jpg",
  resultat:"assets/emotions/scenes/timeline-card-5-resultat.jpg",
  respirer:"assets/emotions/scenes/timeline-strategy-respiration.jpg",
  telephone:"assets/emotions/scenes/timeline-strategy-evitement-telephone.jpg",
  aide:"assets/emotions/scenes/timeline-strategy-demander-aide.jpg",
  oral:"assets/emotions/scenes/scene-peur-oral.png",
  colere:"assets/emotions/scenes/scene-colere-atelier.png",
  tristesse:"assets/emotions/scenes/scene-tristesse-recre.png",
  joie:"assets/emotions/scenes/scene-joie-reussite.png"
};

var ETAPES = function(bonne){
  return [
    {"l":"1. Déclencheur","ok":bonne==="declencheur"},
    {"l":"2. Émotion","ok":bonne==="emotion"},
    {"l":"3. Corps","ok":bonne==="corps"},
    {"l":"4. Stratégie","ok":bonne==="strategie"},
    {"l":"5. Résultat","ok":bonne==="resultat"}
  ];
};
var INDICE = function(bonne){
  return [
    {"l":"Le souffle est court ou bloqué","ok":bonne==="souffle"},
    {"l":"Le visage ou les épaules sont tendus","ok":bonne==="tension"},
    {"l":"Le corps redescend avec une respiration lente","ok":bonne==="calme"},
    {"l":"La fatigue augmente avec le téléphone tard","ok":bonne==="fatigue"}
  ];
};
var STRATEGIES = function(bonne){
  return [
    {"l":"❤️ Utile : j'agis sur mon corps","ok":bonne==="corps"},
    {"l":"🧩 Utile : j'agis sur le problème","ok":bonne==="probleme"},
    {"l":"⚠️ Piège : ça peut aggraver","ok":bonne==="piege"}
  ];
};
var EMOTIONS = function(bonne){
  return [
    {"l":"😨 Peur ou stress","ok":bonne==="peur"},
    {"l":"😡 Colère","ok":bonne==="colere"},
    {"l":"😢 Tristesse","ok":bonne==="tristesse"},
    {"l":"😀 Joie","ok":bonne==="joie"}
  ];
};
var CARTES_TIMELINE = function(bonne){
  return [
    {"img":IMG.declencheur,"alt":"Noa regarde son téléphone et semble inquiet","l":"Carte mélangée","ok":bonne==="declencheur","ex":"Oui : cette carte montre l'événement qui déclenche l'émotion."},
    {"img":IMG.emotion,"alt":"Noa pose une main sur sa tête","l":"Carte mélangée","ok":bonne==="emotion","ex":"Oui : cette carte montre le moment où Noa ressent et nomme l'émotion."},
    {"img":IMG.corps,"alt":"Noa pose une main sur sa poitrine","l":"Carte mélangée","ok":bonne==="corps","ex":"Oui : cette carte montre les signaux du corps."},
    {"img":IMG.strategie,"alt":"Noa prépare ses notes","l":"Carte mélangée","ok":bonne==="strategie","ex":"Oui : cette carte montre une stratégie pour agir."},
    {"img":IMG.resultat,"alt":"Noa semble plus calme avec son sac","l":"Carte mélangée","ok":bonne==="resultat","ex":"Oui : cette carte montre le résultat après la stratégie."}
  ];
};
var CARTES_STRATEGIES = function(bonne){
  return [
    {"img":IMG.respirer,"alt":"Noa respire lentement","l":"Carte stratégie","ok":bonne==="respirer","ex":"Oui : respirer lentement agit sur le corps."},
    {"img":IMG.strategie,"alt":"Noa prépare ses notes","l":"Carte stratégie","ok":bonne==="preparer","ex":"Oui : préparer quelques idées agit sur le problème."},
    {"img":IMG.aide,"alt":"Noa demande de l'aide à une adulte","l":"Carte stratégie","ok":bonne==="aide","ex":"Oui : demander de l'aide permet de clarifier ce qui bloque."},
    {"img":IMG.telephone,"alt":"Noa regarde son téléphone tard dans son lit","l":"Carte piège","ok":bonne==="telephone","ex":"Oui : le téléphone tard peut soulager vite, mais il peut aggraver fatigue et stress."}
  ];
};

CPS.init({
  "theme":"emo",
  "code":"E1.2 + E2.3",
  "ref":"Identifier ses émotions et réguler son stress",
  "icon":"🧭",
  "title":"Atelier timeline émotionnelle",
  "subtitle":"Voir, nommer, comprendre, choisir une action.",
  "parcours":[
    {
      "temps":"decouvre",
      "type":"lesson",
      "title":"💡 Une émotion se déroule en plusieurs étapes",
      "audio":"Dans cet atelier, tu suis Noa, un personnage fictif. Tu vas apprendre à voir le déclencheur, nommer l'émotion, écouter les signaux du corps, choisir une stratégie, puis regarder le résultat.",
      "blocks":[
        {"ic":"🎭","html":"On travaille avec <strong>Noa</strong>, un personnage fictif. Tu n'es pas obligé de raconter ta vie."},
        {"img":IMG.declencheur,"alt":"Noa regarde son téléphone et semble inquiet","html":"<strong>1. Déclencheur</strong> : quelque chose arrive. Ici, Noa reçoit une information qui le met sous pression."},
        {"img":IMG.emotion,"alt":"Noa a la main sur la tête, visage inquiet","html":"<strong>2. Émotion</strong> : Noa peut mettre un mot sur ce qu'il ressent : stress, peur, inquiétude."},
        {"img":IMG.corps,"alt":"Noa a la main sur la poitrine et respire difficilement","html":"<strong>3. Corps</strong> : son corps donne des indices : respiration courte, épaules tendues, main sur la poitrine."},
        {"img":IMG.strategie,"alt":"Noa respire et prépare ses notes","html":"<strong>4. Stratégie</strong> : Noa agit. Il respire, puis il prépare quelques idées."},
        {"img":IMG.resultat,"alt":"Noa porte son sac et semble plus calme","html":"<strong>5. Résultat</strong> : il n'est pas magique, mais il se sent plus prêt."}
      ],
      "cta":"▶️ Je commence les missions"
    },
    {
      "temps":"entraine",
      "type":"imagepick",
      "tag":"Mission 1",
      "instr":"Images mélangées — Retrouve la bonne carte dans le désordre.",
      "items":[
        {
          "text":"Retrouve le déclencheur : la carte où quelque chose arrive et met Noa sous pression.",
          "options":CARTES_TIMELINE("declencheur")
        },
        {
          "text":"Retrouve l'émotion : la carte où Noa commence à sentir et comprendre ce qu'il ressent.",
          "options":CARTES_TIMELINE("emotion")
        },
        {
          "text":"Retrouve le corps : la carte où les signes physiques du stress sont les plus visibles.",
          "options":CARTES_TIMELINE("corps")
        },
        {
          "text":"Retrouve la stratégie : la carte où Noa fait quelque chose pour ne pas rester bloqué.",
          "options":CARTES_TIMELINE("strategie")
        },
        {
          "text":"Retrouve le résultat : la carte où Noa semble plus calme et prêt à agir.",
          "options":CARTES_TIMELINE("resultat")
        }
      ]
    },
    {
      "temps":"entraine",
      "type":"cardpick",
      "variant":"quiz",
      "instr":"Mission 2 — Lis le corps. Quel indice vois-tu surtout ?",
      "items":[
        {
          "img":IMG.corps,
          "alt":"Noa respire difficilement avec la main sur la poitrine",
          "text":"Noa a une main sur la poitrine. Des traits montrent que son souffle bouge vite.",
          "opts":INDICE("souffle"),
          "ex":"Oui : le souffle est un indice important du stress."
        },
        {
          "img":IMG.emotion,
          "alt":"Noa a le visage inquiet et les épaules lourdes",
          "text":"Regarde son visage et sa posture.",
          "opts":INDICE("tension"),
          "ex":"Oui : visage fermé, épaules lourdes, main sur la tête montrent la tension."
        },
        {
          "img":IMG.respirer,
          "alt":"Noa respire lentement avec une main sur le ventre",
          "text":"Noa se pose et accompagne sa respiration.",
          "opts":INDICE("calme"),
          "ex":"Oui : la respiration lente peut aider le corps à redescendre."
        },
        {
          "img":IMG.telephone,
          "alt":"Noa regarde son téléphone tard le soir dans son lit",
          "text":"Il est tard. Noa reste sur son téléphone et semble fatigué.",
          "opts":INDICE("fatigue"),
          "ex":"Oui : le téléphone tard peut augmenter la fatigue et rendre le stress plus difficile à gérer."
        }
      ]
    },
    {
      "temps":"entraine",
      "type":"imagepick",
      "tag":"Mission 3",
      "instr":"Images mélangées — Choisis la réaction qui correspond le mieux.",
      "items":[
        {
          "text":"Noa veut d'abord calmer son corps. Quelle image montre la meilleure action ?",
          "options":CARTES_STRATEGIES("respirer")
        },
        {
          "text":"Noa veut rendre son oral moins flou. Quelle image agit sur le problème ?",
          "options":CARTES_STRATEGIES("preparer")
        },
        {
          "text":"Noa ne comprend pas exactement la consigne. Quelle image montre une stratégie utile ?",
          "options":CARTES_STRATEGIES("aide")
        },
        {
          "text":"Quelle image montre une réaction piège : elle soulage sur le moment, mais peut aggraver demain ?",
          "options":CARTES_STRATEGIES("telephone")
        }
      ]
    },
    {
      "temps":"situation",
      "type":"order",
      "title":"🧩 Mission 4 — Reconstruis la BD",
      "instr":"Clique les cartes dans le bon ordre. Observe l'image avant de lire.",
      "audio":"Remets les cartes dans le bon ordre : déclencheur, émotion, corps, stratégie, résultat.",
      "steps":[
        "Une information met Noa sous pression.",
        "Noa nomme ce qu'il ressent : stress, peur, inquiétude.",
        "Noa repère les signes du corps : souffle court, épaules tendues.",
        "Noa choisit une stratégie : respirer et préparer ses idées.",
        "Noa se sent plus calme et prêt à agir."
      ],
      "stepImages":[IMG.declencheur, IMG.emotion, IMG.corps, IMG.strategie, IMG.resultat],
      "stepAlts":[
        "Noa regarde son téléphone",
        "Noa pose une main sur sa tête",
        "Noa respire difficilement",
        "Noa prépare ses notes",
        "Noa semble plus calme avec son sac"
      ]
    },
    {
      "temps":"situation",
      "type":"cardpick",
      "variant":"quiz",
      "instr":"Mission 5 — Transfert : dans une autre image, quelle émotion est probablement présente ?",
      "items":[
        {
          "img":IMG.oral,
          "alt":"Un élève passe à l'oral devant la classe",
          "text":"L'élève passe devant la classe. Son corps semble tendu.",
          "opts":EMOTIONS("peur"),
          "ex":"Oui : peur ou stress. La suite utile peut être : respirer, préparer, demander une précision."
        },
        {
          "img":IMG.colere,
          "alt":"Une élève serre les poings devant son travail cassé",
          "text":"Son travail est cassé. Elle serre les poings.",
          "opts":EMOTIONS("colere"),
          "ex":"Oui : colère. Elle signale souvent un besoin de respect ou de réparation."
        },
        {
          "img":IMG.tristesse,
          "alt":"Une élève est assise seule dans la cour",
          "text":"L'élève est seule, épaules basses, regard baissé.",
          "opts":EMOTIONS("tristesse"),
          "ex":"Oui : tristesse. Elle peut signaler un besoin de lien ou de soutien."
        },
        {
          "img":IMG.joie,
          "alt":"Un élève réussit un travail en atelier",
          "text":"L'élève a réussi son travail. Son corps montre de l'énergie.",
          "opts":EMOTIONS("joie"),
          "ex":"Oui : joie. Les émotions agréables donnent aussi des informations sur ce qui nous fait du bien."
        }
      ]
    },
    {
      "temps":"point",
      "type":"wrap",
      "keep":[
        {"ic":"🧭","html":"Une timeline émotionnelle aide à voir : <strong>déclencheur → émotion → corps → stratégie → résultat</strong>."},
        {"ic":"🗣️","html":"Nommer l'émotion aide souvent à diminuer son intensité."},
        {"ic":"👤","html":"Le corps donne des indices : souffle, épaules, ventre, mains, visage."},
        {"ic":"❤️","html":"Je peux agir sur <strong>moi</strong> : respirer, bouger, faire une pause, parler."},
        {"ic":"🧩","html":"Je peux agir sur <strong>le problème</strong> : préparer, organiser, demander de l'aide."},
        {"ic":"🤝","html":"On peut s'entraîner avec un personnage fictif sans raconter une situation intime."}
      ],
      "self":[
        "Je sais repérer le déclencheur d'une émotion.",
        "Je sais nommer l'émotion probable dans une image.",
        "Je sais repérer au moins un signe du corps.",
        "Je connais une stratégie qui agit sur moi.",
        "Je connais une stratégie qui agit sur le problème.",
        "Je peux reconstruire une timeline émotionnelle simple."
      ]
    }
  ]
});
</script>
</body>
</html>
