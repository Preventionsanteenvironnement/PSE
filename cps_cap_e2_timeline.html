<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPS E1/E2 — Timeline émotionnelle</title>
<link rel="stylesheet" href="assets/cps_kit.css">
<style>
.cps{max-width:860px}
.cps-lesson .cps-img{max-height:420px;width:auto}
.cps-prompt .tx{max-width:680px;margin:0 auto}
@media (max-width:640px){
  .cps{max-width:100%;padding:12px}
  .cps-lesson .cps-img{max-height:none}
}
</style>
</head>
<body>
<div id="cps-app"></div>
<script src="assets/cps_kit.js"></script>
<script>
var ETAPES = function(bonne){
  return [
    {"l":"1. Déclencheur","ok":bonne==="declencheur"},
    {"l":"2. Émotion","ok":bonne==="emotion"},
    {"l":"3. Corps","ok":bonne==="corps"},
    {"l":"4. Stratégie","ok":bonne==="strategie"},
    {"l":"5. Résultat","ok":bonne==="resultat"}
  ];
};
var AXES = function(bonne){
  return [
    {"l":"❤️ J'agis sur moi","ok":bonne==="moi"},
    {"l":"🧩 J'agis sur le problème","ok":bonne==="probleme"}
  ];
};

CPS.init({
  "theme":"emo",
  "code":"E1.2 + E2.3",
  "ref":"Identifier ses émotions et réguler son stress",
  "icon":"🧭",
  "title":"Timeline émotionnelle",
  "subtitle":"Remettre dans l'ordre ce qui se passe pour mieux agir.",
  "parcours":[
    {
      "temps":"decouvre",
      "type":"lesson",
      "title":"💡 Une émotion a une histoire",
      "audio":"Une émotion ne tombe pas du ciel. Il y a d'abord une situation. Ensuite tu ressens une émotion. Ton corps réagit. Puis tu peux choisir une stratégie. Enfin tu observes si tu vas un peu mieux.",
      "blocks":[
        {"ic":"🎬","html":"Une <strong>situation</strong> arrive : c'est le <strong>déclencheur</strong>."},
        {"ic":"🧠","html":"Tu peux ensuite <strong>nommer l'émotion</strong> : stress, peur, colère, tristesse, joie..."},
        {"ic":"👤","html":"Ton <strong>corps</strong> donne des indices : respiration, ventre, épaules, mains, chaleur."},
        {"img":"assets/emotions/scenes/timeline-emotionnelle-stress-cap.png","alt":"Mini bande dessinée en cinq images : un élève stressé repère son émotion, respire, prépare ses notes puis se sent prêt","html":"Observe cette timeline émotionnelle <em>(clique l'image pour l'agrandir)</em>."},
        {"ic":"🛠️","html":"Une <strong>stratégie utile</strong> peut agir sur toi ou sur le problème : respirer, organiser, demander de l'aide, préparer."},
        {"ic":"✅","html":"À la fin, tu regardes le <strong>résultat</strong> : suis-je plus calme ? prêt à agir ? ai-je besoin d'aide ?"}
      ],
      "cta":"▶️ Je m'entraîne"
    },
    {
      "temps":"entraine",
      "type":"cardpick",
      "variant":"quiz",
      "instr":"Lis l'exemple. Quelle étape de la timeline est-ce ?",
      "items":[
        {
          "em":"📱",
          "text":"Noa reçoit un message : demain, il présente son travail devant la classe.",
          "opts":ETAPES("declencheur"),
          "ex":"C'est le déclencheur : la situation qui démarre l'émotion."
        },
        {
          "em":"😟",
          "text":"Noa se dit : « Je suis stressé, j'ai peur de me tromper. »",
          "opts":ETAPES("emotion"),
          "ex":"Il nomme son émotion. Mettre un mot aide déjà à réguler."
        },
        {
          "em":"💓",
          "text":"Noa respire vite. Ses épaules sont tendues. Il serre son stylo.",
          "opts":ETAPES("corps"),
          "ex":"Ce sont des signaux du corps. Ils montrent que le stress est monté."
        },
        {
          "em":"🌬️",
          "text":"Noa respire lentement puis écrit trois idées importantes sur une feuille.",
          "opts":ETAPES("strategie"),
          "ex":"C'est une stratégie : il agit sur son corps et sur le problème."
        },
        {
          "em":"🙂",
          "text":"Noa se sent plus calme. Il sait par quoi commencer son oral.",
          "opts":ETAPES("resultat"),
          "ex":"C'est le résultat : le stress n'a pas disparu, mais il est plus gérable."
        }
      ]
    },
    {
      "temps":"situation",
      "type":"order",
      "title":"🪜 Reconstitue la timeline de Noa",
      "instr":"Clique les étapes dans le bon ordre.",
      "audio":"Remets dans l'ordre : situation, émotion, corps, stratégie, résultat.",
      "steps":[
        "Noa apprend qu'il doit passer à l'oral demain.",
        "Noa nomme ce qu'il ressent : stress et inquiétude.",
        "Noa repère les signaux : respiration rapide, épaules tendues.",
        "Noa respire lentement et prépare trois idées sur une feuille.",
        "Noa se sent plus calme et prêt à commencer."
      ]
    },
    {
      "temps":"entraine",
      "type":"cardpick",
      "variant":"sort",
      "instr":"Cette stratégie agit surtout sur toi, ou sur le problème ?",
      "items":[
        {
          "em":"🌬️",
          "text":"Je respire lentement pendant une minute.",
          "opts":AXES("moi"),
          "ex":"Tu agis sur ton corps et ton émotion. C'est agir sur toi."
        },
        {
          "em":"📝",
          "text":"Je prépare trois idées simples avant de parler.",
          "opts":AXES("probleme"),
          "ex":"Tu réduis la difficulté concrète. C'est agir sur le problème."
        },
        {
          "em":"🛟",
          "text":"Je demande à l'adulte de répéter la consigne.",
          "opts":AXES("probleme"),
          "ex":"Tu clarifies ce qui bloque. Demander de l'aide est une stratégie efficace."
        },
        {
          "em":"🚶",
          "text":"Je fais une courte pause et je relâche mes épaules.",
          "opts":AXES("moi"),
          "ex":"Tu aides ton corps à redescendre. C'est agir sur toi."
        },
        {
          "em":"🎒",
          "text":"La veille du stage, je prépare mon sac, ma tenue et mon trajet.",
          "opts":AXES("probleme"),
          "ex":"Tu diminues les imprévus. C'est agir sur le problème."
        }
      ]
    },
    {
      "temps":"situation",
      "type":"scenario",
      "tag":"Tu décides",
      "scenes":[
        {
          "text":"Avant ton premier jour de PFMP, tu sens le stress monter. Que fais-tu d'abord ?",
          "choices":[
            {"l":"Je nomme : je suis stressé, c'est normal.","good":true,"fb":"Oui. Nommer l'émotion permet de reprendre un peu de contrôle."},
            {"l":"Je fais comme si je ne ressentais rien.","good":false,"fb":"Ignorer l'émotion peut la rendre plus forte. La reconnaître aide davantage."}
          ]
        },
        {
          "text":"Tu as identifié ton stress. Quelle action est la plus utile ?",
          "choices":[
            {"l":"Je respire lentement puis je vérifie mon sac et mon trajet.","good":true,"fb":"Très bien : tu agis sur toi et sur le problème."},
            {"l":"Je scrolle tard pour ne plus y penser.","good":false,"fb":"Ça peut soulager sur le moment, mais le manque de sommeil augmente souvent le stress."}
          ]
        },
        {
          "text":"Le lendemain, tu es encore un peu stressé. Comment interpréter ça ?",
          "choices":[
            {"l":"C'est normal. Je peux être stressé et agir quand même.","good":true,"fb":"Exactement. L'objectif n'est pas zéro stress, mais un stress gérable."},
            {"l":"Si je suis stressé, c'est que je vais forcément rater.","good":false,"fb":"Le stress n'annonce pas l'échec. C'est un signal, pas une condamnation."}
          ]
        }
      ]
    },
    {
      "temps":"point",
      "type":"wrap",
      "keep":[
        {"ic":"🧭","html":"Une timeline émotionnelle aide à voir : <strong>déclencheur → émotion → corps → stratégie → résultat</strong>."},
        {"ic":"🗣️","html":"Nommer l'émotion diminue souvent son intensité et aide à choisir une action."},
        {"ic":"❤️","html":"On peut agir sur <strong>soi</strong> : respirer, bouger, se poser, parler."},
        {"ic":"🧩","html":"On peut agir sur <strong>le problème</strong> : préparer, organiser, demander de l'aide."},
        {"ic":"🤝","html":"On ne force jamais quelqu'un à raconter une émotion intime : on peut travailler avec un personnage fictif."}
      ],
      "self":[
        "Je sais remettre les étapes d'une émotion dans l'ordre.",
        "Je sais nommer au moins un signal du corps lié au stress.",
        "Je connais une stratégie pour agir sur moi.",
        "Je connais une stratégie pour agir sur le problème."
      ]
    }
  ]
});
</script>
</body>
</html>
