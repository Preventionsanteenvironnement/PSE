<!DOCTYPE html>
<html lang="fr">
<head>

<title>Communication — Réussir un oral / un entretien</title>
<link rel="stylesheet" href="assets/comm_kit.css?v=20260622">
</head>
<body>
<div id="comm-app"></div>
<script src="assets/comm_kit.js?v=20260622"></script>
<script>
COMM.init({
  icon:"💼", title:"Réussir un oral / un entretien", subtitle:"Apprendre à communiquer · examen, stage, emploi",
  finalIc:"💼", finalTitle:"Bien joué", finalSub:"Vous êtes prêt pour votre oral ou votre entretien.", badge:"Prêt le jour J",
  steps:[
    { type:"intro", text:"Un <strong>oral d’examen</strong> (projet, chef-d’œuvre) ou un <strong>entretien</strong> (stage, emploi) se prépare. Bien préparé, vous montrez le meilleur de vous-même. Voici comment." },

    { type:"notion",
      teach:"Le vrai secret d’un oral ou d’un entretien réussi : la <strong>préparation</strong>. On prépare sa présentation, on anticipe les questions, et on s’entraîne à voix haute.",
      q:"Pour réussir un oral ou un entretien, l’essentiel, c’est…",
      options:[
        {l:"bien se préparer et s’entraîner avant",ok:true},
        {l:"tout improviser le jour J",ok:false},
        {l:"compter sur la chance",ok:false}
      ],
      wrong:"Pas tout à fait : l’improvisation totale et la chance sont risquées. C’est la préparation qui rassure et fait la différence.",
      good:"Exactement. Préparer et s’entraîner, c’est l’essentiel du travail — le jour J devient plus facile." },

    { type:"cases",
      teach:"<strong>Se présenter</strong> : en quelques phrases, on dit qui on est et ce qu’on sait faire.",
      q:"On vous dit « Présentez-vous. » Comment commencer ?",
      items:[
        { text:"Le jury (ou le recruteur) attend votre présentation.",
          options:[
            {l:"Mon prénom, ma formation, et ce que je sais faire ou ce qui m’intéresse",good:true,fb:"Oui : clair et structuré, on sait tout de suite qui vous êtes."},
            {l:"« Euh… je sais pas trop quoi dire. »",good:false,fb:"Sans préparation, on perd l’occasion de se mettre en valeur."},
            {l:"Je raconte toute ma vie dans le désordre",good:false,fb:"Trop long et confus : le jury se perd."}
          ] }
      ] },

    { type:"order",
      intro:"Une présentation orale claire suit un <strong>ordre simple</strong>. Remettez les étapes en place.",
      goal:"Le déroulé de ma présentation",
      steps:[
        {l:"Je donne des exemples concrets (ce que j’ai fait)",pos:3},
        {l:"Je me présente : qui je suis",pos:1},
        {l:"Je conclus et je remercie",pos:4},
        {l:"Je présente mon sujet ou mon parcours",pos:2}
      ],
      hint:"Pas encore : cherchez ce qui vient maintenant.",
      done:"Bravo : présentation, sujet, exemples, conclusion. Un déroulé clair, facile à suivre." },

    { type:"cases",
      teach:"<strong>Répondre aux questions</strong> : on écoute, on prend un court temps, puis on répond clairement. Et on reste honnête.",
      q:"Comment réagir aux questions ?",
      items:[
        { text:"Le jury vous pose une question.",
          options:[
            {l:"J’écoute jusqu’au bout, je prends deux secondes, puis je réponds clairement",good:true,fb:"Oui : écouter et prendre un temps évite de répondre à côté."},
            {l:"Je coupe pour répondre tout de suite, au hasard",good:false,fb:"Couper et répondre au hasard donne une mauvaise impression."},
            {l:"Je panique et je me tais",good:false,fb:"Un court silence pour réfléchir, oui ; le blocage total, non — respirez."}
          ] },
        { text:"Le jury pose une question dont vous ignorez la réponse.",
          options:[
            {l:"« Je ne suis pas sûr, mais je dirais… » ou « Je ne sais pas, mais je peux chercher. »",good:true,fb:"Oui : l’honnêteté est appréciée, et vous montrez votre raisonnement."},
            {l:"J’invente n’importe quoi avec assurance",good:false,fb:"Le jury repère vite le bluff : c’est risqué."},
            {l:"Je reste muet, figé",good:false,fb:"Mieux vaut dire honnêtement qu’on ne sait pas que se bloquer."}
          ] }
      ] },

    { type:"sort",
      teach:"L’<strong>image</strong> compte beaucoup en entretien. Faites le tri.",
      q:"Bonne image, ou à éviter ?", a:"Bonne image", b:"À éviter",
      items:[
        {l:"Arriver à l’heure, même un peu en avance.",good:true,ex:"Bonne image : la ponctualité montre votre sérieux."},
        {l:"Une tenue propre et adaptée.",good:true,ex:"Bonne image : une tenue soignée inspire confiance."},
        {l:"Regarder son téléphone pendant l’entretien.",good:false,ex:"À éviter : c’est un manque de respect évident."},
        {l:"Dire bonjour, sourire, regarder la personne.",good:true,ex:"Bonne image : politesse et contact donnent une impression positive."},
        {l:"Mâcher un chewing-gum, avachi sur la chaise.",good:false,ex:"À éviter : cela donne une image négligée."}
      ] },

    { type:"method", title:"Ma checklist du jour J",
      intro:"À cocher pour aborder l’oral ou l’entretien sereinement :",
      steps:[
        "<b>La veille</b> — je prépare mes documents et mes affaires, et je dors suffisamment.",
        "<b>Le jour</b> — tenue propre, j’arrive en avance, je repère le lieu.",
        "<b>Juste avant</b> — j’éteins mon téléphone, je respire, je me redresse.",
        "<b>Pendant</b> — bonjour, sourire, regard ; et je prépare une ou deux questions à poser."
      ],
      cta:"Ma checklist est prête →" },

    { type:"perso",
      text:"À vous. Pour un <strong>entretien de stage</strong>, en une phrase : comment vous présenteriez-vous (prénom, formation, et un <strong>point fort</strong>) ?",
      note:"Répondez dans votre tête, à l’oral (🔊) ou en une phrase. Il n’y a pas de mauvaise réponse." },

    { type:"bilan",
      recap:[
        "Je <strong>prépare</strong> : ma présentation, les questions probables, et je m’entraîne à voix haute.",
        "Je me <strong>présente</strong> clairement : qui je suis, ce que je sais faire.",
        "Je réponds <strong>posément</strong> ; si je ne sais pas, je le dis honnêtement.",
        "Je donne une <strong>bonne image</strong> : à l’heure, tenue propre, bonjour, sourire, téléphone rangé."
      ] }
  ]
});
</script>
</body>
</html>
