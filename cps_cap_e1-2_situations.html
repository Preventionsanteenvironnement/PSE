<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPS E1.2 — Quelle émotion dans la situation ?</title>
<link rel="stylesheet" href="assets/cps_kit.css">
</head>
<body>
<div id="cps-app"></div>
<script src="assets/cps_kit.js"></script>
<script>
var OPTS = function(bonne){
  return [
    {"l":"😀 Joie","ok":bonne==="joie"},
    {"l":"😢 Tristesse","ok":bonne==="tristesse"},
    {"l":"😡 Colère","ok":bonne==="colere"},
    {"l":"😨 Peur","ok":bonne==="peur"},
    {"l":"😲 Surprise","ok":bonne==="surprise"},
    {"l":"🤢 Dégoût","ok":bonne==="degout"}
  ];
};
var SORT = function(agreable){
  return [
    {"l":"🙂 Agréable","ok":agreable===true},
    {"l":"😣 Désagréable","ok":agreable===false}
  ];
};
CPS.init({
  "theme":"emo",
  "code":"E1.2",
  "ref":"Identifier ses émotions",
  "icon":"🎬",
  "title":"Quelle émotion dans la situation ?",
  "subtitle":"Regarde la scène. Trouve l’émotion.",
  "parcours":[
    {
      "temps":"decouvre","type":"lesson","title":"💡 Une situation, une émotion",
      "audio":"Une situation arrive : c’est le déclencheur. Elle réveille une émotion. Si ton besoin est rempli, l’émotion est agréable. Sinon, elle est désagréable. Pour trouver l’émotion, regarde le visage et le corps de la personne.",
      "blocks":[
        {"ic":"🎬","html":"Une <strong>situation</strong> arrive. C’est le <strong>déclencheur</strong>."},
        {"ic":"⚡","html":"Le déclencheur <strong>réveille une émotion</strong>."},
        {"ic":"⚖️","html":"Besoin <strong>rempli</strong> → émotion <strong>agréable</strong>. Sinon → <strong>désagréable</strong>."},
        {"img":"assets/emotions/scenes/scene-joie-reussite.png","alt":"Un élève lève le poing devant sa pièce réussie en atelier","html":"Regarde la <strong>scène</strong> : le <strong>visage</strong> et le <strong>corps</strong> montrent l’émotion <em>(clique l’image pour l’agrandir)</em>."},
        {"ic":"🎯","html":"Ton travail : trouver la <strong>bonne émotion</strong>."}
      ],
      "cta":"▶️ Je m’entraîne"
    },
    {
      "temps":"entraine","type":"cardpick","variant":"quiz",
      "instr":"Regarde la scène. Quelle émotion ? (Clique l’image pour l’agrandir.)",
      "items":[
        {"img":"assets/emotions/scenes/scene-joie-reussite.png","alt":"un élève lève le poing devant sa pièce réussie en atelier","audio":"Un élève lève le poing devant sa pièce réussie en atelier.","opts":OPTS("joie"),"ex":"Grand sourire, poing levé : c’est la joie."},
        {"img":"assets/emotions/scenes/scene-colere-atelier.png","alt":"une élève serre les poings devant son travail cassé","audio":"Une élève serre les poings devant son travail cassé par terre.","opts":OPTS("colere"),"ex":"Sourcils froncés, poings serrés : c’est la colère."},
        {"img":"assets/emotions/scenes/scene-peur-oral.png","alt":"un élève passe à l’oral devant la classe","audio":"Un élève passe à l’oral devant la classe, ses mains tremblent.","opts":OPTS("peur"),"ex":"Yeux grands ouverts, mains qui tremblent : c’est la peur."},
        {"img":"assets/emotions/scenes/scene-tristesse-recre.png","alt":"une élève est assise seule à la récré","audio":"Une élève est assise seule dans son coin à la récré.","opts":OPTS("tristesse"),"ex":"Épaules basses, regard baissé, tout seul : c’est la tristesse."},
        {"img":"assets/emotions/scenes/scene-surprise-anniversaire.png","alt":"des amis font une fête surprise à un élève","audio":"Des amis surgissent pour faire une fête surprise à un élève.","opts":OPTS("surprise"),"ex":"Yeux et bouche grands ouverts, sursaut : c’est la surprise."},
        {"img":"assets/emotions/scenes/scene-degout-frigo.png","alt":"une élève recule devant de la nourriture moisie dans un frigo","audio":"Une élève ouvre le frigo et recule devant de la nourriture moisie.","opts":OPTS("degout"),"ex":"Nez plissé, main qui repousse : c’est le dégoût."}
      ]
    },
    {
      "temps":"situation","type":"cardpick","variant":"sort",
      "instr":"Cette situation provoque une émotion agréable ou désagréable ?",
      "items":[
        {"img":"assets/emotions/scenes/scene-joie-reussite.png","alt":"un élève réussit sa pièce en atelier","audio":"Un élève réussit sa pièce en atelier.","opts":SORT(true),"ex":"Un besoin est rempli : réussir. C’est agréable."},
        {"img":"assets/emotions/scenes/scene-colere-atelier.png","alt":"le travail d’une élève est cassé","audio":"Le travail d’une élève est cassé exprès.","opts":SORT(false),"ex":"On ne te respecte pas. C’est désagréable."},
        {"img":"assets/emotions/scenes/scene-surprise-anniversaire.png","alt":"une fête surprise pour un élève","audio":"Des amis font une fête surprise à un élève.","opts":SORT(true),"ex":"Une bonne surprise, entouré de tes amis. C’est agréable."},
        {"img":"assets/emotions/scenes/scene-peur-oral.png","alt":"un élève passe à l’oral","audio":"Un élève passe à l’oral devant la classe.","opts":SORT(false),"ex":"Il y a un enjeu, un stress. C’est désagréable."},
        {"img":"assets/emotions/scenes/scene-tristesse-recre.png","alt":"une élève est seule à la récré","audio":"Une élève reste seule à la récré.","opts":SORT(false),"ex":"Un besoin de lien manque. C’est désagréable."},
        {"img":"assets/emotions/scenes/scene-degout-frigo.png","alt":"de la nourriture moisie dans un frigo","audio":"Une élève découvre de la nourriture moisie.","opts":SORT(false),"ex":"Ton corps te dit : ne mange pas ça. C’est désagréable."}
      ]
    },
    {
      "temps":"point","type":"wrap",
      "keep":[
        {"ic":"🎬","html":"Une <strong>situation</strong> (déclencheur) réveille une <strong>émotion</strong>."},
        {"ic":"⚖️","html":"Besoin rempli → <strong>agréable</strong>. Besoin non rempli → <strong>désagréable</strong>."},
        {"ic":"👀","html":"Le <strong>visage</strong> et le <strong>corps</strong> montrent l’émotion."}
      ],
      "self":["Je trouve l’émotion dans une situation","Je dis si l’émotion est agréable ou désagréable"]
    }
  ]
});
</script>
</body>
</html>
