<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPS E1.2 — Quelle émotion dans la situation ?</title>
<link rel="stylesheet" href="assets/cps_kit.css?v=20260617-consigne">
</head>
<body>
<div id="cps-app"></div>
<script src="assets/cps_kit.js"></script>
<script>
var IMG = "assets/emotions/e1-2/";
var I = function(name){ return IMG + name; };
var OPTS = function(bonne){
  return [
    {"l":"😀 Joie","ok":bonne==="joie"},
    {"l":"😢 Tristesse","ok":bonne==="tristesse"},
    {"l":"😡 Colère","ok":bonne==="colere"},
    {"l":"😨 Peur","ok":bonne==="peur"},
    {"l":"😲 Surprise","ok":bonne==="surprise"},
    {"l":"🤢 Dégoût","ok":bonne==="degout"}
  ];
};
var VALENCE = function(bonne){
  return [
    {"l":"🙂 Plutôt agréable","ok":bonne==="agreable"},
    {"l":"😣 Plutôt désagréable","ok":bonne==="desagreable"},
    {"l":"🔎 À vérifier","ok":bonne==="verifier"}
  ];
};
var IMGOPTS = function(bonne, noms){
  return noms.map(function(n){
    return {"img":I(n.f),"alt":n.alt,"ok":n.k===bonne,"ex":n.ex||""};
  });
};
CPS.init({
  "theme":"emo",
  "code":"E1.2",
  "ref":"Identifier ses émotions",
  "icon":"🎬",
  "title":"Quelle émotion dans la situation ?",
  "subtitle":"Observe la scène, puis formule une hypothèse.",
  "parcours":[
    {
      "temps":"decouvre","type":"lesson","title":"💡 Une situation, des indices",
      "audio":"Une situation arrive : c’est le déclencheur. Elle peut réveiller une émotion. Pour l’identifier, on observe le visage, le corps, les gestes et le contexte. Puis on vérifie : quel besoin est rempli, menacé ou non respecté ?",
      "blocks":[
        {"img":I("methode-visage-corps-contexte.jpg"),"alt":"trois images qui montrent visage, corps et contexte","html":"Pour comprendre une scène : <strong>visage + corps + contexte</strong>."},
        {"ic":"🎬","html":"<strong>Situation</strong> : que vient-il de se passer ? C’est souvent le déclencheur."},
        {"ic":"🧭","html":"<strong>Indices</strong> : visage, mains, épaules, posture, distance avec les autres."},
        {"ic":"❤️","html":"<strong>Besoin</strong> : sécurité, respect, réussite, lien, calme, hygiène... est-il rempli ou menacé ?"},
        {"ic":"🔎","html":"Une image ne donne pas toute l’histoire. On choisit l’émotion <strong>la plus probable</strong> et on explique avec des indices."}
      ],
      "cta":"▶️ Je m’entraîne"
    },
    {
      "temps":"entraine","type":"cardpick","variant":"quiz",
      "instr":"Regarde la scène. Quelle émotion est la plus probable ?",
      "demo":{"img":I("scene-joie-atelier.jpg"),"alt":"un élève sourit après une réussite en atelier","audio":"Un élève sourit après une réussite en atelier.","opts":OPTS("joie"),"ex":"Le déclencheur est une réussite. Le sourire et la posture ouverte orientent vers la joie ou la fierté."},
      "items":[
        {"img":I("scene-colere-limite.jpg"),"alt":"un élève contrarié dans un atelier","audio":"Un élève voit qu’on a touché à son travail sans lui demander.","opts":OPTS("colere"),"ex":"Besoin de respect menacé, sourcils froncés, mains serrées : colère probable."},
        {"img":I("scene-peur-evaluation.jpg"),"alt":"une élève inquiète avant une évaluation","audio":"Une élève doit passer devant le groupe pour une évaluation pratique.","opts":OPTS("peur"),"ex":"Enjeu, regard inquiet, main sur le ventre : peur ou stress probable."},
        {"img":I("scene-tristesse-isolement.jpg"),"alt":"une élève assise à l’écart pendant une pause","audio":"Une élève reste assise à l’écart pendant que d’autres discutent ensemble.","opts":OPTS("tristesse"),"ex":"Besoin de lien non rempli, posture basse, isolement : tristesse probable."},
        {"img":I("scene-surprise-consigne.jpg"),"alt":"un élève surpris par une nouvelle consigne","audio":"Un élève reçoit une consigne inattendue pendant le cours.","opts":OPTS("surprise"),"ex":"Quelque chose d’inattendu arrive : yeux ouverts, corps figé, surprise probable."},
        {"img":I("scene-degout-cuisine.jpg"),"alt":"une élève recule devant un aliment abîmé","audio":"Une élève découvre un aliment abîmé en cuisine pédagogique.","opts":OPTS("degout"),"ex":"Besoin d’hygiène et de sécurité alimentaire : grimace et recul indiquent le dégoût."},
        {"img":I("nuance-soulagement-joie.jpg"),"alt":"un élève relâche la pression après une tâche réussie","audio":"Un élève termine une tâche difficile et relâche enfin la pression.","opts":OPTS("joie"),"ex":"Le corps se détend et un sourire apparaît : on peut parler de joie, de fierté ou de soulagement."}
      ]
    },
    {
      "temps":"entraine","type":"imagepick","tag":"Trouver la scène",
      "instr":"Lis la situation. Choisis l’image qui correspond le mieux.",
      "items":[
        {
          "text":"Besoin de respect menacé : quelqu’un critique ou touche le travail. Quelle image correspond ?",
          "audio":"Besoin de respect menacé : quelqu’un critique ou touche le travail. Quelle image correspond ?",
          "options":IMGOPTS("colere",[
            {"k":"colere","f":"nuance-colere-blessee.jpg","alt":"élève contrariée face à une critique","ex":"Oui : critique, bras fermés, visage tendu. La colère peut être mêlée à de la blessure."},
            {"k":"joie","f":"nuance-soulagement-joie.jpg","alt":"élève soulagé après une tâche"},
            {"k":"surprise","f":"nuance-surprise-pas-peur.jpg","alt":"élève surpris par une annonce"},
            {"k":"calme","f":"nuance-calme-attention.jpg","alt":"élève calme en classe"}
          ])
        },
        {
          "text":"Besoin de sécurité ou d’hygiène : quelque chose repousse le corps. Quelle image correspond ?",
          "audio":"Besoin de sécurité ou d’hygiène : quelque chose repousse le corps. Quelle image correspond ?",
          "options":IMGOPTS("degout",[
            {"k":"tristesse","f":"scene-tristesse-isolement.jpg","alt":"élève isolée"},
            {"k":"degout","f":"nuance-degout-securite.jpg","alt":"élève devant un contenant sale","ex":"Oui : le corps recule pour se protéger. Le besoin d’hygiène est en jeu."},
            {"k":"peur","f":"scene-peur-evaluation.jpg","alt":"élève stressée"},
            {"k":"surprise","f":"scene-surprise-consigne.jpg","alt":"élève surpris"}
          ])
        },
        {
          "text":"Quelqu’un reçoit une information inattendue, mais la scène ne montre pas un danger. Quelle image correspond ?",
          "audio":"Quelqu’un reçoit une information inattendue, mais la scène ne montre pas un danger. Quelle image correspond ?",
          "options":IMGOPTS("surprise",[
            {"k":"surprise","f":"nuance-surprise-pas-peur.jpg","alt":"élève surpris par une annonce","ex":"Oui : les yeux s’ouvrent, le corps se fige. On pense à la surprise, pas forcément à la peur."},
            {"k":"peur","f":"indice-peur-corps.jpg","alt":"élève inquiète"},
            {"k":"degout","f":"scene-degout-cuisine.jpg","alt":"élève dégoûtée"},
            {"k":"tristesse","f":"indice-tristesse-posture.jpg","alt":"élève triste"}
          ])
        },
        {
          "text":"Une erreur vient d’arriver et la personne semble gênée. Quelle image correspond ?",
          "audio":"Une erreur vient d’arriver et la personne semble gênée.",
          "options":IMGOPTS("honte",[
            {"k":"honte","f":"nuance-honte-erreur.jpg","alt":"élève gênée après une erreur","ex":"Oui : regard baissé, main sur le front, corps replié. On peut penser à la gêne ou à la honte."},
            {"k":"joie","f":"scene-joie-atelier.jpg","alt":"élève joyeux"},
            {"k":"colere","f":"scene-colere-limite.jpg","alt":"élève contrarié"},
            {"k":"calme","f":"nuance-calme-attention.jpg","alt":"élève attentif"}
          ])
        }
      ]
    },
    {
      "temps":"situation","type":"cardpick","variant":"quiz",
      "instr":"La scène semble plutôt agréable, désagréable, ou à vérifier ?",
      "items":[
        {"img":I("nuance-soulagement-joie.jpg"),"alt":"un élève se détend après une tâche réussie","audio":"Un élève se détend après une tâche réussie.","opts":VALENCE("agreable"),"ex":"Le besoin de réussite est rempli. La scène semble plutôt agréable."},
        {"img":I("nuance-colere-blessee.jpg"),"alt":"une élève contrariée reçoit une critique","audio":"Une élève reçoit une critique et semble contrariée.","opts":VALENCE("desagreable"),"ex":"Respect ou reconnaissance menacés : la scène semble plutôt désagréable."},
        {"img":I("nuance-degout-securite.jpg"),"alt":"une élève recule devant un contenant sale","audio":"Une élève recule devant un contenant sale en cuisine.","opts":VALENCE("desagreable"),"ex":"Le besoin d’hygiène ou de sécurité est menacé : désagréable."},
        {"img":I("nuance-surprise-pas-peur.jpg"),"alt":"un élève écoute une annonce inattendue","audio":"Un élève écoute une annonce inattendue.","opts":VALENCE("verifier"),"ex":"La surprise peut devenir agréable ou désagréable. Il faut vérifier la suite de la scène."},
        {"img":I("nuance-honte-erreur.jpg"),"alt":"une élève gênée après une erreur","audio":"Une élève se sent gênée après une erreur.","opts":VALENCE("desagreable"),"ex":"La gêne ou la honte est souvent désagréable : besoin de confiance ou de respect fragilisé."},
        {"img":I("nuance-calme-attention.jpg"),"alt":"un élève écoute calmement en classe","audio":"Un élève écoute calmement en classe.","opts":VALENCE("verifier"),"ex":"La personne semble calme et attentive. Il n’y a pas assez d’indices pour dire agréable ou désagréable."}
      ]
    },
    {
      "temps":"situation","type":"match","title":"🔗 Relie la scène à l’indice principal",
      "instr":"Choisis une image à gauche, puis l’indice qui aide le plus à comprendre.",
      "audio":"Relie chaque scène à l’indice principal qui aide à comprendre l’émotion.",
      "pairs":[
        {"img":I("scene-peur-evaluation.jpg"),"alt":"élève inquiète avant une évaluation","r":"Enjeu + corps tendu","ex":"L’évaluation peut déclencher peur ou stress."},
        {"img":I("scene-tristesse-isolement.jpg"),"alt":"élève isolée pendant une pause","r":"Besoin de lien non rempli","ex":"L’isolement aide à comprendre la tristesse."},
        {"img":I("scene-degout-cuisine.jpg"),"alt":"élève devant un aliment abîmé","r":"Protection / hygiène","ex":"Le dégoût protège contre ce qui peut être dangereux ou sale."},
        {"img":I("scene-surprise-consigne.jpg"),"alt":"élève surpris par une consigne","r":"Événement inattendu","ex":"La surprise commence souvent par quelque chose d’imprévu."}
      ]
    },
    {
      "temps":"situation","type":"order","title":"🕵️ Mission enquête émotionnelle",
      "instr":"Remets les étapes dans l’ordre pour comprendre une émotion sans conclure trop vite.",
      "audio":"Remets les étapes dans l’ordre : déclencheur, indices visibles, besoin touché, action utile.",
      "steps":[
        "1. Déclencheur : quelque chose arrive",
        "2. Indices : visage, corps, gestes",
        "3. Besoin touché : respect, sécurité, lien...",
        "4. Action utile : demander, vérifier, réparer, chercher du soutien"
      ],
      "stepImages":[
        I("scene-colere-limite.jpg"),
        I("indice-colere-tension.jpg"),
        I("nuance-colere-blessee.jpg"),
        "assets/emotions/e1-1/message-limite-file.jpg"
      ],
      "stepAlts":[
        "un élève découvre une limite franchie en atelier",
        "un élève montre des signes de tension",
        "une élève contrariée par une critique",
        "une élève demande calmement le respect de l’ordre"
      ]
    },
    {
      "temps":"point","type":"wrap",
      "keep":[
        {"ic":"🎬","html":"Une <strong>situation</strong> peut déclencher une émotion."},
        {"ic":"👀","html":"Pour identifier l’émotion, on observe <strong>visage, corps, gestes et contexte</strong>."},
        {"ic":"❤️","html":"La question du <strong>besoin</strong> aide : respect, sécurité, lien, réussite, hygiène, calme."},
        {"ic":"🔎","html":"On explique avec des indices : <strong>je pense que...</strong> parce que..."}
      ],
      "self":["Je trouve l’émotion probable dans une situation","Je repère le déclencheur ou le besoin en jeu","Je sais dire quand il faut vérifier avant de conclure"]
    }
  ]
});
</script>
</body>
</html>
