<div id="cps-app"></div>
<script src="assets/cps_kit.js?v=20260619g"></script>
<script>

  return [
    {"l":"🟢 Ça me calme vraiment","ok":bonne==="calme"},
    {"l":"🟡 Ça soulage un instant, mais le stress revient","ok":bonne==="soulage"}
  ];
};
CPS.init({
  "theme":"emo",
  "code":"E2.3",
  "ref":"Réguler son stress",
  "icon":"🌀",
  "title":"Gérer mon stress",
  "subtitle":"Essayer, sentir ce qui fait baisser le stress.",
  "parcours":[
    {

      "blocks":[
        {"ic":"🌀","html":"Tout le monde vit du stress : avant un <strong>contrôle</strong>, un <strong>oral</strong>, un <strong>entretien</strong>."},
        {"ic":"👤","html":"Le corps le montre : <strong>ventre serré</strong>, <strong>souffle court</strong>, <strong>épaules tendues</strong>."},
        {"ic":"🎯","html":"La bonne nouvelle : on peut le faire <strong>baisser</strong>. Essayez, et regardez votre jauge."}

      "cta":"▶️ J'essaie"

    {
      "temps":"entraine","type":"gauge","tag":"Essaie et observe","label":"Ton stress",
      "title":"🌡️ Fais baisser ta jauge",

      "situations":[
        {
          "context":"Demain, vous avez un contrôle. Ce soir, votre ventre est serré et vous n'arrivez pas à vous concentrer.",
          "start":8,
          "question":"Qu'est-ce que vous essayez ?",
          "strategies":[
            {"l":"🫁 Respirer lentement, plusieurs fois","to":5,"fb":"Le souffle ralentit, le ventre se desserre."},
            {"l":"🎒 Préparer le sac et les affaires","to":6,"fb":"C'est prêt : une chose en moins à craindre."},
            {"l":"📖 Réviser juste une petite partie","to":5,"fb":"On se sent un peu plus prêt, sans tout vouloir d'un coup."},
            {"l":"📱 Rester sur le téléphone très tard","to":9,"fb":"Le moment est repoussé, et la fatigue augmente le stress demain."}
          ]
        },
        {
          "context":"Dans dix minutes, vous passez à l'oral. Votre cœur bat vite.",
          "start":8,
          "question":"Qu'est-ce que vous essayez ?",
          "strategies":[
            {"l":"🫁 Respirer lentement avant d'entrer","to":5,"fb":"Le cœur ralentit un peu, le corps se détend."},
            {"l":"🚶 Marcher un peu dans le couloir","to":6,"fb":"Bouger fait redescendre la tension."},
            {"l":"🗒️ Relire vos trois idées principales","to":5,"fb":"L'essentiel est en tête : c'est rassurant."},

          ]
        }
      ]

    {

        {
          "em":"🛠️","text":"En atelier, une tâche difficile vous stresse. Vous bloquez. Que faites-vous ?",

            {"l":"Je m'énerve sur le matériel.","good":false,"fb":"Ça défoule un instant, mais la tâche reste à faire."}
          ]
        }
      ]
    },
    {
      "temps":"point","type":"wrap",

        {"ic":"🟡","html":"Ce qui soulage un instant mais ne suffit pas : <strong>repousser</strong>, <strong>se dévaloriser</strong>, <strong>s'énerver</strong>."}
      ],
      "self":["Je connais des stratégies qui me calment vraiment","Je sais repérer le stress dans mon corps","Je sais que repousser ne fait pas baisser le stress"]
    }
  ]
