<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ma Recherche de PFMP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:    #1a2f5a;
  --navy2:   #243c73;
  --blue:    #3b6fd4;
  --sky:     #e8f0fb;
  --green:   #16a34a;
  --green-bg:#dcfce7;
  --red:     #dc2626;
  --red-bg:  #fee2e2;
  --orange:  #ea580c;
  --orange-bg:#ffedd5;
  --yellow-bg:#fefce8;
  --border:  #d1d9e6;
  --bg:      #f0f4fb;
  --white:   #ffffff;
  --text:    #1e2a3a;
  --radius:  14px;
  --shadow:  0 2px 12px rgba(26,47,90,.10);
}

html { scroll-behavior: smooth; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 80px;
}

/* HEADER */
.app-header {
  background: linear-gradient(135deg, var(--navy), var(--navy2));
  color: white;
  padding: 18px 16px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 20px rgba(26,47,90,.3);
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.app-title {
  font-size: 1.1rem;
  font-weight: 900;
  letter-spacing: -.3px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.btn-pdf {
  background: white;
  color: var(--navy);
  border: none;
  border-radius: 10px;
  padding: 8px 13px;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 0.82rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: transform .1s;
}
.btn-pdf:active { transform: scale(.96); }

.student-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.field-wrap { display: flex; flex-direction: column; gap: 3px; }
.field-wrap label {
  font-size: .68rem;
  font-weight: 800;
  opacity: .7;
  text-transform: uppercase;
  letter-spacing: .5px;
}
.field-wrap input {
  background: rgba(255,255,255,.15);
  border: 1.5px solid rgba(255,255,255,.25);
  border-radius: 8px;
  padding: 7px 10px;
  color: white;
  font-family: 'Nunito', sans-serif;
  font-size: .9rem;
  font-weight: 700;
  outline: none;
  transition: border-color .2s, background .2s;
  width: 100%;
}
.field-wrap input::placeholder { color: rgba(255,255,255,.4); }
.field-wrap input:focus {
  border-color: rgba(255,255,255,.7);
  background: rgba(255,255,255,.22);
}

/* STATS */
.stats-bar {
  display: flex;
  gap: 8px;
  padding: 12px 12px 4px;
  overflow-x: auto;
  scrollbar-width: none;
}
.stats-bar::-webkit-scrollbar { display: none; }
.stat-chip {
  background: white;
  border-radius: 20px;
  padding: 5px 11px;
  font-size: .73rem;
  font-weight: 800;
  white-space: nowrap;
  box-shadow: var(--shadow);
  border: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  gap: 5px;
}

/* CARDS */
.cards-container {
  padding: 0 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.card {
  background: white;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 1.5px solid var(--border);
  animation: slideIn .22s ease both;
  border-left-width: 4px;
  border-left-color: var(--border);
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.card.s-ok     { border-left-color: var(--green); }
.card.s-wait   { border-left-color: var(--orange); }
.card.s-rdv    { border-left-color: var(--blue); }
.card.s-no     { border-left-color: var(--red); }

.card-header {
  background: var(--navy);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.card-num {
  font-size: .68rem;
  font-weight: 800;
  color: rgba(255,255,255,.55);
  text-transform: uppercase;
  letter-spacing: 1px;
  flex-shrink: 0;
}
.card-badge {
  font-size: .72rem;
  font-weight: 800;
  padding: 3px 9px;
  border-radius: 20px;
  background: rgba(255,255,255,.15);
  color: white;
  flex: 1;
  text-align: center;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}
.btn-delete {
  background: none;
  border: none;
  color: rgba(255,255,255,.35);
  font-size: 1rem;
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 6px;
  transition: color .15s;
  flex-shrink: 0;
}
.btn-delete:hover { color: #f87171; }

.card-body { padding: 14px; }

/* INPUTS */
.input-group { margin-bottom: 10px; }
.input-group label {
  display: block;
  font-size: .7rem;
  font-weight: 800;
  color: var(--navy);
  text-transform: uppercase;
  letter-spacing: .4px;
  margin-bottom: 4px;
}
.input-group input,
.input-group textarea {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: 9px;
  padding: 9px 12px;
  font-family: 'Nunito', sans-serif;
  font-size: .92rem;
  color: var(--text);
  outline: none;
  background: white;
  transition: border-color .18s, box-shadow .18s;
  -webkit-appearance: none;
}
.input-group input:focus,
.input-group textarea:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(59,111,212,.12);
}
.input-group textarea {
  resize: none;
  min-height: 58px;
  line-height: 1.4;
}
.input-nom input {
  font-size: 1rem;
  font-weight: 700;
}
.input-group input[type="date"] {
  font-family: 'Nunito', sans-serif;
  color: var(--text);
  cursor: pointer;
}

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

/* DIVIDER */
.divider { height: 1px; background: var(--border); margin: 12px 0; }

/* CHECKLIST */
.checklist-title {
  font-size: .7rem;
  font-weight: 800;
  color: var(--navy);
  text-transform: uppercase;
  letter-spacing: .4px;
  margin-bottom: 8px;
}
.checklist {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.check-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 10px;
  border-radius: 9px;
  border: 1.5px solid var(--border);
  cursor: pointer;
  background: var(--bg);
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: all .15s;
}
.check-item:active { transform: scale(.97); }
.check-item input { display: none; }
.check-box {
  width: 20px;
  height: 20px;
  border-radius: 5px;
  border: 2px solid #ccc;
  background: white;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .8rem;
  transition: all .15s;
}
.check-label {
  font-size: .8rem;
  font-weight: 700;
  line-height: 1.2;
  color: var(--text);
}

/* States checked */
.check-item[data-sid="ok"].checked     { background: var(--green-bg);  border-color: var(--green);  }
.check-item[data-sid="ok"].checked .check-box     { border-color: var(--green);  background: var(--green);  color: white; }
.check-item[data-sid="ok"].checked .check-label   { color: var(--green); }

.check-item[data-sid="rappel"].checked { background: var(--orange-bg); border-color: var(--orange); }
.check-item[data-sid="rappel"].checked .check-box { border-color: var(--orange); background: var(--orange); color: white; }
.check-item[data-sid="rappel"].checked .check-label { color: var(--orange); }

.check-item[data-sid="rdv"].checked    { background: var(--sky);       border-color: var(--blue);   }
.check-item[data-sid="rdv"].checked .check-box    { border-color: var(--blue);   background: var(--blue);   color: white; }
.check-item[data-sid="rdv"].checked .check-label  { color: var(--blue); }

.check-item[data-sid="mail"].checked   { background: var(--sky);       border-color: var(--blue);   }
.check-item[data-sid="mail"].checked .check-box   { border-color: var(--blue);   background: var(--blue);   color: white; }
.check-item[data-sid="mail"].checked .check-label { color: var(--blue); }

.check-item[data-sid="attente"].checked { background: var(--yellow-bg); border-color: #ca8a04; }
.check-item[data-sid="attente"].checked .check-box { border-color: #ca8a04; background: #ca8a04; color: white; }
.check-item[data-sid="attente"].checked .check-label { color: #ca8a04; }

.check-item[data-sid="non"].checked    { background: var(--red-bg);    border-color: var(--red);    }
.check-item[data-sid="non"].checked .check-box    { border-color: var(--red);    background: var(--red);    color: white; }
.check-item[data-sid="non"].checked .check-label  { color: var(--red); }

.check-item[data-sid="refus"].checked  { background: var(--red-bg);    border-color: var(--red);    }
.check-item[data-sid="refus"].checked .check-box  { border-color: var(--red);    background: var(--red);    color: white; }
.check-item[data-sid="refus"].checked .check-label { color: var(--red); }

/* ADD BUTTON */
.btn-add-wrap { padding: 6px 12px 12px; }
.btn-add {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--navy), var(--navy2));
  color: white;
  border: none;
  border-radius: var(--radius);
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: .95rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  box-shadow: var(--shadow);
  transition: opacity .15s, transform .1s;
}
.btn-add:active { opacity: .85; transform: scale(.99); }

/* TOAST */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--navy);
  color: white;
  padding: 10px 20px;
  border-radius: 20px;
  font-weight: 800;
  font-size: .83rem;
  box-shadow: 0 4px 20px rgba(0,0,0,.25);
  transition: transform .28s cubic-bezier(.175,.885,.32,1.275);
  z-index: 999;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* PRINT */
@media print {
  body { background: white; padding: 0; }
  .app-header { position: static; box-shadow: none; }
  .btn-pdf, .btn-add-wrap, .btn-delete, .stats-bar { display: none !important; }
  .student-fields input { background: transparent !important; border: none !important; color: white !important; }
  .cards-container { padding: 0 6px; gap: 10px; }
  .card { break-inside: avoid; box-shadow: none; border: 1px solid #ccc; border-left-width: 4px; }
  .card-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; background: var(--navy) !important; }
  .check-item { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .check-item.checked { print-color-adjust: exact; }
  .input-group input, .input-group textarea {
    border: none; border-bottom: 1px solid #ccc; border-radius: 0; padding: 3px 2px;
  }
  @page { margin: 1cm; size: A4 portrait; }
}
</style>
</head>
<body>

<header class="app-header">
  <div class="header-top">
    <div class="app-title">📋 Ma Recherche de PFMP</div>
    <button class="btn-pdf" onclick="window.print()">🖨️ Enregistrer PDF</button>
  </div>
  <div class="student-fields">
    <div class="field-wrap">
      <label>Nom &amp; Prénom</label>
      <input type="text" id="s-name" placeholder="Ton nom…" autocomplete="name">
    </div>
    <div class="field-wrap">
      <label>Classe</label>
      <input type="text" id="s-class" placeholder="Ex : 1ère MELEC">
    </div>
  </div>
</header>

<div class="stats-bar" id="stats-bar">
  <div class="stat-chip" id="st-total">📁 0 entreprise</div>
  <div class="stat-chip" id="st-ok">✅ 0 accord</div>
  <div class="stat-chip" id="st-wait">🔄 0 à rappeler</div>
  <div class="stat-chip" id="st-no">❌ 0 refus</div>
</div>

<div class="cards-container" id="cards-container"></div>

<div class="btn-add-wrap">
  <button class="btn-add" id="btn-add">＋ Ajouter une entreprise</button>
</div>

<div class="toast" id="toast"></div>

<script>
const STATUTS = [
  { id:"ok",      label:"Accepte un(e) stagiaire",    emoji:"✅" },
  { id:"rappel",  label:"À rappeler",                  emoji:"🔄" },
  { id:"rdv",     label:"RDV fixé",                    emoji:"📅" },
  { id:"mail",    label:"Réponse par mail",             emoji:"📧" },
  { id:"attente", label:"En attente de réponse",        emoji:"⏳" },
  { id:"non",     label:"Ne prend pas de stagiaires",   emoji:"❌" },
  { id:"refus",   label:"Refus définitif",              emoji:"🚫" },
  { id:"autre",   label:"Autre",                        emoji:"💬" },
];

// ── State ─────────────────────────
let state = { name:"", classe:"", cards:[] };
let saveTimer = null;
let toastTimer = null;

// ── Persistence ───────────────────
function load() {
  try {
    const raw = localStorage.getItem("pfmp_v3");
    if (raw) state = JSON.parse(raw);
  } catch(e) {}
}

function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try { localStorage.setItem("pfmp_v3", JSON.stringify(state)); } catch(e){}
    toast("💾 Sauvegardé !");
  }, 500);
}

function toast(msg) {
  clearTimeout(toastTimer);
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  toastTimer = setTimeout(() => el.classList.remove("show"), 1800);
}

// ── Stats ─────────────────────────
function updateStats() {
  const c = state.cards;
  const total = c.length;
  const ok    = c.filter(x => x.s && x.s.includes("ok")).length;
  const wait  = c.filter(x => x.s && x.s.includes("rappel")).length;
  const no    = c.filter(x => x.s && (x.s.includes("non")||x.s.includes("refus"))).length;
  document.getElementById("st-total").textContent = "📁 " + total + " entreprise" + (total>1?"s":"");
  document.getElementById("st-ok").textContent    = "✅ " + ok + " accord" + (ok>1?"s":"");
  document.getElementById("st-wait").textContent  = "🔄 " + wait + " à rappeler";
  document.getElementById("st-no").textContent    = "❌ " + no + " refus";
}

// ── Card colour ───────────────────
function cardClass(s) {
  if (!s || !s.length) return "";
  if (s.includes("ok"))                          return "s-ok";
  if (s.includes("rappel"))                      return "s-wait";
  if (s.includes("rdv")||s.includes("mail"))     return "s-rdv";
  if (s.includes("non")||s.includes("refus"))    return "s-no";
  return "s-wait";
}

function cardBadge(s) {
  if (!s || !s.length) return "";
  const found = STATUTS.find(x => s.includes(x.id));
  return found ? found.emoji + " " + found.label : "";
}

// ── Escape ────────────────────────
function esc(v) {
  return String(v||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── Build card DOM ────────────────
function buildCard(card, idx) {
  const div = document.createElement("div");
  div.className = "card " + cardClass(card.s);
  div.dataset.idx = idx;

  const badge = cardBadge(card.s);

  div.innerHTML = `
    <div class="card-header">
      <span class="card-num">N°${idx+1}</span>
      <span class="card-badge">${esc(badge) || esc(card.nom) || "Nouvelle entreprise"}</span>
      <button class="btn-delete" data-del="${idx}" title="Supprimer">✕</button>
    </div>
    <div class="card-body">
      <div class="input-group input-nom">
        <label>🏢 Nom de l'entreprise</label>
        <input type="text" data-field="nom" placeholder="Pharmacie Martin, CHU…" value="${esc(card.nom)}">
      </div>
      <div class="input-group">
        <label>📍 Adresse</label>
        <input type="text" data-field="adresse" placeholder="Rue, code postal, ville" value="${esc(card.adresse)}">
      </div>
      <div class="grid-2">
        <div class="input-group">
          <label>📞 Téléphone</label>
          <input type="tel" data-field="tel" placeholder="06 …" value="${esc(card.tel)}">
        </div>
        <div class="input-group">
          <label>📧 Mail</label>
          <input type="email" data-field="mail" placeholder="contact@…" value="${esc(card.mail)}">
        </div>
      </div>
      <div class="input-group">
        <label>👤 Responsable / Chef de service</label>
        <input type="text" data-field="responsable" placeholder="Mme Dupont, M. Aziz…" value="${esc(card.responsable)}">
      </div>
      <div class="input-group">
        <label>📅 Date du contact</label>
        <input type="date" data-field="date" value="${esc(card.date)}">
      </div>
      <div class="divider"></div>
      <div class="checklist-title">Résultat du contact</div>
      <div class="checklist">
        ${STATUTS.map(st => {
          const checked = card.s && card.s.includes(st.id);
          return `<div class="check-item${checked?' checked':''}" data-sid="${st.id}" role="checkbox" aria-checked="${checked}">
            <span class="check-box">${checked?'✓':''}</span>
            <span class="check-label">${st.emoji} ${st.label}</span>
          </div>`;
        }).join("")}
      </div>
      <div class="autre-wrap" style="display:${card.s && card.s.includes('autre') ? 'block' : 'none'}; margin-top:8px;">
        <div class="input-group" style="margin-bottom:0">
          <label>💬 Précise ici</label>
          <input type="text" data-field="autretxt" placeholder="Ex : message laissé sur répondeur…" value="${esc(card.autretxt||'')}">
        </div>
      </div>
      <div class="divider"></div>
      <div class="input-group">
        <label>📝 Observations / Suite</label>
        <textarea data-field="obs" placeholder="Notes : heure de rappel, conditions, contacts…">${esc(card.obs)}</textarea>
      </div>
    </div>`;

  // Events
  div.querySelectorAll("[data-field]").forEach(el => {
    el.addEventListener("input", () => {
      state.cards[idx][el.dataset.field] = el.value;
      // Refresh badge
      const b = div.querySelector(".card-badge");
      const nm = state.cards[idx].nom;
      const bg = cardBadge(state.cards[idx].s);
      b.textContent = bg || nm || "Nouvelle entreprise";
      save();
      updateStats();
    });
  });

  div.querySelectorAll(".check-item").forEach(item => {
    item.addEventListener("click", (e) => {
      e.preventDefault();
      e.stopPropagation();
      const sid = item.dataset.sid;
      if (!state.cards[idx].s) state.cards[idx].s = [];
      const has = state.cards[idx].s.includes(sid);
      if (has) {
        state.cards[idx].s = state.cards[idx].s.filter(x => x !== sid);
        item.classList.remove("checked");
        item.querySelector(".check-box").textContent = "";
        item.setAttribute("aria-checked", "false");
      } else {
        state.cards[idx].s.push(sid);
        item.classList.add("checked");
        item.querySelector(".check-box").textContent = "✓";
        item.setAttribute("aria-checked", "true");
      }
      // Show/hide "autre" text field
      const autreWrap = div.querySelector(".autre-wrap");
      if (autreWrap) {
        autreWrap.style.display = state.cards[idx].s.includes("autre") ? "block" : "none";
        if (state.cards[idx].s.includes("autre")) {
          setTimeout(() => autreWrap.querySelector("input").focus(), 50);
        }
      }
      // Refresh card colour + badge
      div.className = "card " + cardClass(state.cards[idx].s);
      const b = div.querySelector(".card-badge");
      const bg = cardBadge(state.cards[idx].s);
      b.textContent = bg || state.cards[idx].nom || "Nouvelle entreprise";
      save();
      updateStats();
    });
  });

  div.querySelector("[data-del]").addEventListener("click", () => {
    if (!confirm("Supprimer cette entreprise ?")) return;
    state.cards.splice(idx, 1);
    save();
    render();
    toast("🗑️ Supprimée !");
  });

  return div;
}

// ── Render all ────────────────────
function render() {
  const container = document.getElementById("cards-container");
  container.innerHTML = "";
  state.cards.forEach((card, i) => container.appendChild(buildCard(card, i)));
  updateStats();
}

// ── Add ───────────────────────────
document.getElementById("btn-add").addEventListener("click", () => {
  const card = { nom:"", adresse:"", tel:"", mail:"", responsable:"", date:"", s:[], obs:"" };
  state.cards.push(card);
  const idx = state.cards.length - 1;
  const el = buildCard(card, idx);
  document.getElementById("cards-container").appendChild(el);
  updateStats();
  save();
  setTimeout(() => {
    el.scrollIntoView({ behavior:"smooth", block:"start" });
    el.querySelector(".input-nom input").focus();
  }, 80);
  toast("✅ Entreprise ajoutée !");
});

// ── Student fields ────────────────
document.getElementById("s-name").addEventListener("input", function() {
  state.name = this.value; save();
});
document.getElementById("s-class").addEventListener("input", function() {
  state.classe = this.value; save();
});

// ── Init ──────────────────────────
load();
document.getElementById("s-name").value  = state.name   || "";
document.getElementById("s-class").value = state.classe || "";
if (!state.cards.length) {
  state.cards.push({ nom:"", adresse:"", tel:"", mail:"", responsable:"", date:"", s:[], obs:"" });
}
render();
</script>
</body>
</html>
