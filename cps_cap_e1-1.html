          "ic": "⚖️",
          "html": "Besoin <strong>rempli</strong> → émotion <strong>agréable</strong>. Besoin <strong>non rempli</strong> → émotion <strong>désagréable</strong>."

        {

    },

        {
          "l": "😄 Joie",
          "r": "Mon besoin est rempli. Profite.",
          "ex": "La joie dit que tout va bien. Elle pousse à continuer et à partager."
        },
        {
          "l": "😨 Peur",
          "r": "Attention, un danger possible. Sois prudent.",
          "ex": "La peur te protège. Elle pousse à faire attention ou à demander de l’aide."
        },
        {
          "l": "😤 Colère",
          "r": "Une limite est franchie. C’est injuste.",
          "ex": "La colère dit que ton besoin de respect n’est pas rempli. Elle pousse à agir."
        },
        {
          "l": "😢 Tristesse",

          "ex": "La tristesse dit qu’il faut du temps pour aller mieux. Elle pousse à chercher du soutien."

            },
            {
              "l": "Je souffle, je reconnais ma colère, puis je lui parle calmement.",
              "good": true,
              "fb": "Tu as reconnu ton émotion avant d’agir. La colère t’a informé qu’une limite était franchie. Tu peux maintenant l’exprimer sans exploser."

        },
        {

          "text": "Demain tu passes ton oral de PFMP. Tu as le ventre noué depuis ce matin. Que fais-tu ?",
          "audio": "Demain tu passes ton oral de PFMP. Tu as le ventre noué depuis ce matin. Que fais-tu ?",
          "choices": [
            {
              "l": "Je me dis : c’est la peur. Elle me prépare. Je relis mes notes.",

              "fb": "La peur t’informe qu’un moment important arrive. Elle te pousse à te préparer. C’est utile : écoute ce message."
            },
            {
              "l": "Je reste sur mon téléphone toute la nuit pour oublier.",
              "good": false,
              "fb": "Éviter n’enlève pas la peur. Elle revient plus forte. Prépare-toi un peu, repose-toi. Ça aide vraiment."

          ]
        },
        {
          "em": "🌧️",
          "text": "Ton meilleur ami change de lycée. Tu te sens vide et tu n’as pas envie de parler. Que fais-tu ?",

          "choices": [
            {
              "l": "Je me dis que c’est nul d’être triste. Je fais semblant d’aller bien.",
              "good": false,
              "fb": "Faire semblant ne fait pas partir la tristesse. Elle revient. Cet ami comptait pour toi : c’est normal de le ressentir."
            },
            {
              "l": "Je reconnais ma tristesse. Je parle à quelqu’un en qui j’ai confiance.",
              "good": true,
              "fb": "Tu reconnais ton émotion sans te juger. La tristesse dit que tu as besoin de soutien. Chercher quelqu’un à qui parler, c’est le bon réflexe."
            }
          ]
        }
      ]
    },

    {
      "temps": "point",
      "type": "wrap",
      "keep": [
        {

        },
        {

          "html": "Une émotion touche ton <strong>corps</strong>, tes <strong>pensées</strong>, ton <strong>visage</strong> et tes <strong>gestes</strong>."
        }
      ],
      "self": [
        "Je sais nommer plusieurs émotions de base.",
        "Je comprends qu’une émotion m’envoie un message utile.",
        "Je peux repérer un déclencheur dans une situation concrète."

    }

  ]
