<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPS E1.2 — Reconnaître les émotions</title>
<link rel="stylesheet" href="assets/cps_kit.css?v=20260618-m1images">
</head>
<body>
<div id="cps-app"></div>
<script src="assets/cps_kit.js?v=20260618-m1images"></script>
<script>
var IMG = "assets/emotions/e1-2/";
var I = function(name){ return IMG + name; };
var OPTS = function(bonne){
  return [
    {"l":"😀 Joie","ok":bonne==="joie"},
    {"l":"😢 Tristesse","ok":bonne==="tristesse"},
    {"l":"😡 Colère","ok":bonne==="colere"},
    {"l":"😨 Peur","ok":bonne==="peur"},
    {"l":"😲 Surprise","ok":bonne==="surprise"},
    {"l":"🤢 Dégoût","ok":bonne==="degout"}
  ];
};
var IMGOPTS = function(bonne, noms){
  return noms.map(function(n){
    return {"img":I(n.f),"alt":n.alt,"ok":n.k===bonne,"ex":n.ex||""};
  });
};
CPS.init({
  "theme":"emo",
  "code":"E1.2",
  "ref":"Identifier ses émotions",
  "icon":"🙂",
  "title":"Reconnaître les émotions",
  "subtitle":"Observe le visage, le corps et le contexte.",
  "parcours":[
    {
      "temps":"decouvre","type":"lesson","title":"💡 Lire les indices",
      "audio":"Pour reconnaître une émotion, on ne devine pas au hasard. On observe plusieurs indices : le visage, le corps, les gestes et le contexte. Ensuite, on formule une hypothèse : cette personne semble joyeuse, triste, en colère, avoir peur, être surprise ou dégoûtée.",
      "blocks":[
        {"img":I("methode-visage-corps-contexte.jpg"),"alt":"Trois images pour observer le visage, le corps et le contexte","html":"Avant de répondre, cherche <strong>3 indices</strong> : visage, corps, contexte."},
        {"ic":"👀","html":"<strong>Visage</strong> : yeux, sourcils, bouche, regard."},
        {"ic":"🧍","html":"<strong>Corps</strong> : épaules, mains, posture, mouvement de recul ou d’ouverture."},
        {"ic":"🎬","html":"<strong>Contexte</strong> : que vient-il de se passer ? réussite, erreur, surprise, danger, exclusion..."},
        {"ic":"🔎","html":"On dit plutôt : <strong>elle semble...</strong> ou <strong>il a l’air...</strong>. On reste prudent : une image donne des indices, pas une certitude absolue."}
      ],
      "cta":"▶️ Je m’entraîne"
    },
    {
      "temps":"entraine","type":"cardpick","variant":"quiz",
      "instr":"Observe le visage et le corps. Quelle émotion est la plus probable ?",
      "demo":{"img":I("indice-joie-visage-corps.jpg"),"alt":"une élève sourit avec les poings levés","audio":"Une élève sourit avec les poings levés après une réussite.","opts":OPTS("joie"),"ex":"Le sourire, les yeux ouverts et les épaules détendues orientent vers la joie."},
      "items":[
        {"img":I("indice-tristesse-posture.jpg"),"alt":"un élève regarde vers le bas, bras fermés","audio":"Un élève regarde vers le bas, les épaules basses et les bras fermés.","opts":OPTS("tristesse"),"ex":"Regard baissé, corps fermé, peu d’énergie : on pense à la tristesse."},
        {"img":I("indice-colere-tension.jpg"),"alt":"un élève fronce les sourcils et serre les mains","audio":"Un élève fronce les sourcils, serre les mains et reste très tendu.","opts":OPTS("colere"),"ex":"Sourcils serrés, mâchoire tendue, mains fermées : ce sont des indices de colère."},
        {"img":I("indice-peur-corps.jpg"),"alt":"une élève a les yeux inquiets et une main sur la poitrine","audio":"Une élève a les yeux inquiets, une main sur la poitrine et l’autre sur le ventre.","opts":OPTS("peur"),"ex":"Yeux inquiets, corps contracté, main sur le ventre : on pense à la peur ou au stress."},
        {"img":I("indice-surprise-visage.jpg"),"alt":"un élève lit une feuille avec les yeux grands ouverts","audio":"Un élève lit une feuille avec les yeux grands ouverts et la bouche entrouverte.","opts":OPTS("surprise"),"ex":"Yeux grands ouverts, bouche entrouverte, corps figé : c’est la surprise."},
        {"img":I("indice-degout-recul.jpg"),"alt":"une élève recule légèrement et plisse le nez","audio":"Une élève recule légèrement, plisse le nez et éloigne sa main.","opts":OPTS("degout"),"ex":"Le nez plissé et le geste de recul indiquent souvent le dégoût."},
        {"img":I("scene-joie-atelier.jpg"),"alt":"un élève sourit après une réussite en atelier","audio":"Un élève sourit après une réussite en atelier.","opts":OPTS("joie"),"ex":"Sourire, posture ouverte et geste de satisfaction : c’est la joie ou la fierté."}
      ]
    },
    {
      "temps":"entraine","type":"imagepick","tag":"Comparer les indices",
      "instr":"Lis la consigne, puis choisis l’image qui correspond le mieux.",
      "items":[
        {
          "text":"Trouve la personne qui semble avoir peur ou être très stressée.",
          "audio":"Trouve la personne qui semble avoir peur ou être très stressée.",
          "options":IMGOPTS("peur",[
            {"k":"peur","f":"indice-peur-corps.jpg","alt":"élève inquiète, main sur la poitrine","ex":"Oui : le corps est tendu et le regard est inquiet."},
            {"k":"surprise","f":"indice-surprise-visage.jpg","alt":"élève surpris devant une feuille"},
            {"k":"tristesse","f":"indice-tristesse-posture.jpg","alt":"élève triste, regard baissé"},
            {"k":"degout","f":"indice-degout-recul.jpg","alt":"élève dégoûtée, main en recul"}
          ])
        },
        {
          "text":"Trouve la personne dont le visage et les mains montrent une tension de colère.",
          "audio":"Trouve la personne dont le visage et les mains montrent une tension de colère.",
          "options":IMGOPTS("colere",[
            {"k":"joie","f":"indice-joie-visage-corps.jpg","alt":"élève joyeuse"},
            {"k":"colere","f":"indice-colere-tension.jpg","alt":"élève en colère","ex":"Oui : sourcils froncés, mains serrées, posture tendue."},
            {"k":"surprise","f":"nuance-surprise-pas-peur.jpg","alt":"élève surpris"},
            {"k":"calme","f":"nuance-calme-attention.jpg","alt":"élève calme et attentif"}
          ])
        },
        {
          "text":"Trouve la scène où le corps recule parce que quelque chose repousse la personne.",
          "audio":"Trouve la scène où le corps recule parce que quelque chose repousse la personne.",
          "options":IMGOPTS("degout",[
            {"k":"degout","f":"scene-degout-cuisine.jpg","alt":"élève devant un aliment abîmé","ex":"Oui : recul, grimace et main qui éloigne indiquent le dégoût."},
            {"k":"tristesse","f":"scene-tristesse-isolement.jpg","alt":"élève isolée"},
            {"k":"joie","f":"scene-joie-atelier.jpg","alt":"élève heureux en atelier"},
            {"k":"peur","f":"scene-peur-evaluation.jpg","alt":"élève inquiet avant une évaluation"}
          ])
        },
        {
          "text":"Trouve la personne qui semble surtout triste : corps fermé, regard bas, peu d’énergie.",
          "audio":"Trouve la personne qui semble surtout triste.",
          "options":IMGOPTS("tristesse",[
            {"k":"tristesse","f":"scene-tristesse-isolement.jpg","alt":"élève assise à l’écart","ex":"Oui : isolement, regard bas et posture fermée orientent vers la tristesse."},
            {"k":"colere","f":"scene-colere-limite.jpg","alt":"élève en colère en atelier"},
            {"k":"surprise","f":"scene-surprise-consigne.jpg","alt":"élève surpris en classe"},
            {"k":"joie","f":"nuance-soulagement-joie.jpg","alt":"élève soulagé après une tâche"}
          ])
        }
      ]
    },
    {
      "temps":"situation","type":"grid","title":"🧱 Le mur des émotions",
      "instr":"Trouve TOUTES les images qui montrent surtout de la colère ou une forte tension.",
      "audio":"Trouve toutes les images qui montrent surtout de la colère ou une forte tension.",
      "success":"Bravo ! Tu as repéré plusieurs indices de colère : visage tendu, bras fermés, mains serrées.",
      "miss":"Pas celle-ci. Cherche plutôt sourcils froncés, mâchoire tendue, mains serrées ou bras fermés.",
      "faces":[
        {"img":I("indice-colere-tension.jpg"),"ok":true,"alt":"visage en colère, mains serrées"},
        {"img":I("indice-joie-visage-corps.jpg"),"ok":false,"alt":"visage joyeux"},
        {"img":I("nuance-colere-blessee.jpg"),"ok":true,"alt":"élève contrariée face à une critique"},
        {"img":I("indice-peur-corps.jpg"),"ok":false,"alt":"élève inquiète"},
        {"img":I("scene-colere-limite.jpg"),"ok":true,"alt":"élève contrarié en atelier"},
        {"img":I("indice-surprise-visage.jpg"),"ok":false,"alt":"élève surpris"},
        {"img":I("nuance-calme-attention.jpg"),"ok":false,"alt":"élève calme et attentif"},
        {"img":I("indice-degout-recul.jpg"),"ok":false,"alt":"élève dégoûtée"},
        {"img":I("indice-tristesse-posture.jpg"),"ok":false,"alt":"élève triste"}
      ]
    },
    {
      "temps":"situation","type":"grid","title":"🧱 Le mur peur / stress",
      "instr":"Trouve TOUTES les images qui montrent surtout de la peur, du stress ou de l’appréhension.",
      "audio":"Trouve toutes les images qui montrent surtout de la peur, du stress ou de l’appréhension.",
      "success":"Très bien. Tu as distingué peur / stress de surprise, tristesse ou calme.",
      "miss":"Pas celle-ci. Cherche plutôt regard inquiet, corps tendu, main vers le ventre ou la poitrine.",
      "faces":[
        {"img":I("indice-peur-corps.jpg"),"ok":true,"alt":"élève inquiète, main sur la poitrine et le ventre"},
        {"img":I("scene-peur-evaluation.jpg"),"ok":true,"alt":"élève inquiète avant une évaluation"},
        {"img":I("nuance-surprise-pas-peur.jpg"),"ok":false,"alt":"élève surpris par une annonce"},
        {"img":I("indice-surprise-visage.jpg"),"ok":false,"alt":"élève surpris devant une feuille"},
        {"img":I("scene-tristesse-isolement.jpg"),"ok":false,"alt":"élève isolée et triste"},
        {"img":I("nuance-calme-attention.jpg"),"ok":false,"alt":"élève calme et attentif"},
        {"img":I("scene-colere-limite.jpg"),"ok":false,"alt":"élève en colère en atelier"},
        {"img":I("indice-degout-recul.jpg"),"ok":false,"alt":"élève dégoûtée"},
        {"img":I("nuance-soulagement-joie.jpg"),"ok":false,"alt":"élève soulagé"}
      ]
    },
    {
      "temps":"point","type":"wrap",
      "keep":[
        {"ic":"👀","html":"On reconnaît une émotion avec des <strong>indices visibles</strong> : visage, corps, gestes."},
        {"ic":"🎬","html":"Le <strong>contexte</strong> aide à comprendre : réussite, critique, surprise, danger, rejet."},
        {"ic":"🔎","html":"On formule une <strong>hypothèse</strong> : « il semble... », « elle a l’air... »."}
      ],
      "self":["Je repère des indices sur le visage et le corps","Je compare plusieurs images avant de répondre","Je peux nommer l’émotion la plus probable"]
    }
  ]
});
</script>
</body>
</html>
