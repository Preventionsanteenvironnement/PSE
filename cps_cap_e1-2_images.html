<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPS E1.2 — Reconnaître les émotions (images)</title>
<link rel="stylesheet" href="assets/cps_kit.css">
</head>
<body>
<div id="cps-app"></div>
<script src="assets/cps_kit.js"></script>
<script>
var OPTS = function(bonne){
  return [
    {"l":"😀 Joie","ok":bonne==="joie"},
    {"l":"😢 Tristesse","ok":bonne==="tristesse"},
    {"l":"😡 Colère","ok":bonne==="colere"},
    {"l":"😨 Peur","ok":bonne==="peur"},
    {"l":"😲 Surprise","ok":bonne==="surprise"},
    {"l":"🤢 Dégoût","ok":bonne==="degout"}
  ];
};
CPS.init({
  "theme":"emo",
  "code":"E1.2",
  "ref":"Identifier ses émotions",
  "icon":"🙂",
  "title":"Reconnaître les émotions",
  "subtitle":"Lis l’émotion sur le visage.",
  "parcours":[
    {
      "temps":"decouvre","type":"lesson","title":"💡 Lire une émotion sur un visage",
      "audio":"On reconnaît une émotion sur le visage : les yeux, la bouche, les sourcils. Voici les 6 grandes familles d’émotions. Ici, tu reconnais juste la grande famille, pas le mot exact.",
      "blocks":[
        {"ic":"👀","html":"On lit l’émotion sur le <strong>visage</strong> : les <strong>yeux</strong>, la <strong>bouche</strong>, les <strong>sourcils</strong>."},
        {"img":"assets/emotions/affiche-emotions-primaires.png","alt":"Affiche des 6 émotions primaires","html":"Les 6 grandes familles d’émotions <em>(clique l’image pour l’agrandir)</em> :"},
        {"ic":"🎯","html":"Tu reconnais juste la <strong>grande famille</strong> (joie, peur, colère…). Pas besoin de deviner le mot exact."}
      ],
      "cta":"▶️ Je m’entraîne"
    },
    {
      "temps":"entraine","type":"cardpick","variant":"quiz",
      "instr":"Regarde le visage. Quelle émotion ? (Clique l’image pour l’agrandir.)",
      "items":[
        {"img":"assets/emotions/joie-joyeux.png","alt":"un visage","opts":OPTS("joie"),"ex":"Grand sourire, yeux plissés : c’est la joie."},
        {"img":"assets/emotions/peur-effraye.jpeg","alt":"un visage","opts":OPTS("peur"),"ex":"Yeux grands ouverts, mains près du visage : c’est la peur."},
        {"img":"assets/emotions/colere-furieuse.png","alt":"un visage","opts":OPTS("colere"),"ex":"Sourcils froncés, bouche serrée : c’est la colère."},
        {"img":"assets/emotions/tristesse-triste.png","alt":"un visage","opts":OPTS("tristesse"),"ex":"Bouche vers le bas, regard baissé : c’est la tristesse."},
        {"img":"assets/emotions/surprise-surpris.png","alt":"un visage","opts":OPTS("surprise"),"ex":"Yeux et bouche grands ouverts : c’est la surprise."},
        {"img":"assets/emotions/degout-degoute.png","alt":"un visage","opts":OPTS("degout"),"ex":"Nez plissé, bouche qui recule : c’est le dégoût."}
      ]
    },
    {
      "temps":"situation","type":"grid","title":"🧱 Le mur des visages",
      "instr":"Trouve TOUS les visages en colère. (Agrandis avec 🔍 si besoin.)",
      "audio":"Trouve tous les visages en colère sur le mur.",
      "success":"Bravo ! Tu as trouvé tous les visages en colère.",
      "miss":"Non, ce visage n’est pas en colère.",
      "faces":[
        {"img":"assets/emotions/joie-contente.png","ok":false,"alt":"visage joie"},
        {"img":"assets/emotions/colere-agacee.png","ok":true,"alt":"visage colère"},
        {"img":"assets/emotions/peur-apeuree.png","ok":false,"alt":"visage peur"},
        {"img":"assets/emotions/colere-furieuse.png","ok":true,"alt":"visage colère"},
        {"img":"assets/emotions/surprise-etonne.png","ok":false,"alt":"visage surprise"},
        {"img":"assets/emotions/colere-en-colere.jpeg","ok":true,"alt":"visage colère"},
        {"img":"assets/emotions/tristesse-decu.png","ok":false,"alt":"visage tristesse"},
        {"img":"assets/emotions/colere-enerve.png","ok":true,"alt":"visage colère"},
        {"img":"assets/emotions/degout-repugne.png","ok":false,"alt":"visage dégoût"}
      ]
    },
    {
      "temps":"point","type":"wrap",
      "keep":[
        {"ic":"👀","html":"On reconnaît une émotion sur le <strong>visage</strong> (yeux, bouche, sourcils)."},
        {"ic":"🎯","html":"6 grandes familles : joie, tristesse, colère, peur, surprise, dégoût."},
        {"ic":"💪","html":"Reconnaître l’émotion de l’autre aide à mieux <strong>réagir</strong>."}
      ],
      "self":["Je reconnais l’émotion sur un visage","Je connais les 6 grandes familles d’émotions"]
    }
  ]
});
</script>
</body>
</html>
