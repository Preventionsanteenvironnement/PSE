<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPS C1.4 — Coup de tête ou bon choix ?</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#f4f7fc;color:#1e293b;line-height:1.6;padding-bottom:40px}
.wrap{max-width:640px;margin:0 auto;padding:14px}
.back{display:inline-block;color:#1d4ed8;text-decoration:none;font-weight:800;font-size:1rem;margin-bottom:10px}
.back:hover{text-decoration:underline}
.prog{position:sticky;top:0;z-index:5;background:#f4f7fc;padding:6px 0 10px}
.prog .label{font-size:.78rem;font-weight:800;color:#1e40af;margin-bottom:4px;text-align:center}
.prog .track{height:10px;background:#dbeafe;border-radius:20px;overflow:hidden}
.prog .track > i{display:block;height:100%;width:0;background:linear-gradient(90deg,#1d4ed8,#3b82f6);border-radius:20px;transition:width .4s ease}
.card{background:#fff;border-radius:20px;padding:22px;box-shadow:0 3px 14px rgba(0,0,0,.06);animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.hero{background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff;border-radius:20px;padding:26px 20px;text-align:center;margin-bottom:6px}
.hero .ic{font-size:3rem;display:block;margin-bottom:6px}
.hero h1{font-size:1.5rem;font-weight:900}
.hero p{opacity:.95;font-size:.96rem;margin-top:6px}
.txt{font-size:1.12rem;font-weight:600;line-height:1.5;margin:6px 0 12px}
.teach{background:#eff6ff;border-left:6px solid #1d4ed8;border-radius:0 12px 12px 0;padding:12px 14px;font-size:1.04rem;margin-bottom:12px}
.steps3{list-style:none;margin:8px 0}
.steps3 li{background:#eff6ff;border-radius:12px;padding:11px 13px;margin-bottom:8px;font-size:1.03rem;font-weight:600}
.steps3 b{color:#1e40af}
.q{font-size:1.12rem;font-weight:800;color:#1e40af;margin:6px 0 12px}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{display:block;width:100%;text-align:left;padding:15px 16px;border-radius:14px;border:2px solid #bfdbfe;background:#fff;cursor:pointer;font-family:inherit;font-size:1.05rem;font-weight:700;color:#1e293b;transition:.15s}
.opt:hover:not(:disabled){border-color:#1d4ed8;background:#eff6ff}
.opt:disabled{cursor:default}
.opt.ok{border-color:#22c55e;background:#dcfce7;color:#166534}
.opt.no{border-color:#fca5a5;background:#fee2e2;color:#991b1b}
.case{border:2px solid #bfdbfe;border-radius:14px;padding:13px;margin-bottom:10px;background:#fff}
.case .sit{font-size:1.05rem;font-weight:700}
.case .ct{margin-top:8px;font-size:.98rem;color:#475569}
.case .lt{margin-top:8px;background:#fff7ed;border:2px solid #fed7aa;border-radius:10px;padding:9px 11px;font-size:.98rem;color:#9a3412;display:none}
.case .lt.show{display:block;animation:fade .3s}
.case .rev{margin-top:9px;background:#1d4ed8;color:#fff;border:none;border-radius:10px;padding:8px 13px;font-weight:800;cursor:pointer;font-family:inherit}
.arg{border:2px solid #e2e8f0;border-radius:12px;padding:11px 12px;margin-bottom:9px;background:#fff}
.arg .al{font-weight:700;font-size:1.02rem;margin-bottom:7px}
.arg .ab{display:flex;gap:8px}
.arg .ab button{flex:1;border:2px solid #cbd5e1;background:#f8fafc;border-radius:10px;padding:8px;font-weight:800;cursor:pointer;font-family:inherit;font-size:.98rem}
.arg.done.pour{border-color:#86efac;background:#f0fdf4}
.arg.done.contre{border-color:#fca5a5;background:#fff7ed}
.arg .why{margin-top:7px;font-size:.92rem;font-weight:600;color:#475569;display:none}
.arg.done .why{display:block}
.arg.done .ab{display:none}
.fb{margin-top:14px}
.msg{border-radius:14px;padding:13px 15px;font-weight:700;font-size:1rem;animation:fade .3s}
.msg.good{background:#dcfce7;border:2px solid #86efac;color:#166534}
.msg.bad{background:#fff7ed;border:2px solid #fed7aa;color:#9a3412}
.msg.win{background:#dbeafe;border:2px solid #93c5fd;color:#1e40af;font-size:1.05rem}
.btn{display:block;width:100%;background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff;border:none;border-radius:14px;padding:15px;font-size:1.1rem;font-weight:800;cursor:pointer;font-family:inherit;margin-top:12px;text-align:center;text-decoration:none}
.btn:active{transform:translateY(1px)}
.btn.soft{background:#e0e7ff;color:#3730a3}
.say{float:right;background:#eff6ff;color:#1d4ed8;border:none;border-radius:10px;padding:6px 11px;font-size:.95rem;font-weight:800;cursor:pointer}
.recap{list-style:none;margin:10px 0 0}
.recap li{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:10px 13px;margin-bottom:8px;font-size:.98rem}
.badge{text-align:center;font-size:1.1rem;font-weight:900;color:#1e40af;margin:10px 0}
@media(max-width:600px){.wrap{padding:10px}.card{padding:16px}.txt{font-size:1.05rem}.hero h1{font-size:1.3rem}}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← Accueil</a>
  <div class="prog"><div class="label" id="proglabel"></div><div class="track"><i id="progbar"></i></div></div>
  <div id="scene"></div>
</div>
<script>
(function(){
  var scene=document.getElementById('scene');
  var idx=0;
  function speak(t){ try{ if(!('speechSynthesis' in window))return; speechSynthesis.cancel(); var u=new SpeechSynthesisUtterance(String(t).replace(/<[^>]+>/g,'')); u.lang='fr-FR'; u.rate=0.95; speechSynthesis.speak(u);}catch(e){} }
  function go(i){ idx=i; try{speechSynthesis.cancel();}catch(e){} render(); }
  function progress(){ document.getElementById('progbar').style.width=Math.round(idx/(STEPS.length-1)*100)+'%'; document.getElementById('proglabel').textContent='Étape '+(idx+1)+' / '+STEPS.length; }
  function continueBtn(label){ var b=document.createElement('button'); b.className='btn'; b.textContent=label||'Continuer →'; b.onclick=function(){ go(idx+1); }; return b; }

  var STEPS=[
    { type:'intro', text:"On prend des dizaines de décisions chaque jour. Certaines sur un <strong>coup de tête</strong>… et on les regrette. Vous allez apprendre à <strong>décider de façon réfléchie</strong>." },

    { type:'consequence', title:"⚡ Le coup de tête",
      intro:"Voici trois décisions prises sur un coup de tête. Cliquez sur <strong>« Et après ? »</strong> pour voir la suite.",
      items:[
        {sit:"Vexé, Yanis insulte le professeur et claque la porte.",court:"😮‍💨 Sur le moment : ça le soulage.",long:"😟 Plus tard : il est exclu deux jours et doit s’excuser."},
        {sit:"Inès dépense tout son argent dans un achat en ligne « en promo ».",court:"😄 Sur le moment : elle est contente.",long:"😟 Plus tard : elle ne peut plus payer la sortie prévue avec ses amis."},
        {sit:"En colère, Tom envoie un message méchant à un ami.",court:"😤 Sur le moment : ça défoule.",long:"😟 Plus tard : l’ami est blessé et la dispute s’aggrave."}
      ],
      concl:"Sur le coup, ça soulage. Mais <strong>après</strong>, on regrette souvent. Une décision a des <strong>conséquences dans le temps</strong>." },

    { type:'notion',
      teach:"Décider sur un coup de tête, c’est décider <strong>sans réfléchir</strong>, juste sur l’émotion du moment. Décider de façon réfléchie, c’est <strong>prendre le temps</strong> de penser aux conséquences.",
      q:"Décider sur un coup de tête, c’est…",
      options:[
        {l:"décider sans réfléchir, et souvent on le regrette",ok:true},
        {l:"toujours le meilleur choix",ok:false},
        {l:"réfléchir très longtemps avant d’agir",ok:false}
      ],
      wrong:"Pas tout à fait. Un coup de tête, c’est agir sur l’émotion, sans penser à la suite.",
      good:"Exactement. On agit sur l’émotion du moment, sans penser aux conséquences." },

    { type:'method', title:"🧭 Les 3 réflexes pour bien décider",
      intro:"Pour une décision importante, gardez ces trois réflexes :",
      steps:[
        "<b>① STOP</b> — je ne réponds pas tout de suite, je respire.",
        "<b>② Et après ?</b> — je pense aux conséquences de chaque choix.",
        "<b>③ Je choisis</b> — ce qui est bon pour moi sur la durée."
      ],
      cta:"Je m’entraîne →" },

    { type:'balance',
      dilemma:"Des copains vous proposent de sécher le cours de l’après-midi.",
      q:"Pour chaque argument : est-ce un <strong>pour</strong> (un avantage) ou un <strong>contre</strong> (un coût) ?",
      args:[
        {l:"Un moment sympa avec les copains",side:"pour",why:"C’est un petit plaisir immédiat."},
        {l:"Zéro au contrôle de l’après-midi",side:"contre",why:"Une vraie perte, difficile à rattraper."},
        {l:"Des ennuis avec les parents et le lycée",side:"contre",why:"Un coût lourd, qui dure."},
        {l:"Du retard dans le programme",side:"contre",why:"Un coût qui s’accumule."}
      ],
      concl:"La balance penche : <strong>1 avantage très court</strong> contre <strong>3 coûts qui durent</strong>. Décision réfléchie : <strong>je reste en cours.</strong>" },

    { type:'cases',
      teach:"À vous de décider. Repérez à chaque fois le choix <strong>réfléchi</strong>.",
      q:"Quel est le choix réfléchi ?",
      items:[
        { text:"Quelqu’un vous bouscule dans le couloir, sans faire exprès. Vous…",
          options:[
            {l:"Je respire et j’attends de voir s’il s’excuse",good:true,fb:"Réfléchi : vous laissez retomber l’émotion avant d’agir."},
            {l:"Je le pousse aussitôt",good:false,fb:"Coup de tête : la bagarre, l’exclusion… des ennuis pour rien."},
            {l:"Je l’insulte devant tout le monde",good:false,fb:"L’émotion décide à votre place, et ça dégénère."}
          ] },
        { text:"On vous propose de partager une vidéo qui se moque d’un élève. Vous…",
          options:[
            {l:"Je réfléchis : ça peut blesser et me causer des ennuis. Je ne partage pas.",good:true,fb:"Réfléchi : vous pensez aux conséquences, pour l’autre et pour vous."},
            {l:"Je la partage tout de suite, c’est drôle",good:false,fb:"Coup de tête : harcèlement, sanctions… on le regrette vite."},
            {l:"Je l’envoie juste à deux amis",good:false,fb:"Même partagée à deux, elle continue de circuler et de blesser."}
          ] }
      ] },

    { type:'perso',
      text:"À vous. Pensez à une décision que vous devez <strong>bientôt prendre</strong>. Pour chaque choix possible, demandez-vous : <strong>« et après ? »</strong> Quelles conséquences ?",
      note:"Répondez dans votre tête, à l’oral (🔊) ou en une phrase. Il n’y a pas de mauvaise réponse." },

    { type:'bilan',
      recap:[
        "⏸️ Avant de décider : <strong>STOP</strong>, je ne réponds pas sur un coup de tête.",
        "🔮 Je me demande <strong>« et après ? »</strong> — je pense aux conséquences.",
        "⚖️ Je pèse le <strong>pour et le contre</strong>, puis je choisis ce qui est bon pour moi sur la durée."
      ] }
  ];

  function render(){
    var s=STEPS[idx]; progress(); window.scrollTo({top:0,behavior:'smooth'});

    if(s.type==='intro'){
      scene.innerHTML='<div class="hero"><span class="ic">⚖️</span><h1>Coup de tête ou bon choix ?</h1><p>Compétence C1.4 · Santé publique France 2025</p></div><div class="card"><p class="txt">'+s.text+'</p></div>';
      var b=document.createElement('button'); b.className='btn'; b.textContent='▶️ Commencer'; b.onclick=function(){ go(idx+1); }; scene.querySelector('.card').appendChild(b); return;
    }

    if(s.type==='consequence'){
      scene.innerHTML='<div class="card"><button class="say">🔊 Écouter</button><div class="q">'+s.title+'</div><p class="txt" style="font-weight:600;font-size:1rem">'+s.intro+'</p><div id="cs"></div><div class="fb"></div></div>';
      scene.querySelector('.say').onclick=function(){ speak(s.intro); };
      var cs=scene.querySelector('#cs');
      s.items.forEach(function(it){
        var d=document.createElement('div'); d.className='case';
        d.innerHTML='<div class="sit">'+it.sit+'</div><div class="ct">'+it.court+'</div><button class="rev">🔮 Et après ?</button><div class="lt">'+it.long+'</div>';
        d.querySelector('.rev').onclick=function(){ d.querySelector('.lt').classList.add('show'); this.style.display='none'; };
        cs.appendChild(d);
      });
      var fb=scene.querySelector('.fb'); fb.innerHTML='<div class="msg bad">'+s.concl+'</div>'; fb.appendChild(continueBtn());
      return;
    }

    if(s.type==='notion'){
      scene.innerHTML='<div class="card"><button class="say">🔊 Écouter</button><div class="teach">'+s.teach+'</div><div class="q">'+s.q+'</div><div class="opts"></div><div class="fb"></div></div>';
      scene.querySelector('.say').onclick=function(){ speak(s.teach+' '+s.q); };
      var opts=scene.querySelector('.opts'), fb=scene.querySelector('.fb'), done=false;
      s.options.forEach(function(o){
        var b=document.createElement('button'); b.className='opt'; b.textContent=o.l;
        b.onclick=function(){
          if(done)return;
          if(o.ok){ done=true; opts.querySelectorAll('.opt').forEach(function(x){x.disabled=true;}); b.classList.add('ok'); fb.innerHTML='<div class="msg good">✓ '+s.good+'</div>'; fb.appendChild(continueBtn()); }
          else { b.classList.add('no'); b.disabled=true; fb.innerHTML='<div class="msg bad">💡 '+s.wrong+' <strong>Réessayez.</strong></div>'; }
        };
        opts.appendChild(b);
      });
      return;
    }

    if(s.type==='method'){
      var h='<div class="card"><button class="say">🔊 Écouter</button><div class="q">'+s.title+'</div><p class="txt" style="font-weight:600;font-size:1rem">'+s.intro+'</p><ul class="steps3">';
      s.steps.forEach(function(x){ h+='<li>'+x+'</li>'; });
      h+='</ul></div>';
      scene.innerHTML=h;
      scene.querySelector('.say').onclick=function(){ speak(s.intro+' '+s.steps.join('. ')); };
      var b=document.createElement('button'); b.className='btn'; b.textContent=s.cta; b.onclick=function(){ go(idx+1); }; scene.querySelector('.card').appendChild(b);
      return;
    }

    if(s.type==='balance'){
      scene.innerHTML='<div class="card"><button class="say">🔊 Écouter</button><p class="txt">'+s.dilemma+'</p><div class="q" style="font-size:1rem">'+s.q+'</div><div id="ar"></div><div class="fb"></div></div>';
      scene.querySelector('.say').onclick=function(){ speak(s.dilemma+'. '+s.q); };
      var ar=scene.querySelector('#ar'), fb=scene.querySelector('.fb'), answered=0;
      s.args.forEach(function(a){
        var d=document.createElement('div'); d.className='arg';
        d.innerHTML='<div class="al">'+a.l+'</div><div class="ab"><button data-s="pour">👍 Pour</button><button data-s="contre">👎 Contre</button></div><div class="why"></div>';
        d.querySelectorAll('.ab button').forEach(function(btn){
          btn.onclick=function(){
            var pick=btn.getAttribute('data-s');
            d.classList.add('done', a.side);
            var ok=(pick===a.side);
            d.querySelector('.why').innerHTML=(ok?'✓ ':'💡 ')+'C’est un <strong>'+(a.side==='pour'?'pour':'contre')+'</strong> : '+a.why;
            answered++;
            if(answered===s.args.length){ fb.innerHTML='<div class="msg win">⚖️ '+s.concl+'</div>'; fb.appendChild(continueBtn()); }
          };
        });
        ar.appendChild(d);
      });
      return;
    }

    if(s.type==='cases'){
      var j=0;
      scene.innerHTML='<div class="card"><button class="say">🔊 Écouter</button><div class="teach">'+s.teach+'</div><div class="q">'+s.q+'</div><div id="cc"></div></div>';
      scene.querySelector('.say').onclick=function(){ speak(s.teach); };
      var area=scene.querySelector('#cc');
      function drawCase(){
        var it=s.items[j];
        area.innerHTML='<p class="txt">'+it.text+'</p><div class="opts"></div><div class="fb"></div>';
        var opts=area.querySelector('.opts'), fb=area.querySelector('.fb'), done=false;
        it.options.forEach(function(o){
          var b=document.createElement('button'); b.className='opt'; b.textContent=o.l;
          b.onclick=function(){
            if(done)return;
            if(o.good){ done=true; opts.querySelectorAll('.opt').forEach(function(x){x.disabled=true;}); b.classList.add('ok'); fb.innerHTML='<div class="msg good">✓ '+o.fb+'</div>'; var nb=document.createElement('button'); nb.className='btn'; nb.textContent=(j>=s.items.length-1)?'Continuer →':'Situation suivante →'; nb.onclick=function(){ if(j>=s.items.length-1){ go(idx+1);} else {j++; drawCase();} }; fb.appendChild(nb); }
            else { b.classList.add('no'); b.disabled=true; fb.innerHTML='<div class="msg bad">💡 '+o.fb+' <strong>Réessayez.</strong></div>'; }
          };
          opts.appendChild(b);
        });
      }
      drawCase();
      return;
    }

    if(s.type==='perso'){
      scene.innerHTML='<div class="card"><button class="say">🔊 Écouter</button><p class="txt">'+s.text+'</p><div class="msg" style="background:#eff6ff;border:2px solid #bfdbfe;color:#1e40af">'+s.note+'</div></div>';
      scene.querySelector('.say').onclick=function(){ speak(s.text); };
      var b=document.createElement('button'); b.className='btn'; b.textContent="J’y ai réfléchi →"; b.onclick=function(){ go(idx+1); }; scene.querySelector('.card').appendChild(b); return;
    }

    if(s.type==='bilan'){
      var h='<div class="hero"><span class="ic">🏁</span><h1>Bien joué !</h1><p>Vous savez décider de façon réfléchie.</p></div><div class="card"><div class="badge">⚖️ Bon décideur</div><p class="txt" style="font-size:1rem;font-weight:800;color:#1e40af">Ce que vous avez appris :</p><ul class="recap">';
      s.recap.forEach(function(r){ h+='<li>'+r+'</li>'; });
      h+='</ul></div>';
      scene.innerHTML=h;
      var c=scene.querySelector('.card');
      var rb=document.createElement('button'); rb.className='btn'; rb.textContent='🔄 Recommencer'; rb.onclick=function(){ go(0); }; c.appendChild(rb);
      var hb=document.createElement('a'); hb.className='btn soft'; hb.href='index.html'; hb.textContent='← Retour à l’accueil'; c.appendChild(hb);
      return;
    }
  }
  render();
})();
</script>
</body>
</html>
