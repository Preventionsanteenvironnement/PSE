<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Questionnaire de Proust</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 20px; font-family: 'Inter', sans-serif; background: #0f172a; color: white; min-height: 100dvh; display: flex; flex-direction: column; }

        #login-screen { position: fixed; inset: 0; background: #0f172a; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #login-screen h1 { margin-bottom: 10px; }
        #display-pseudo { font-size: 1.5rem; font-weight: bold; color: #a78bfa; margin-bottom: 20px; }

        #app-screen { display: none; flex-direction: column; height: 100%; max-width: 500px; margin: 0 auto; width: 100%; }

        .header { text-align: center; margin-bottom: 20px; }
        .label { font-size: 0.7rem; text-transform: uppercase; color: #94a3b8; letter-spacing: 1px; font-weight: bold; margin-bottom: 8px; }
        .question-card { background: linear-gradient(135deg, #7c3aed 0%, #a78bfa 100%); padding: 25px; border-radius: 16px; font-size: 1.3rem; font-weight: 800; color: white; min-height: 100px; display: flex; align-items: center; justify-content: center; text-align: center; line-height: 1.4; box-shadow: 0 8px 30px rgba(124, 58, 237, 0.3); }
        .question-number { position: absolute; top: -10px; right: -10px; background: #f59e0b; color: #0f172a; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.9rem; }

        .input-wrapper { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; margin-top: 20px; }
        textarea { width: 100%; height: 120px; padding: 18px; border: 2px solid #334155; border-radius: 12px; background: #1e293b; color: white; font-size: 1.1rem; font-family: 'Inter', sans-serif; resize: none; outline: none; transition: 0.3s; }
        textarea:focus { border-color: #7c3aed; box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.2); }
        textarea::placeholder { color: #64748b; }

        button { width: 100%; padding: 18px; border: none; border-radius: 12px; background: #7c3aed; color: white; font-size: 1.1rem; font-weight: 800; cursor: pointer; box-shadow: 0 4px 0 #6d28d9; transition: 0.1s; margin-top: 15px; }
        button:active { transform: translateY(4px); box-shadow: none; }

        .status { text-align: center; font-weight: bold; font-size: 0.9rem; opacity: 0; transition: 0.3s; margin-top: 10px; color: #22c55e; }
        .footer { text-align: center; font-size: 0.8rem; color: #64748b; margin-top: auto; padding-top: 20px; }

        #lock-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); z-index: 50; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        #waiting-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); z-index: 40; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .sent-list { margin-top: 15px; }
        .sent-item { background: #1e293b; padding: 10px 15px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid #7c3aed; font-size: 0.9rem; }
        .sent-item .sq { color: #a78bfa; font-size: 0.75rem; font-weight: bold; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>💭 Questionnaire de Proust</h1>
        <p style="color:#64748b; margin-bottom:20px;">Apprends à te connaître</p>
        <div id="display-pseudo"></div>
        <button onclick="joinSession()">COMMENCER</button>
    </div>

    <div id="app-screen">
        <div class="header">
            <div class="label">Question du prof</div>
            <div id="question-display" class="question-card">En attente d'une question...</div>
        </div>

        <div class="input-wrapper" id="input-area">
            <textarea id="answer-input" placeholder="Ta réponse ici..."></textarea>
            <button onclick="sendAnswer()">ENVOYER 🚀</button>
            <div id="status-msg" class="status"></div>
        </div>

        <div class="sent-list" id="sent-list"></div>
        <div class="footer">Connecté : <b id="display-name">...</b></div>

        <div id="lock-overlay">
            <div style="font-size:4rem;">⏸️</div>
            <div style="font-size:1.5rem; font-weight:900; color:#a78bfa; margin-top:10px;">En attente de la prochaine question...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAWdCMvOiAJln3eT9LIAQD3RWJUD0lQcLI", authDomain: "devoirs-pse.firebaseapp.com", projectId: "devoirs-pse", storageBucket: "devoirs-pse.firebasestorage.app", messagingSenderId: "614730413904", appId: "1:614730413904:web:a5dd478af5de30f6bede55" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const PSEUDOS = ["Panda 🐼","Etoile ⭐","Fusee 🚀","Diamant 💎","Tigre 🐯","Dragon 🐉","Licorne 🦄","Phoenix 🔥","Ninja 🥷","Robot 🤖","Koala 🐨","Dauphin 🐬","Aigle 🦅","Papillon 🦋","Lion 🦁","Comete ☄️","Eclair ⚡","Flocon ❄️","Soleil ☀️","Lune 🌙","Galaxie 🌌","Hibou 🦉","Renard 🦊","Tornade 🌪️","Volcan 🌋","Cristal 💠","Trefle 🍀","Cerise 🍒","Arc-en-ciel 🌈","Pingouin 🐧"];
        let myName = PSEUDOS[Math.floor(Math.random() * PSEUDOS.length)];
        document.getElementById('display-pseudo').textContent = myName;

        const urlParams = new URLSearchParams(window.location.search);
        let currentSessionId = urlParams.get('sessionId') || null;
        if (!currentSessionId) {
            onSnapshot(doc(db, "proust_config", "global"), (snap) => {
                if (snap.exists() && snap.data().sessionId) currentSessionId = snap.data().sessionId;
            });
        }

        let currentQuestion = null;
        let currentQuestionNum = 0;

        window.joinSession = async () => {
            document.getElementById('display-name').innerText = myName;
            await addDoc(collection(db, "proust_presence"), { name: myName, timestamp: Date.now(), sessionId: currentSessionId || null });
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'flex';
            history.pushState({ screen: 'app' }, '', location.pathname + location.search);
        };

        onSnapshot(doc(db, "proust_config", "global"), (snap) => {
            if (!snap.exists()) return;
            const d = snap.data();
            const qDisplay = document.getElementById('question-display');
            const lock = document.getElementById('lock-overlay');
            const input = document.getElementById('input-area');

            if (d.question && d.question.length > 0) {
                currentQuestion = d.question;
                currentQuestionNum = d.questionNum || 0;
                qDisplay.innerText = d.question;
                lock.style.display = 'none';
                input.style.display = 'flex';
                document.getElementById('answer-input').value = '';
                document.getElementById('answer-input').focus();
            } else {
                lock.style.display = 'flex';
                input.style.display = 'none';
            }

            if (d.isLocked) {
                lock.style.display = 'flex';
                input.style.display = 'none';
            }
        });

        window.sendAnswer = async () => {
            const input = document.getElementById('answer-input');
            const txt = input.value.trim();
            if (!txt || !currentQuestion) return;

            try {
                await addDoc(collection(db, "proust_reponses"), {
                    pseudo: myName,
                    question: currentQuestion,
                    questionNum: currentQuestionNum,
                    reponse: txt,
                    sessionId: currentSessionId || null,
                    timestamp: Date.now()
                });
                input.value = '';
                const list = document.getElementById('sent-list');
                list.innerHTML = '<div class="sent-item"><div class="sq">Q' + currentQuestionNum + ' : ' + currentQuestion + '</div>' + escapeHtml(txt) + '</div>' + list.innerHTML;
                showStatus("Envoyé !");
            } catch(e) {
                showStatus("Erreur...");
            }
        };

        function showStatus(msg) {
            const el = document.getElementById('status-msg');
            el.innerText = msg; el.style.opacity = 1;
            setTimeout(() => el.style.opacity = 0, 2000);
        }

        function escapeHtml(t) { return t ? t.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') : ''; }

        history.replaceState({ screen: 'login' }, '', location.pathname + location.search);
        window.addEventListener('popstate', (e) => {
            if (e.state && e.state.screen === 'login') {
                document.getElementById('login-screen').style.display = '';
                document.getElementById('app-screen').style.display = 'none';
            }
        });
    </script>
</body>
</html>
