<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPS E1.2 — Nommer précisément mes émotions</title>
<link rel="stylesheet" href="assets/cps_kit.css?v=20260618-bd">
</head>
<body>
<div id="cps-app"></div>
<script src="assets/cps_kit.js?v=20260618-bd"></script>
<script>
var V = "assets/emotions/e1-vocab/";
var E = "assets/emotions/e1-2/";
var v = function(name){ return V + name; };
var e = function(name){ return E + name; };
function FAM(bonne){
  return [
    {"l":"😀 Famille joie","ok":bonne==="joie"},
    {"l":"😢 Famille tristesse","ok":bonne==="tristesse"},
    {"l":"😡 Famille colère","ok":bonne==="colere"},
    {"l":"😨 Famille peur","ok":bonne==="peur"},
    {"l":"😲 Famille surprise","ok":bonne==="surprise"},
    {"l":"😳 Famille honte / gêne","ok":bonne==="honte"}
  ];
}
function PRECIS(bonne){
  return [
    {"l":"Honte / gêne","ok":bonne==="honte"},
    {"l":"Frustration","ok":bonne==="frustration"},
    {"l":"Appréhension","ok":bonne==="apprehension"},
    {"l":"Fierté","ok":bonne==="fierte"},
    {"l":"Déception","ok":bonne==="deception"},
    {"l":"Soulagement","ok":bonne==="soulagement"}
  ];
}
CPS.init({
  "theme":"emo",
  "code":"E1.2",
  "ref":"Identifier ses émotions",
  "icon":"🌡️",
  "title":"Nommer précisément mes émotions",
  "subtitle":"Passe de “ça va pas” au mot juste.",
  "parcours":[
    {
      "temps":"decouvre","type":"lesson","title":"💡 Le mot juste aide à comprendre",
      "audio":"Identifier une émotion, ce n’est pas seulement dire bien ou mal. On peut préciser : frustration, appréhension, honte, fierté, déception, soulagement. Un mot précis aide à comprendre ce qui se passe, le besoin touché et l’action utile.",
      "blocks":[
        {"img":v("mini-nuances.gif"),"alt":"Mini-animation : appréhension, gêne, fierté","html":"Les émotions changent selon le <strong>contexte</strong>. Un mot précis aide à ne pas tout mélanger."},
        {"ic":"🌡️","html":"Une même famille peut avoir plusieurs intensités : <strong>agacé</strong>, <strong>en colère</strong>, <strong>furieux</strong>."},
        {"ic":"🧩","html":"Deux émotions peuvent exister ensemble : <strong>fier et gêné</strong>, <strong>surpris et inquiet</strong>, <strong>triste et en colère</strong>."},
        {"ic":"🔎","html":"On cherche : <strong>ce qui s’est passé</strong>, les <strong>signes visibles</strong>, le <strong>besoin touché</strong>, puis le mot le plus juste."},
        {"ic":"🎯","html":"Objectif : remplacer “je suis mal” par une phrase plus claire : <strong>je me sens...</strong> parce que..."}
      ],
      "cta":"▶️ Je m’entraîne"
    },
    {
      "temps":"entraine","type":"cardpick","variant":"quiz","tag":"Mot précis",
      "instr":"Observe l’image et la situation. Quel mot est le plus précis ?",
      "demo":{"img":v("nuance-apprehension-stage.jpg"),"alt":"Élève inquiète avec un dossier de stage","text":"La PFMP commence bientôt dans un lieu inconnu. L’élève est curieuse, mais tendue.","audio":"La PFMP commence bientôt dans un lieu inconnu. L’élève est curieuse, mais tendue.","opts":PRECIS("apprehension"),"ex":"L’appréhension mélange souvent curiosité et inquiétude avant quelque chose d’inconnu."},
      "items":[
        {"img":v("nuance-honte-gene.jpg"),"alt":"Élève gênée après une erreur en atelier","text":"Une erreur est visible et plusieurs personnes ont vu la scène.","audio":"Une erreur est visible et plusieurs personnes ont vu la scène.","opts":PRECIS("honte"),"ex":"Le regard des autres compte : on pense à la gêne ou à la honte, pas seulement à la tristesse."},
        {"img":v("nuance-frustration-obstacle.jpg"),"alt":"Élève bloqué devant une tâche en atelier","text":"La tâche bloque, l’élève essaie mais n’avance pas.","audio":"La tâche bloque, l’élève essaie mais n’avance pas.","opts":PRECIS("frustration"),"ex":"Il y a un obstacle entre l’élève et son objectif : frustration probable."},
        {"img":v("nuance-fierte-feedback.jpg"),"alt":"Élève recevant un retour positif","text":"Un adulte valorise le travail réalisé après des efforts.","audio":"Un adulte valorise le travail réalisé après des efforts.","opts":PRECIS("fierte"),"ex":"La réussite et la reconnaissance orientent vers la fierté."},
        {"img":v("nuance-deception-resultat.jpg"),"alt":"Élève déçu par un résultat","text":"Le résultat est moins bon que prévu malgré les efforts.","audio":"Le résultat est moins bon que prévu malgré les efforts.","opts":PRECIS("deception"),"ex":"Quand l’attente était plus haute que le résultat, le mot précis peut être déception."},
        {"img":v("nuance-soulagement-fin.jpg"),"alt":"Élève soulagée après une tâche difficile","text":"La tâche difficile est terminée. La tension retombe.","audio":"La tâche difficile est terminée. La tension retombe.","opts":PRECIS("soulagement"),"ex":"Le danger ou l’effort perçu diminue : c’est du soulagement."},
        {"img":e("nuance-colere-blessee.jpg"),"alt":"Élève contrariée après une critique","text":"La critique semble injuste. L’élève se ferme et reste tendue.","audio":"La critique semble injuste. L’élève se ferme et reste tendue.","opts":[
          {"l":"Colère blessée","ok":true},
          {"l":"Joie discrète","ok":false},
          {"l":"Surprise agréable","ok":false},
          {"l":"Dégoût alimentaire","ok":false}
        ],"ex":"Ici, la colère peut être mélangée à une blessure : besoin de respect ou de reconnaissance."}
      ]
    },
    {
      "temps":"entraine","type":"cardpick","variant":"quiz","tag":"Famille émotionnelle",
      "instr":"Le mot précis appartient surtout à quelle grande famille ?",
      "items":[
        {"img":v("nuance-frustration-obstacle.jpg"),"alt":"Élève frustré face à un obstacle","text":"Frustration","audio":"Frustration. À quelle grande famille émotionnelle ce mot appartient-il ?","opts":FAM("colere"),"ex":"La frustration appartient souvent à la famille de la colère : un obstacle bloque un objectif."},
        {"img":v("nuance-apprehension-stage.jpg"),"alt":"Élève inquiète avant un stage","text":"Appréhension","audio":"Appréhension. À quelle grande famille émotionnelle ce mot appartient-il ?","opts":FAM("peur"),"ex":"L’appréhension appartient souvent à la famille de la peur : il y a incertitude ou enjeu."},
        {"img":v("nuance-fierte-feedback.jpg"),"alt":"Élève fier après un retour positif","text":"Fierté","audio":"Fierté. À quelle grande famille émotionnelle ce mot appartient-il ?","opts":FAM("joie"),"ex":"La fierté appartient à la famille de la joie : réussite et reconnaissance."},
        {"img":v("nuance-deception-resultat.jpg"),"alt":"Élève déçu par un résultat","text":"Déception","audio":"Déception. À quelle grande famille émotionnelle ce mot appartient-il ?","opts":FAM("tristesse"),"ex":"La déception touche souvent la tristesse : quelque chose espéré n’arrive pas comme prévu."},
        {"img":v("nuance-honte-gene.jpg"),"alt":"Élève gênée après une erreur","text":"Gêne / honte","audio":"Gêne ou honte. À quelle grande famille émotionnelle ce mot appartient-il ?","opts":FAM("honte"),"ex":"La honte ou la gêne apparaissent souvent quand on se sent exposé au regard des autres."},
        {"img":v("nuance-soulagement-fin.jpg"),"alt":"Élève soulagée après un effort","text":"Soulagement","audio":"Soulagement. À quelle grande famille émotionnelle ce mot appartient-il ?","opts":FAM("joie"),"ex":"Le soulagement est souvent agréable : la tension baisse, on respire mieux."}
      ]
    },
    {
      "temps":"situation","type":"imagepick","tag":"Nuances mélangées",
      "instr":"Lis la phrase, puis choisis l’image qui correspond le mieux.",
      "items":[
        {
          "text":"Je voulais réussir, mais un obstacle me bloque et je commence à m’agacer.",
          "audio":"Je voulais réussir, mais un obstacle me bloque et je commence à m’agacer.",
          "options":[
            {"img":v("nuance-frustration-obstacle.jpg"),"alt":"élève frustré devant un obstacle","ok":true,"ex":"Oui : obstacle + tension = frustration."},
            {"img":v("nuance-fierte-feedback.jpg"),"alt":"élève fier"},
            {"img":v("nuance-soulagement-fin.jpg"),"alt":"élève soulagée"},
            {"img":v("nuance-deception-resultat.jpg"),"alt":"élève déçu"}
          ]
        },
        {
          "text":"Je suis content du retour positif, mais aussi un peu gêné parce que tout le monde regarde.",
          "audio":"Je suis content du retour positif, mais aussi un peu gêné parce que tout le monde regarde.",
          "options":[
            {"img":v("nuance-fierte-feedback.jpg"),"alt":"élève fier après un retour positif","ok":true,"ex":"Oui : la scène peut mélanger fierté et gêne."},
            {"img":e("nuance-degout-securite.jpg"),"alt":"élève devant un contenant sale"},
            {"img":v("nuance-apprehension-stage.jpg"),"alt":"élève inquiète avec un dossier"},
            {"img":e("nuance-calme-attention.jpg"),"alt":"élève calme"}
          ]
        },
        {
          "text":"Je ne sais pas encore si ça va bien se passer. Je suis entre curiosité et inquiétude.",
          "audio":"Je ne sais pas encore si ça va bien se passer. Je suis entre curiosité et inquiétude.",
          "options":[
            {"img":v("nuance-apprehension-stage.jpg"),"alt":"élève en appréhension","ok":true,"ex":"Oui : l’appréhension est fréquente avant une situation nouvelle."},
            {"img":v("nuance-soulagement-fin.jpg"),"alt":"élève soulagée"},
            {"img":e("indice-degout-recul.jpg"),"alt":"élève dégoûtée"},
            {"img":e("indice-surprise-visage.jpg"),"alt":"élève surpris"}
          ]
        }
      ]
    },
    {
      "temps":"situation","type":"scenario","tag":"Répondre avec le mot juste",
      "scenes":[
        {
          "img":v("nuance-deception-resultat.jpg"),
          "alt":"Élève déçu par un résultat",
          "text":"Tu as travaillé, mais le résultat n’est pas celui attendu. Que peux-tu te dire ?",
          "audio":"Tu as travaillé, mais le résultat n’est pas celui attendu. Que peux-tu te dire ?",
          "choices":[
            {"l":"Je suis nul, donc j’arrête.","good":false,"fb":"C’est une pensée très dure, pas un mot émotionnel précis. Elle risque d’aggraver la déception."},
            {"l":"Je suis déçu : j’avais besoin de réussir ou de comprendre l’erreur.","good":true,"fb":"Oui. Tu nommes l’émotion et le besoin. Cela ouvre une action utile : demander comment progresser."},
            {"l":"Je fais comme si ça ne comptait pas.","good":false,"fb":"Éviter peut soulager vite, mais ne t’aide pas à comprendre ce qui compte pour toi."}
          ]
        },
        {
          "img":v("nuance-honte-gene.jpg"),
          "alt":"Élève gênée après une erreur",
          "text":"Tu fais une erreur devant les autres. Que peux-tu faire avec la gêne ?",
          "audio":"Tu fais une erreur devant les autres. Que peux-tu faire avec la gêne ?",
          "choices":[
            {"l":"Je reconnais que je suis gêné, puis je cherche comment réparer.","good":true,"fb":"Bien. La gêne informe sur le regard des autres, mais elle ne t’oblige pas à disparaître."},
            {"l":"Je quitte tout de suite la salle.","good":false,"fb":"Tu évites le regard, mais tu ne réponds pas au besoin de réparation ou de soutien."},
            {"l":"J’accuse quelqu’un pour ne pas être gêné.","good":false,"fb":"Accuser protège l’image sur le moment, mais cela ne règle pas l’erreur."}
          ]
        },
        {
          "img":v("nuance-soulagement-fin.jpg"),
          "alt":"Élève soulagée après une tâche",
          "text":"Tu viens de finir une tâche difficile. Comment utiliser le soulagement ?",
          "audio":"Tu viens de finir une tâche difficile. Comment utiliser le soulagement ?",
          "choices":[
            {"l":"Je remarque que la tension baisse et je récupère avant la suite.","good":true,"fb":"Oui. Le soulagement peut signaler qu’un effort est terminé et que le corps peut récupérer."},
            {"l":"Je recommence tout de suite une autre tâche sans pause.","good":false,"fb":"Tu risques d’ignorer le signal du corps. Une courte récupération peut aider."},
            {"l":"Je me moque de ceux qui stressent encore.","good":false,"fb":"Ton émotion agréable ne doit pas écraser celle des autres."}
          ]
        }
      ]
    },
    {
      "temps":"point","type":"wrap",
      "keep":[
        {"ic":"🌡️","html":"Nommer précisément, c’est passer de <strong>bien / mal</strong> à un mot utile : frustration, appréhension, honte, fierté..."},
        {"ic":"🧩","html":"Une émotion peut être <strong>mélangée</strong> : fier et gêné, surpris et inquiet."},
        {"ic":"🔎","html":"Le mot juste aide à repérer le <strong>besoin</strong> : réussite, respect, sécurité, soutien, compréhension."},
        {"ic":"🗣️","html":"Une phrase utile : <strong>je me sens...</strong> parce que... j’aurais besoin de..."}
      ],
      "self":["Je sais choisir un mot plus précis que bien ou mal","Je peux reconnaître une émotion mélangée","Je peux relier une émotion à un besoin"]
    }
  ]
});
</script>
</body>
</html>
