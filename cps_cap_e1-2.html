<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPS E1.2 — Reconnaître mes émotions</title>
<link rel="stylesheet" href="assets/cps_kit.css">
</head>
<body>
<div id="cps-app"></div>
<script src="assets/cps_kit.js"></script>
<script>CPS.init({
  "theme": "emo",
  "code": "E1.2",
  "ref": "Identifier ses émotions",
  "icon": "🌡️",
  "title": "Reconnaître mes émotions",
  "subtitle": "Repère où ça se passe et mets le bon mot.",
  "parcours": [
    {
      "temps": "decouvre",
      "type": "lesson",
      "title": "💡 Mon corps me parle",
      "audio": "Une émotion, c’est un signal dans ton corps. D’abord, tu la ressens quelque part : cœur qui s’emballe, gorge serrée, boule au ventre. Ensuite, tu lui donnes un nom précis. Mettre le bon mot, ça aide déjà à calmer l’émotion.",
      "blocks": [
        {
          "ic": "🔍",
          "html": "<strong>Identifier</strong> une émotion, c’est deux étapes."
        },
        {
          "ic": "1️⃣",
          "html": "<strong>Percevoir</strong> : tu sens quelque chose dans ton corps."
        },
        {
          "ic": "2️⃣",
          "html": "<strong>Nommer</strong> : tu mets un mot précis sur ce que tu ressens."
        },
        {
          "ic": "❤️",
          "html": "Cœur qui s’emballe → souvent de la <strong>peur</strong> ou de la <strong>joie</strong>."
        },
        {
          "ic": "🌀",
          "html": "Boule au ventre → souvent du <strong>stress</strong> ou de l’<strong>appréhension</strong>."
        },
        {
          "ic": "🛑",
          "html": "Mâchoires serrées, muscles durs → souvent de la <strong>colère</strong>."
        },
        {
          "ic": "🌧️",
          "html": "Gorge nouée, envie de pleurer → souvent de la <strong>tristesse</strong>."
        },
        {
          "ic": "🌤️",
          "html": "Légèreté, sourire facile → souvent de la <strong>joie</strong>."
        },
        {
          "ic": "🎯",
          "html": "Un mot précis vaut mieux qu’un mot vague.",
          "words": ["Agacé", "Furieux", "Inquiet", "Paniqué", "Content", "Heureux"]
        }
      ],
      "cta": "▶️ Je m’entraîne"
    },
    {
      "temps": "entraine",
      "type": "match",
      "title": "🔗 Mon corps → mon émotion",
      "instr": "Relie chaque sensation corporelle à l’émotion qui lui correspond.",
      "audio": "Pour chaque sensation dans le corps, retrouve l’émotion qui correspond. Fais confiance à ce que tu ressens au quotidien.",
      "pairs": [
        {
          "l": "Cœur qui bat très vite avant un contrôle",
          "r": "Peur",
          "ex": "L’accélération du cœur prépare le corps à réagir vite : c’est un signal de peur."
        },
        {
          "l": "Boule au ventre avant la remise des notes",
          "r": "Appréhension",
          "ex": "La boule au ventre signale une tension intérieure face à quelque chose d’incertain."
        },
        {
          "l": "Mâchoires serrées quand un copain te fait faux bond",
          "r": "Colère",
          "ex": "Les muscles qui se contractent montrent que le corps est en tension : signe de colère."
        },
        {
          "l": "Gorge nouée en apprenant une mauvaise nouvelle",
          "r": "Tristesse",
          "ex": "La gorge qui se serre accompagne souvent la tristesse ou l’envie de pleurer."
        },
        {
          "l": "Légèreté et sourire quand la PFMP se passe bien",
          "r": "Joie",
          "ex": "Se sentir léger et sourire facilement : le corps exprime la joie et la satisfaction."
        }
      ]
    },
    {
      "temps": "entraine",
      "type": "cardpick",
      "variant": "quiz",
      "instr": "Quelle est l’émotion principale dans chaque situation ?",
      "items": [
        {
          "em": "🛠️",
          "text": "En atelier, tu rates une pièce devant tout le monde. Tu sens le rouge te monter au visage.",
          "opts": [
            {"l": "Honte", "ok": true},
            {"l": "Joie", "ok": false},
            {"l": "Surprise", "ok": false}
          ],
          "ex": "Rougir devant les autres après une erreur, c’est souvent de la honte. C’est normal et ça arrive à tout le monde."
        },
        {
          "em": "📱",
          "text": "Tu vois sur les réseaux que tes amis sont sortis sans toi. Tu as le cœur lourd.",
          "opts": [
            {"l": "Colère", "ok": false},
            {"l": "Tristesse", "ok": true},
            {"l": "Peur", "ok": false}
          ],
          "ex": "Se sentir exclu et avoir le cœur lourd, c’est de la tristesse. Nommer ça aide à en parler."
        },
        {
          "em": "🏆",
          "text": "Ton maître de stage dit devant toute l’équipe que ton travail est excellent.",
          "opts": [
            {"l": "Gêne", "ok": false},
            {"l": "Fierté", "ok": true},
            {"l": "Tristesse", "ok": false}
          ],
          "ex": "Être félicité devant les autres et se sentir grandir, c’est de la fierté. Savoure-la !"
        },
        {
          "em": "🚌",
          "text": "Tu rates le bus et tu vas être en retard. Tu soupires fort, tu tapes du pied.",
          "opts": [
            {"l": "Joie", "ok": false},
            {"l": "Tristesse", "ok": false},
            {"l": "Frustration", "ok": true}
          ],
          "ex": "Taper du pied et soupirer face à un obstacle, c’est de la frustration. Le corps te le montre."
        },
        {
          "em": "📋",
          "text": "On t’annonce que tu pars en stage la semaine prochaine dans un nouveau lieu. Tu ne sais pas trop.",
          "opts": [
            {"l": "Appréhension", "ok": true},
            {"l": "Fierté", "ok": false},
            {"l": "Colère", "ok": false}
          ],
          "ex": "Face à l’inconnu, on ressent souvent de l’appréhension : un mélange de curiosité et d’inquiétude."
        }
      ]
    },
    {
      "temps": "entraine",
      "type": "cardpick",
      "variant": "sort",
      "instr": "Classe chaque mot selon son intensité : un peu ou beaucoup ?",
      "items": [
        {
          "em": "😤",
          "text": "Agacé",
          "opts": [
            {"l": "🟡 Un peu", "ok": true},
            {"l": "🔴 Beaucoup", "ok": false}
          ],
          "ex": "Agacé = légèrement irrité. C’est moins fort que furieux ou en colère."
        },
        {
          "em": "😡",
          "text": "Furieux",
          "opts": [
            {"l": "🟡 Un peu", "ok": false},
            {"l": "🔴 Beaucoup", "ok": true}
          ],
          "ex": "Furieux = très grande colère. C’est beaucoup plus intense qu’agacé."
        },
        {
          "em": "😟",
          "text": "Inquiet",
          "opts": [
            {"l": "🟡 Un peu", "ok": true},
            {"l": "🔴 Beaucoup", "ok": false}
          ],
          "ex": "Inquiet = légèrement préoccupé. C’est moins fort que paniqué."
        },
        {
          "em": "😱",
          "text": "Paniqué",
          "opts": [
            {"l": "🟡 Un peu", "ok": false},
            {"l": "🔴 Beaucoup", "ok": true}
          ],
          "ex": "Paniqué = peur très intense, perte de contrôle. C’est beaucoup plus fort qu’inquiet."
        },
        {
          "em": "🙂",
          "text": "Content",
          "opts": [
            {"l": "🟡 Un peu", "ok": true},
            {"l": "🔴 Beaucoup", "ok": false}
          ],
          "ex": "Content = satisfait, de bonne humeur. C’est moins fort que heureux ou aux anges."
        },
        {
          "em": "😄",
          "text": "Heureux",
          "opts": [
            {"l": "🟡 Un peu", "ok": false},
            {"l": "🔴 Beaucoup", "ok": true}
          ],
          "ex": "Heureux = joie profonde et durable. C’est beaucoup plus fort que content."
        }
      ]
    },
    {
      "temps": "point",
      "type": "wrap",
      "keep": [
        {
          "ic": "🔍",
          "html": "Identifier = d’abord <strong>percevoir</strong> dans le corps, puis <strong>nommer</strong> avec un mot précis."
        },
        {
          "ic": "❤️",
          "html": "Le corps envoie des signaux : cœur rapide, boule au ventre, mâchoires serrées, gorge nouée."
        },
        {
          "ic": "💬",
          "html": "Mettre le <strong>bon mot</strong> sur une émotion aide déjà à la calmer un peu."
        },
        {
          "ic": "🎯",
          "html": "Un vocabulaire riche est utile : <strong>agacé / furieux</strong>, <strong>inquiet / paniqué</strong>, <strong>content / heureux</strong>."
        }
      ],
      "self": [
        "Je sais repérer au moins une sensation dans mon corps quand je ressens quelque chose.",
        "Je connais des mots précis pour nommer ce que je ressens, pas seulement « bien » ou « mal ».",
        "Je comprends pourquoi nommer une émotion peut aider à mieux la vivre."
      ]
    }
  ]
});</script>
</body>
</html>
