<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<title>Légender une image</title>
<style>
  :root{
    --bg:#0f172a; --text:#f1f5f9; --muted:#94a3b8;
    --line:rgba(255,255,255,.12);
    --c1:#3b82f6; --c2:#60a5fa; --c3:#f97316; --c4:#10b981; --c5:#eab308; --err:#ef4444;
    --font-ui: system-ui, -apple-system, sans-serif;
  }
  *{box-sizing:border-box}
  html{ -webkit-text-size-adjust:100%; text-size-adjust:100%; }
  body{
    margin:0; font-family:var(--font-ui); color:var(--text);
    background:var(--bg);
    padding: max(14px, env(safe-area-inset-top)) 14px calc(140px + env(safe-area-inset-bottom)) 14px;
    background-image: radial-gradient(at 0% 0%, rgba(59,130,246,0.15) 0px, transparent 50%);
    background-attachment: fixed;
    -webkit-tap-highlight-color: transparent;
    overflow-x:hidden;
  }

  .wrap{max-width:860px; margin:0 auto; display:grid; gap:18px}

  /* Intro */
  #introOverlay{
    position:fixed; inset:0; background:rgba(15,23,42,0.985);
    z-index:2000; display:flex; align-items:center; justify-content:center;
    padding: max(20px, env(safe-area-inset-top)) 16px max(20px, env(safe-area-inset-bottom)) 16px;
    overflow:auto;
  }
  .intro-card{
    width:100%; max-width:540px;
    background:rgba(30,41,59,0.92); border:1px solid var(--line);
    border-radius:22px; padding:22px; text-align:center;
  }
  .intro-kicker{ font-weight:900; color:#fff; font-size:0.95rem; }
  .intro-title{ margin:10px 0 12px; font-size:1.25rem; font-weight:950; color:#fff; line-height:1.25; }
  .intro-box{
    text-align:left; font-size:0.95rem; color:#cbd5e1;
    background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.10);
    padding:14px; border-radius:14px; line-height:1.5;
  }
  .intro-box b{ color:#fff; }
  .badge{
    display:inline-flex; align-items:center; justify-content:center;
    padding:6px 12px; border-radius:999px;
    border:1px solid rgba(96,165,250,0.35);
    background: rgba(96,165,250,0.10);
    color:#e2e8f0; font-weight:900; font-size:0.85rem; margin-top:10px;
  }

  .top-nav{
    position:sticky; top: calc(env(safe-area-inset-top) + 6px); z-index:150;
    display:flex; gap:10px; align-items:center; justify-content:space-between;
    backdrop-filter: blur(6px);
  }
  .nav-btn{
    appearance:none; border:none;
    background: rgba(15,23,42,0.8); border:1px solid var(--line);
    color:#e2e8f0; padding:10px 12px; border-radius:14px;
    font-weight:900; font-size:0.9rem; cursor:pointer;
    touch-action: manipulation; white-space:nowrap;
  }

  .hero{ background:rgba(30,41,59,0.86); padding:18px; border-radius:16px; border:1px solid var(--line); }
  .pedago-box{
    background:rgba(255,255,255,0.05); padding:14px; border-radius:12px; margin-top:10px;
    font-size:0.95rem; border-left: 4px solid var(--c3); line-height:1.45;
  }
  .pedago-title { color:var(--c3); font-weight:950; text-transform:uppercase; font-size:0.82rem; margin-bottom:6px; display:block; letter-spacing:0.2px; }

  .card { background:rgba(30,41,59,0.92); padding:18px; border-radius:18px; border:1px solid var(--line); }

  .hud-strip {
    display:flex; justify-content: space-between; align-items: center;
    background: rgba(15, 23, 42, 0.78); border: 1px solid var(--line);
    padding: 10px 16px; border-radius: 16px;
    font-weight: 950; font-size: 0.92rem;
    backdrop-filter: blur(5px); gap:10px; flex-wrap:wrap;
  }
  .progress-track{ flex:1; min-width:140px; height:8px; background:rgba(255,255,255,.1); border-radius:99px; overflow:hidden; }
  .progress-fill{ height:100%; width:0%; background:linear-gradient(90deg, var(--c1), var(--c3)); transition:width 0.5s ease; }

  .prompt { font-weight:950; margin-bottom:10px; display:block; color:white; line-height:1.35; }

  /* Image + zones masquées */
  .img-stage{
    position:relative;
    width:100%;
    margin:10px 0 16px;
    border-radius:12px;
    overflow:hidden;
    border:1px solid var(--line);
    background:#000;
    user-select:none;
  }
  .img-stage img{
    display:block; width:100%; height:auto;
    pointer-events:none;
    -webkit-user-drag:none;
  }
  .zone{
    position:absolute;
    background:rgba(15,23,42,0.92);
    border:2px solid #fff;
    color:#fff;
    font-weight:950;
    display:flex; align-items:center; justify-content:center;
    border-radius:8px;
    cursor:pointer;
    font-size:0.88rem;
    text-align:center;
    padding:4px;
    line-height:1.1;
    min-height:24px;
    transition:0.15s;
    touch-action:manipulation;
    word-break:break-word;
    box-shadow:0 2px 8px rgba(0,0,0,.35);
  }
  .zone.filled{
    background:rgba(249,115,22,0.92);
    border-color:#fff;
  }
  .zone.active-target{
    background:rgba(59,130,246,0.92);
    animation:pulse 1s infinite;
  }
  .zone.correct{ background:rgba(16,185,129,0.92); border-color:#6ee7b7; }
  .zone.wrong{ background:rgba(239,68,68,0.92); border-color:#fca5a5; }

  .items-list {
    display:flex; flex-wrap:wrap; gap:10px; justify-content:center;
    padding-top:14px; border-top:1px solid var(--line);
  }
  .item-label {
    background:var(--c2); color:#0f172a;
    padding:11px 14px; border-radius:12px;
    font-weight:900; cursor:pointer; border:2px solid transparent;
    transition:0.15s; font-size:0.95rem; max-width:100%;
    text-align:center; user-select:none; touch-action: manipulation;
  }
  .item-label.selected { background:var(--c1); color:white; border-color:white; transform:scale(1.03); }
  .item-label.placed { opacity:0.25; pointer-events:none; filter: grayscale(1); }

  .btn {
    background:var(--c3); color:white;
    padding:13px 18px; border-radius:14px;
    font-weight:950; border:none; cursor:pointer;
    font-size:1rem; width:100%; margin-top:14px;
    touch-action: manipulation;
  }
  .btn:disabled { opacity:0.5; filter:grayscale(1); cursor:not-allowed; }

  .panel { margin-top:14px; padding:14px; border-radius:14px; display:none; text-align:center; font-weight:950; line-height:1.35; }
  .panel.ok { background:rgba(16,185,129,0.18); color:#6ee7b7; border:1px solid rgba(16,185,129,0.55); }
  .panel.bad { background:rgba(239,68,68,0.18); color:#fca5a5; border:1px solid rgba(239,68,68,0.55); }

  .help-box{
    background: rgba(96,165,250,0.10);
    border: 1px solid rgba(96,165,250,0.35);
    color:#e2e8f0; padding:12px 14px; border-radius:14px;
    margin-bottom:14px; font-weight:800; line-height:1.35;
  }

  .picker-list{ display:grid; gap:10px; margin-top:14px; }
  .picker-item{
    padding:14px; border-radius:12px; border:1px solid var(--line);
    background:rgba(255,255,255,0.04); cursor:pointer; font-weight:900;
  }
  .picker-item:hover{ background:rgba(255,255,255,0.08); }
  .picker-meta{ display:block; font-weight:600; font-size:0.82rem; color:var(--muted); margin-top:4px; }

  #finalScreen{ text-align:center; padding:28px 12px; display:none; }
  .big-score{
    font-size:3rem; font-weight:1000; margin:10px 0;
    background:linear-gradient(to right, var(--c4), var(--c3));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }

  @keyframes pulse { 0%{opacity:1} 50%{opacity:0.75} 100%{opacity:1} }

  @media (max-width: 520px){
    body{ padding-left:12px; padding-right:12px; padding-bottom:140px; }
    .intro-card{ padding:18px; border-radius:18px; }
    .hero{ padding:16px; border-radius:14px; }
    .card{ padding:16px; border-radius:16px; }
    .item-label{ padding:11px 12px; font-size:0.92rem; }
    .zone{ font-size:0.78rem; }
  }
</style>
</head>
<body>

<!-- Intro -->
<div id="introOverlay">
  <div class="intro-card">
    <div class="intro-kicker">PSE</div>
    <div class="intro-title" id="introTitle">Légender une image</div>
    <div class="badge" id="introBadge" style="display:none"></div>
    <div class="intro-box" style="margin-top:12px;" id="introDesc">
      <b>Objectif :</b> place chaque étiquette sur la bonne zone de l'image.
    </div>
    <div id="pickerZone"></div>
    <button class="btn" id="startBtn" onclick="startGame()">Démarrer</button>
  </div>
</div>

<div class="wrap" id="gameWrap" style="display:none">
  <div class="top-nav">
    <div>
      <button class="nav-btn" type="button" onclick="goBack()">Retour</button>
    </div>
    <div>
      <button class="nav-btn" type="button" onclick="scrollTopSmooth()">Haut</button>
    </div>
  </div>

  <div class="hero">
    <h3 id="exoTitre" style="margin:0">—</h3>
    <div class="pedago-box" id="exoSituationBox" style="display:none">
      <span class="pedago-title">Situation</span>
      <span id="exoSituation"></span>
    </div>
  </div>

  <div class="hud-strip">
    <span>Zones <span id="txtProg" style="color:var(--c3)">0 / 0</span></span>
    <div class="progress-track"><div id="bar" class="progress-fill"></div></div>
    <span>Score <span id="txtScore" style="color:#fff">0</span></span>
  </div>

  <div class="card" id="gameCard">
    <div id="gameContent">
      <div class="help-box" id="helpBox">
        Touche une étiquette, puis touche la bonne zone sur l'image.
      </div>
      <span class="prompt">Légende chaque zone de l'image :</span>
      <div class="img-stage" id="imgStage">
        <img id="mainImg" alt="Image à légender">
      </div>
      <div id="itemsZone" class="items-list"></div>
      <button class="btn" id="btnVal" onclick="validate()">Valider</button>
      <div id="feedback" class="panel"></div>
    </div>

    <div id="finalScreen">
      <h2>Exercice terminé !</h2>
      <div class="big-score" id="finalScoreVal">0 / 0</div>
      <p id="finalExpl" style="font-size:1rem; color:#e2e8f0; margin-bottom:22px;"></p>
      <button class="btn" onclick="location.reload()">Recommencer</button>
    </div>
  </div>
</div>

<script>
/* ====== CHARGEMENT DE L'EXERCICE ======
   Modes acceptés (query string) :
   - ?src=bibliotheque_legende.json            → ouvre un sélecteur
   - ?src=bibliotheque_legende.json&idx=0      → exercice N°0 de la biblio
   - ?src=bibliotheque_legende.json&titre=XXX  → recherche par titre
   - ?src=mon_exercice.json                    → fichier exercice unique
*/
const qs = new URLSearchParams(location.search);
const SRC = qs.get("src") || "bibliotheque_legende.json";
const IDX = qs.get("idx");
const WANTED_TITRE = qs.get("titre");

let currentExo = null;
let selectedItem = null;
let placed = {}; // zoneIndex -> itemId ("b" ou "d0".."d2")

const $ = (id)=>document.getElementById(id);

function goBack(){ if(history.length>1) history.back(); else location.href="index.html"; }
function scrollTopSmooth(){ window.scrollTo({top:0, behavior:"smooth"}); }

async function boot(){
  try{
    const res = await fetch(SRC, {cache:"no-store"});
    if(!res.ok) throw new Error("HTTP "+res.status);
    const data = await res.json();

    if(Array.isArray(data)){
      // Bibliothèque → on filtre les exercices de type legende_image
      const list = data.filter(x => x && (x.type==="legende_image" || x.zones));
      if(list.length===0){ showError("Aucun exercice de type 'légender une image' trouvé dans "+SRC); return; }
      if(IDX !== null && IDX !== undefined && !isNaN(parseInt(IDX,10))){
        const i = parseInt(IDX,10);
        if(i>=0 && i<list.length){ currentExo = list[i]; prepareIntro(); return; }
      }
      if(WANTED_TITRE){
        const found = list.find(x=>x.titre===WANTED_TITRE);
        if(found){ currentExo = found; prepareIntro(); return; }
      }
      showPicker(list);
    } else if(data && typeof data === "object"){
      currentExo = data;
      prepareIntro();
    } else {
      showError("Format JSON non reconnu dans "+SRC);
    }
  } catch(e){
    showError("Impossible de charger "+SRC+" : "+e.message);
  }
}

function showError(msg){
  $("introTitle").textContent = "Erreur";
  $("introDesc").innerHTML = "<b>Chargement impossible :</b> "+msg;
  $("startBtn").style.display = "none";
}

function showPicker(list){
  const pickerZone = $("pickerZone");
  pickerZone.innerHTML = "<div class='picker-list'></div>";
  const ul = pickerZone.querySelector(".picker-list");
  list.forEach((exo,i)=>{
    const el = document.createElement("div");
    el.className = "picker-item";
    el.innerHTML = `<div>${exo.titre||"(sans titre)"}</div>
      <span class="picker-meta">${exo.classe||""} · ${exo.module||""} · ${(exo.zones||[]).length} zones</span>`;
    el.onclick = ()=>{ currentExo = exo; prepareIntro(); };
    ul.appendChild(el);
  });
  $("startBtn").style.display = "none";
}

function prepareIntro(){
  $("introTitle").textContent = currentExo.titre || "Légender une image";
  const badge = $("introBadge");
  const bits = [currentExo.classe, currentExo.module].filter(Boolean).join(" · ");
  if(bits){ badge.textContent = bits; badge.style.display="inline-flex"; }
  $("introDesc").innerHTML = "<b>Objectif :</b> place chaque étiquette sur la bonne zone de l'image.";
  $("startBtn").style.display = "block";
  $("pickerZone").innerHTML = "";
}

function startGame(){
  if(!currentExo) return;
  $("introOverlay").style.display = "none";
  $("gameWrap").style.display = "grid";
  renderExercise();
  scrollTopSmooth();
}

function renderExercise(){
  const exo = currentExo;
  $("exoTitre").textContent = exo.titre || "Légender une image";
  if(exo.situation){
    $("exoSituationBox").style.display = "block";
    $("exoSituation").textContent = exo.situation;
  }

  // image
  const img = $("mainImg");
  const stage = $("imgStage");
  img.onload = ()=> { placeZones(exo.zones||[]); };
  img.onerror = ()=> {
    stage.innerHTML = `<div style="padding:30px;color:#fca5a5;font-weight:900;text-align:center;">
      Image introuvable : <code>${exo.image}</code><br><span style="font-weight:500;font-size:.85rem;">
      Dépose-la dans <code>PSE/images_legendes/</code>.</span></div>`;
  };
  img.src = exo.image || "";

  // items : pour chaque zone, on collecte bonne + distracteurs, on tagge l'origine
  const items = [];
  (exo.zones||[]).forEach((z, zi)=>{
    items.push({ id:`z${zi}_b`, txt:z.bonne, zone:zi, role:"b" });
    (z.distracteurs||[]).forEach((d, di)=>{
      items.push({ id:`z${zi}_d${di}`, txt:d, zone:zi, role:"d" });
    });
  });
  // On retire les doublons de texte (utile si plusieurs zones partagent un distracteur)
  const seen = new Set();
  const uniqItems = [];
  items.forEach(it=>{
    const key = it.txt.trim().toLowerCase();
    if(seen.has(key)) return;
    seen.add(key);
    uniqItems.push(it);
  });
  // Mélange
  uniqItems.sort(()=>Math.random()-0.5);

  const iz = $("itemsZone"); iz.innerHTML = "";
  uniqItems.forEach(it=>{
    const b = document.createElement("div");
    b.className = "item-label";
    b.textContent = it.txt;
    b.id = "item_"+it.id;
    b.onclick = ()=>handleItemClick(it, b);
    iz.appendChild(b);
  });

  updateHud();
}

function placeZones(zones){
  const stage = $("imgStage");
  // retire anciennes zones (si re-render)
  stage.querySelectorAll(".zone").forEach(z=>z.remove());
  zones.forEach((z, i)=>{
    const el = document.createElement("div");
    el.className = "zone";
    el.style.left = (z.x||0)+"%";
    el.style.top = (z.y||0)+"%";
    el.style.width = (z.w||10)+"%";
    el.style.height = (z.h||5)+"%";
    el.dataset.idx = i;
    el.textContent = "?";
    el.onclick = ()=>handleZoneClick(el, i);
    stage.appendChild(el);
  });
}

function handleItemClick(itemData, dom){
  if(dom.classList.contains("placed")) return;
  document.querySelectorAll(".item-label").forEach(el=>el.classList.remove("selected"));
  dom.classList.add("selected");
  selectedItem = { data: itemData, dom };
  document.querySelectorAll(".zone").forEach(z=>{
    if(placed[z.dataset.idx]) return;
    z.classList.add("active-target");
  });
}

function handleZoneClick(zoneDom, zoneIdx){
  // retrait si clic sur zone déjà remplie
  if(placed[zoneIdx]){
    const oldId = placed[zoneIdx];
    const oldBtn = document.getElementById("item_"+oldId);
    if(oldBtn) oldBtn.classList.remove("placed");
    delete placed[zoneIdx];
    zoneDom.classList.remove("filled","correct","wrong");
    zoneDom.textContent = "?";
  }
  if(selectedItem){
    zoneDom.textContent = selectedItem.data.txt;
    zoneDom.classList.add("filled");
    zoneDom.classList.remove("active-target");
    selectedItem.dom.classList.add("placed");
    selectedItem.dom.classList.remove("selected");
    placed[zoneIdx] = selectedItem.data.id;
    selectedItem = null;
    document.querySelectorAll(".active-target").forEach(z=>z.classList.remove("active-target"));
    updateHud();
  }
}

function updateHud(){
  const total = (currentExo.zones||[]).length;
  const filled = Object.keys(placed).length;
  $("txtProg").textContent = `${filled} / ${total}`;
  $("bar").style.width = (total? (filled/total)*100 : 0)+"%";
}

function validate(){
  const zones = currentExo.zones||[];
  const total = zones.length;
  if(Object.keys(placed).length < total){
    flashHelp("Il reste des zones vides.");
    return;
  }
  let score = 0;
  zones.forEach((z, i)=>{
    const placedId = placed[i]; // ex: "z3_b" ou "z2_d1"
    const zoneDom = document.querySelector(`.zone[data-idx="${i}"]`);
    // Correct si l'id correspond à la bonne réponse de cette zone,
    // OU si le TEXTE placé équivaut à la bonne réponse (tolérance casse/espaces).
    const placedText = zoneDom ? zoneDom.textContent.trim().toLowerCase() : "";
    const good = (z.bonne||"").trim().toLowerCase();
    const isGood = (placedId === `z${i}_b`) || (placedText === good && placedText.length>0);
    if(isGood){
      score++;
      zoneDom.classList.remove("filled","wrong");
      zoneDom.classList.add("correct");
    } else {
      zoneDom.classList.remove("filled","correct");
      zoneDom.classList.add("wrong");
    }
  });

  $("txtScore").textContent = score;
  $("btnVal").disabled = true;
  const fb = $("feedback");
  fb.style.display = "block";
  if(score === total){
    fb.textContent = "Bravo ! Toutes les zones sont correctes.";
    fb.className = "panel ok";
  } else {
    fb.textContent = `Score : ${score} / ${total}. Les zones en vert sont bonnes, en rouge elles sont fausses.`;
    fb.className = "panel bad";
  }

  // Basculer vers finalScreen après un délai
  setTimeout(()=>{
    $("gameContent").style.display = "none";
    $("finalScreen").style.display = "block";
    $("finalScoreVal").textContent = `${score} / ${total}`;
    if(currentExo.explication){
      $("finalExpl").textContent = currentExo.explication;
    }
    scrollTopSmooth();
  }, 1800);
}

function flashHelp(txt){
  const hb = $("helpBox");
  const saved = hb.textContent;
  hb.textContent = txt;
  hb.style.background = "rgba(239,68,68,0.15)";
  setTimeout(()=>{ hb.textContent = saved; hb.style.background = ""; }, 1800);
}

boot();
</script>

<!-- Firebase tracker (même schéma que les autres pages PSE) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getFirestore, collection, addDoc, updateDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyAWdCMvOiAJln3eT9LIAQD3RWJUD0lQcLI",
    authDomain: "devoirs-pse.firebaseapp.com",
    projectId: "devoirs-pse",
    storageBucket: "devoirs-pse.appspot.com",
    messagingSenderId: "614730413904",
    appId: "1:614730413904:web:a5dd478af5de30f6bede55"
  };
  const app = initializeApp(firebaseConfig); const db = getFirestore(app);
  let currentDocId = null; let startTime = Date.now();
  function getIdentity(){ return localStorage.getItem("cockpit_student_id"); }
  async function demarrerVisite(){
    try{
      const userCode = getIdentity() || "ANONYME";
      const userClass = localStorage.getItem("cockpit_student_class") || "VISITEUR";
      const pageName = document.title || location.pathname.split("/").pop();
      const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry/i.test(navigator.userAgent);
      const ref = await addDoc(collection(db,"statistiques_usage"),{
        page: pageName, userCode, classe: userClass,
        device: isMobile?"Mobile":"Desktop", action:"Consultation",
        duree:0, timestamp: serverTimestamp(), date: new Date().toISOString()
      });
      currentDocId = ref.id;
      setInterval(async ()=>{
        if(currentDocId && document.visibilityState==="visible"){
          try{ await updateDoc(doc(db,"statistiques_usage",currentDocId),{ duree: Math.floor((Date.now()-startTime)/1000) }); } catch(e){}
        }
      }, 10000);
    } catch(e){ console.warn("Tracker err", e); }
  }
  demarrerVisite();
</script>

</body>
</html>
