<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPS E2.2a — Faire durer le bon</title>
<link rel="stylesheet" href="assets/cps_kit.css?v=20260618-bd">
<style>
.cps{max-width:760px}
.cps-prompt .cps-img,.cps-lesson .cps-img{max-height:420px;width:auto}
@media (max-width:640px){
  .cps{max-width:100%;padding:12px}
  .cps-prompt .cps-img,.cps-lesson .cps-img{max-height:300px}
}
</style>
</head>
<body>
<div id="cps-app"></div>
<script src="assets/cps_kit.js?v=20260618-bd"></script>
<script>
var IMG = {
  reussite:"assets/emotions/e1-jury/dossier-reussite-feedback.jpg",
  fierte:"assets/emotions/e1-vocab/nuance-fierte-feedback.jpg",
  joie:"assets/emotions/e1-2/scene-joie-atelier.jpg",
  soulagement:"assets/emotions/e1-vocab/nuance-soulagement-fin.jpg",
  messageFierte:"assets/emotions/e1-1/message-fierte.jpg",
  messageSoulagement:"assets/emotions/e1-1/message-soulagement.jpg",
  soutien:"assets/emotions/e1-1/message-soutien.jpg",
  observation:"assets/emotions/e1-1/observe-joie-reussite.jpg",
  nuances:"assets/emotions/e1-vocab/mini-nuances.gif",
  deception:"assets/emotions/e1-vocab/nuance-deception-resultat.jpg"
};

var ACTION = function(bonne){
  return [
    {"l":"Savourer le moment","ok":bonne==="savourer"},
    {"l":"Partager le positif","ok":bonne==="partager"},
    {"l":"Remercier / gratitude","ok":bonne==="gratitude"},
    {"l":"Recommencer ou garder une trace","ok":bonne==="recommencer"},
    {"l":"Piège : minimiser, comparer, zapper","ok":bonne==="piege"}
  ];
};
var BD = function(label,bubbles,note,people){
  return {"panels":[{"label":label,"people":people||[{"name":"A"},{"name":"B","side":"right"}],"bubbles":bubbles,"note":note}]};
};

var CARTES = function(bonne){
  return [
    {"img":IMG.reussite,"alt":"élève fier après un retour positif","l":"Fierté reconnue","ok":bonne==="fierte","ex":"Oui : la fierté peut être savourée puis transformée en confiance."},
    {"img":IMG.soutien,"alt":"élève soutenu par un proche","l":"Merci sincère","ok":bonne==="merci","ex":"Oui : remercier renforce l'émotion agréable et le lien."},
    {"img":IMG.soulagement,"alt":"élève soulagé après une tension terminée","l":"Soulagement à ancrer","ok":bonne==="soulagement","ex":"Oui : on peut remarquer que la tension est redescendue et retenir ce qui a aidé."},
    {"img":IMG.joie,"alt":"élèves heureux après une réussite en atelier","l":"Moment à refaire","ok":bonne==="refaire","ex":"Oui : repérer ce qui fait du bien aide à le reproduire."},
    {"img":IMG.deception,"alt":"élève déçu qui baisse les yeux","l":"Piège du négatif","ok":bonne==="piege","ex":"Oui : chercher seulement le défaut coupe l'émotion agréable."}
  ];
};

CPS.init({
  "theme":"emo",
  "code":"E2.2a",
  "ref":"Réguler ses émotions agréables",
  "icon":"🌤️",
  "title":"Faire durer le bon",
  "subtitle":"Savourer, partager et transformer une émotion agréable en ressource.",
  "parcours":[
    {
      "temps":"decouvre",
      "type":"lesson",
      "title":"💡 Le positif se travaille aussi",
      "audio":"Réguler ses émotions, ce n'est pas seulement calmer la colère ou le stress. C'est aussi savoir reconnaître une émotion agréable, la savourer, la partager, remercier, garder une trace et refaire ce qui nourrit le bien-être.",
      "blocks":[
        {"img":IMG.reussite,"alt":"élève fier après un retour positif","html":"Une émotion agréable peut devenir une ressource : confiance, motivation, lien, énergie."},
        {"ic":"🌤️","html":"Exemples : <strong>joie</strong>, <strong>fierté</strong>, <strong>soulagement</strong>, <strong>gratitude</strong>, <strong>calme</strong>, <strong>enthousiasme</strong>."},
        {"ic":"🔎","html":"<strong>Savourer</strong> : je m'arrête quelques secondes sur ce qui est bon. Je remarque le corps, les pensées, le contexte."},
        {"ic":"🗣️","html":"<strong>Partager</strong> : je raconte le moment à quelqu'un. Le positif dure plus longtemps quand il circule."},
        {"ic":"🙏","html":"<strong>Remercier</strong> : je nomme ce que l'autre a fait et l'effet que cela a eu sur moi."},
        {"ic":"🔁","html":"<strong>Capitaliser</strong> : je garde une trace et je repère ce que je peux refaire."},
        {"img":IMG.nuances,"alt":"nuances d'émotions positives et difficiles","html":"Les émotions agréables ne sont pas toutes les mêmes : fierté, joie, soulagement et gratitude n'envoient pas le même message."},
        {"ic":"⚠️","html":"Pièges fréquents : <strong>minimiser</strong> (« c'est rien »), <strong>zapper</strong>, <strong>comparer</strong>, ou chercher immédiatement ce qui ne va pas."}
      ],
      "cta":"▶️ Je m'entraîne"
    },

    {
      "temps":"entraine",
      "type":"cardpick",
      "variant":"quiz",
      "tag":"Mission 1",
      "instr":"Lis la situation. Quelle stratégie permet de faire durer l'émotion agréable ?",
      "demo":{
        "comic":BD("Retour du tuteur",[
          {"who":"right","text":"Ton geste professionnel est plus précis qu'hier."},
          {"who":"left","kind":"good","text":"J'ai progressé. Je prends deux secondes pour le remarquer."}
        ],"La personne laisse la fierté exister avant de passer à la suite."),
        "text":"Ton tuteur te dit que ton geste professionnel est plus précis qu'hier. Tu prends deux secondes pour te dire : « J'ai progressé. »",
        "opts":ACTION("savourer"),
        "ex":"Tu savoures : tu laisses la fierté exister au lieu de passer tout de suite à autre chose."
      },
      "items":[
        {
          "comic":BD("Après la préparation",[
            {"who":"left","kind":"good","text":"J'ai réussi une belle présentation."},
            {"who":"left","text":"Je l'envoie à ma famille avec un petit message."},
            {"who":"right","text":"On est contents pour toi."}
          ],"Raconter le positif peut prolonger la joie et la fierté."),
          "text":"Tu as réussi une préparation. Tu envoies une photo propre à ta famille avec un petit message.",
          "opts":ACTION("partager"),
          "ex":"Tu partages le positif. Le fait de raconter renforce la joie et la fierté."
        },
        {
          "comic":BD("Compliment minimisé",[
            {"who":"right","text":"Ton travail est soigné aujourd'hui."},
            {"who":"left","kind":"warn","text":"Bof, c'était facile, n'importe qui aurait réussi."}
          ],"La personne écrase son progrès au lieu de le reconnaître."),
          "text":"Ton professeur te félicite. Tu réponds : « Bof, c'était facile, n'importe qui aurait réussi. »",
          "opts":ACTION("piege"),
          "ex":"Tu minimises. La fierté n'a pas le temps de devenir une ressource."
        },
        {
          "comic":BD("Aide reçue",[
            {"who":"right","text":"Je te remontre la consigne étape par étape."},
            {"who":"left","kind":"good","text":"Merci, ton explication m'a rassuré."}
          ],"La gratitude nomme l'aide et l'effet positif."),
          "text":"Un camarade t'aide à comprendre une consigne. Tu lui dis précisément : « Merci, ton explication m'a rassuré. »",
          "opts":ACTION("gratitude"),
          "ex":"C'est de la gratitude : tu renforces le lien et tu repères l'effet positif de l'aide."
        },
        {
          "comic":BD("Stratégie à refaire",[
            {"who":"left","kind":"good","text":"La pause courte m'a remis de bonne humeur."},
            {"who":"left","text":"Je note : demain, je peux refaire pareil."}
          ],"Le bon moment devient une stratégie réutilisable.",[{"name":"A","tone":"calm"}]),
          "text":"Tu remarques qu'une pause courte t'a remis de bonne humeur. Tu notes que tu peux refaire ça demain.",
          "opts":ACTION("recommencer"),
          "ex":"Tu capitalises : tu transformes le bon moment en stratégie réutilisable."
        },
        {
          "comic":BD("Souvenir précis",[
            {"who":"left","kind":"good","text":"Je repense à trois détails : l'odeur de l'atelier, le sourire du groupe, la tâche réussie."}
          ],"Plus le souvenir est concret, plus il peut soutenir l'émotion agréable.",[{"name":"A","tone":"calm"}]),
          "text":"Après une bonne journée, tu te rappelles trois détails : l'odeur de l'atelier, le sourire du groupe, la tâche réussie.",
          "opts":ACTION("savourer"),
          "ex":"Tu savoures avec des détails concrets. Le souvenir devient plus stable."
        },
        {
          "comic":BD("Comparaison",[
            {"who":"right","text":"Ton travail est réussi."},
            {"who":"left","kind":"warn","text":"Oui, mais l'autre a fait encore mieux que moi."}
          ],"La comparaison peut couper la fierté avant qu'elle aide à progresser."),
          "text":"Tu as réussi, mais tu passes dix minutes à te comparer à quelqu'un qui a fait encore mieux.",
          "opts":ACTION("piege"),
          "ex":"Comparer trop vite coupe la fierté. On peut apprendre des autres sans écraser son propre progrès."
        }
      ]
    },

    {
      "temps":"entraine",
      "type":"imagepick",
      "tag":"Mission 2",
      "instr":"Observe les scènes et choisis celle qui correspond le mieux à la stratégie demandée.",
      "items":[
        {
          "text":"Stratégie : je reconnais une fierté et je la transforme en confiance.",
          "options":CARTES("fierte")
        },
        {
          "text":"Stratégie : je remercie clairement la personne qui m'a aidé.",
          "options":CARTES("merci")
        },
        {
          "text":"Stratégie : je remarque que la tension est redescendue et je retiens ce qui m'a apaisé.",
          "options":CARTES("soulagement")
        },
        {
          "text":"Stratégie : je repère une activité qui me fait du bien et je prévois de la refaire.",
          "options":CARTES("refaire")
        },
        {
          "text":"Piège : je coupe le positif en cherchant seulement ce qui ne va pas.",
          "options":CARTES("piege")
        }
      ]
    },

    {
      "temps":"entraine",
      "type":"cardpick",
      "variant":"quiz",
      "tag":"Mission 3",
      "instr":"Choisis la réponse qui cultive le mieux l'émotion agréable, sans exagérer ni écraser les autres.",
      "items":[
        {
          "img":IMG.reussite,
          "alt":"élève fier après un retour positif",
          "text":"Ton professeur dit : « Tu as vraiment progressé. »",
          "opts":[
            {"l":"« Merci. Je suis content parce que j'ai travaillé ce point plusieurs fois. »","ok":true},
            {"l":"« Normal, je suis plus fort que les autres. »","ok":false},
            {"l":"« Non, c'est rien, on oublie. »","ok":false},
            {"l":"« Oui mais j'ai encore raté un détail, donc ça ne compte pas. »","ok":false}
          ],
          "ex":"La bonne réponse accepte la fierté, reste humble et relie la réussite à l'effort."
        },
        {
          "img":IMG.soutien,
          "alt":"élève soutenu par un proche",
          "text":"Une camarade t'a aidé à finir une tâche difficile.",
          "opts":[
            {"l":"« Merci, ton aide m'a permis de comprendre la consigne et je me sens soulagé. »","ok":true},
            {"l":"« Heureusement que tu étais là, moi je suis nul. »","ok":false},
            {"l":"« C'était ton rôle de m'aider, donc normal. »","ok":false},
            {"l":"« Je ne dis rien, ça évite d'avoir l'air faible. »","ok":false}
          ],
          "ex":"Remercier précisément renforce le lien et l'émotion agréable."
        },
        {
          "img":IMG.joie,
          "alt":"élèves heureux après une réussite en atelier",
          "text":"Tu as passé un bon moment dans une activité de groupe.",
          "opts":[
            {"l":"« J'ai aimé quand on s'est réparti les rôles. On pourrait refaire comme ça. »","ok":true},
            {"l":"« C'était bien, mais la prochaine fois je veux tout diriger. »","ok":false},
            {"l":"« Je vais chercher ce qui n'allait pas pour ne pas trop profiter. »","ok":false},
            {"l":"« C'était juste de la chance. »","ok":false}
          ],
          "ex":"Tu identifies ce qui a marché et tu peux le reproduire."
        },
        {
          "img":IMG.soulagement,
          "alt":"élève soulagé après une tension terminée",
          "text":"Tu termines un oral que tu redoutais. Tu ressens du soulagement.",
          "opts":[
            {"l":"« Je remarque que la tension redescend. La respiration m'a aidé, je garde cette idée. »","ok":true},
            {"l":"« Plus jamais je ne veux revivre ça, je n'apprends rien. »","ok":false},
            {"l":"« Je fais comme si je n'avais pas eu peur. »","ok":false},
            {"l":"« Je me moque de ceux qui stressent encore. »","ok":false}
          ],
          "ex":"Le soulagement donne une information : ce qui aide peut être réutilisé."
        }
      ]
    },

    {
      "temps":"situation",
      "type":"order",
      "title":"🪜 Ancrer une réussite",
      "instr":"Remets les étapes dans l'ordre pour transformer un bon moment en ressource.",
      "audio":"Pour ancrer une réussite, je m'arrête, je nomme l'émotion, je repère ce qui l'a déclenchée, je remercie ou je partage si c'est utile, je garde une trace et je choisis une chose à refaire.",
      "steps":[
        "Je m'arrête quelques secondes au lieu de zapper.",
        "Je nomme l'émotion agréable : joie, fierté, soulagement, gratitude...",
        "Je repère le déclencheur : qu'est-ce qui a rendu ce moment important ?",
        "Je partage ou je remercie si une personne est concernée.",
        "Je garde une trace : souvenir, phrase, photo, geste réussi.",
        "Je choisis ce que je peux refaire ou réutiliser."
      ],
      "stepImages":[IMG.observation, IMG.fierte, IMG.messageFierte, IMG.soutien, IMG.messageSoulagement, IMG.joie],
      "stepAlts":[
        "élève qui observe une réussite",
        "fierté reconnue",
        "message de fierté",
        "soutien et gratitude",
        "trace de soulagement",
        "activité positive à refaire"
      ]
    },

    {
      "temps":"situation",
      "type":"scenario",
      "tag":"Mission 4",
      "scenes":[
        {
          "img":IMG.fierte,
          "alt":"élève fier après un retour",
          "text":"En PFMP, ton tuteur remarque que tu as gagné en autonomie. Tu ressens de la fierté et un peu de gêne.",
          "audio":"En PFMP, ton tuteur remarque que tu as gagné en autonomie. Tu ressens de la fierté et un peu de gêne.",
          "choices":[
            {
              "l":"« Merci. Je suis fier parce que j'ai osé demander puis refaire seul. Je vais garder cette méthode. »",
              "good":true,
              "fb":"Très bien : tu acceptes le compliment, tu relies la fierté à une action et tu capitalises."
            },
            {
              "l":"« Non, franchement c'est rien. »",
              "good":false,
              "fb":"Tu coupes la fierté. Recevoir un compliment fait aussi partie de la régulation positive."
            },
            {
              "l":"« Oui, maintenant je n'ai plus besoin de personne. »",
              "good":false,
              "fb":"La fierté devient comparaison ou fermeture. L'objectif est de renforcer la confiance sans écraser le lien."
            }
          ]
        },
        {
          "img":IMG.soutien,
          "alt":"élève soutenu par un proche",
          "text":"Un camarade t'aide à corriger une erreur sans se moquer. Tu te sens soulagé et reconnaissant.",
          "audio":"Un camarade t'aide à corriger une erreur sans se moquer. Tu te sens soulagé et reconnaissant.",
          "choices":[
            {
              "l":"« Merci, tu m'as aidé sans me juger. Je me sens soulagé et j'ai mieux compris. »",
              "good":true,
              "fb":"Oui. Tu exprimes la gratitude et tu nommes l'effet positif de l'aide."
            },
            {
              "l":"« C'est bon, j'aurais compris tout seul. »",
              "good":false,
              "fb":"Tu protèges peut-être ton image, mais tu perds l'occasion de renforcer le lien."
            },
            {
              "l":"« Maintenant tu m'aideras à chaque fois. »",
              "good":false,
              "fb":"Remercier ne veut pas dire rendre l'autre responsable de tout. La demande doit rester juste."
            }
          ]
        },
        {
          "img":IMG.joie,
          "alt":"élèves heureux après une activité réussie",
          "text":"Une activité de groupe s'est très bien passée. Tout le monde a participé et l'ambiance était bonne.",
          "audio":"Une activité de groupe s'est très bien passée. Tout le monde a participé et l'ambiance était bonne.",
          "choices":[
            {
              "l":"« J'ai aimé la répartition des rôles. On peut retenir cette organisation pour la prochaine fois. »",
              "good":true,
              "fb":"Oui. Tu transformes la joie du moment en ressource collective."
            },
            {
              "l":"« On a eu de la chance, ça ne se reproduira pas. »",
              "good":false,
              "fb":"Tu retires toute valeur au moment. Cherche plutôt ce qui a aidé."
            },
            {
              "l":"« C'était bien grâce à moi surtout. »",
              "good":false,
              "fb":"La joie collective se fragilise si tu prends toute la place."
            }
          ]
        }
      ]
    },

    {
      "temps":"point",
      "type":"wrap",
      "keep":[
        {"ic":"🌤️","html":"Les émotions agréables sont aussi à réguler : elles peuvent devenir <strong>confiance</strong>, <strong>motivation</strong> et <strong>lien</strong>."},
        {"ic":"🔎","html":"Savourer, c'est s'arrêter sur le bon moment avec des détails concrets."},
        {"ic":"🗣️","html":"Partager et remercier prolongent l'émotion agréable et renforcent les relations."},
        {"ic":"🔁","html":"Capitaliser, c'est garder une trace et repérer ce qu'on peut refaire."},
        {"ic":"⚠️","html":"Les pièges : minimiser, zapper, comparer, chercher immédiatement le défaut."}
      ],
      "self":[
        "Je sais nommer une émotion agréable précise.",
        "Je sais choisir entre savourer, partager, remercier, garder une trace ou recommencer.",
        "Je sais accepter un compliment sans me comparer ni me rabaisser.",
        "Je sais transformer une réussite en méthode pour la suite."
      ]
    }
  ]
});
</script>
</body>
</html>
