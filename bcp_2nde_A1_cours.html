<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSE - Module A1 : Le système de santé - Cours</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            color: #333;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 600px;
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        }
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        h1 {
            font-size: 1.6em;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .module-name {
            font-size: 1.1em;
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .message {
            font-size: 1.15em;
            color: #555;
            line-height: 1.6;
            margin-bottom: 35px;
            padding: 20px;
            background: #f0f7ff;
            border-radius: 12px;
            border-left: 4px solid #4facfe;
        }
        .btn-retour {
            display: inline-block;
            padding: 14px 40px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-retour:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 172, 254, 0.5);
        }
        .footer {
            margin-top: 25px;
            font-size: 0.85em;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📚</div>
        <h1>Cours en préparation</h1>
        <p class="module-name">Module A1 : Le système de santé</p>
        <div class="message">
            Le cours de ce module est en cours de création.<br>
            Il sera bientôt disponible ici.
        </div>
        <a href="index.html" class="btn-retour">Retour à l'accueil</a>
        <p class="footer">M. MECHERI — PSE</p>
    </div>
</body>
</html>
