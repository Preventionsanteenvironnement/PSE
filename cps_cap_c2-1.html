<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPS C2.1 — Atteindre mes objectifs</title>
<link rel="stylesheet" href="assets/cps_kit.css">
</head>
<body>
<div id="cps-app"></div>
<script src="assets/cps_kit.js"></script>
<script>CPS.init({
  "theme": "cog",
  "code": "C2.1",
  "ref": "Atteindre ses buts personnels",
  "icon": "🎯",
  "title": "Atteindre mes objectifs",
  "subtitle": "Un objectif clair + des petites étapes.",
  "parcours": [

    {
      "temps": "decouvre",
      "type": "lesson",
      "title": "💡 C’est quoi un bon objectif ?",
      "audio": "Un objectif flou, ça ne marche pas. Un bon objectif est précis : tu sais quoi faire et pour quand. Et si c’est grand, tu le découpes en petites étapes. Chaque étape réussie t’amène à la suivante.",
      "blocks": [
        {
          "ic": "🔍",
          "html": "Un objectif <strong>flou</strong> : « je vais bosser un peu. »"
        },
        {
          "ic": "🎯",
          "html": "Un objectif <strong>précis</strong> : « je révise ma fiche sécurité ce soir à 18 h. »"
        },
        {
          "ic": "🪜",
          "html": "Un grand objectif, on le <strong>découpe en étapes</strong> simples."
        },
        {
          "ic": "🌱",
          "html": "Chaque étape réussie <strong>te donne confiance</strong> pour continuer."
        },
        {
          "html": "Les mots à connaître :",
          "words": ["Objectif précis", "Étape", "Action concrète", "Délai"]
        }
      ],
      "cta": "▶️ Je m’entraîne"
    },

    {
      "temps": "entraine",
      "type": "cardpick",
      "variant": "quiz",
      "instr": "Cet objectif est-il bien formulé ou trop flou ?",
      "items": [
        {
          "em": "📋",
          "text": "« Je vais faire des efforts en atelier. »",
          "opts": [
            { "l": "🎯 Bien formulé", "ok": false },
            { "l": "🌫️ Trop flou", "ok": true }
          ],
          "ex": "Trop flou. On ne sait pas quoi faire, ni quand. Essaie plutôt : « Je range mes outils chaque soir à 17 h. »"
        },
        {
          "em": "🗓️",
          "text": "« Je finis mon chef-d’œuvre avant les vacances de février. »",
          "opts": [
            { "l": "🎯 Bien formulé", "ok": true },
            { "l": "🌫️ Trop flou", "ok": false }
          ],
          "ex": "Bien formulé ! Tu sais quoi faire et tu as une date limite claire."
        },
        {
          "em": "📱",
          "text": "« Je vais moins regarder mon téléphone. »",
          "opts": [
            { "l": "🎯 Bien formulé", "ok": false },
            { "l": "🌫️ Trop flou", "ok": true }
          ],
          "ex": "Trop flou. Combien de temps ? Quand ? Essaie : « Je ne touche pas mon téléphone pendant les cours du matin. »"
        },
        {
          "em": "🚌",
          "text": "« Je prends le bus de 7 h 45 tous les jours de stage. »",
          "opts": [
            { "l": "🎯 Bien formulé", "ok": true },
            { "l": "🌫️ Trop flou", "ok": false }
          ],
          "ex": "Parfait. L’action est précise et l’heure est fixée."
        },
        {
          "em": "📝",
          "text": "« Je vais réviser pour l’examen de PSE. »",
          "opts": [
            { "l": "🎯 Bien formulé", "ok": false },
            { "l": "🌫️ Trop flou", "ok": true }
          ],
          "ex": "Trop flou. Quand ? Combien de temps ? Essaie : « Je révise 20 minutes chaque soir cette semaine. »"
        }
      ]
    },

    {
      "temps": "situation",
      "type": "order",
      "title": "🪜 Réussir son chef-d’œuvre : dans quel ordre ?",
      "instr": "Remets ces étapes dans le bon ordre pour préparer ton chef-d’œuvre.",
      "audio": "Pour réussir ton chef-d’œuvre, il faut y aller étape par étape. D’abord comprendre ce qu’on attend de toi, puis planifier ton travail, ensuite réaliser, et enfin relire et corriger.",
      "steps": [
        "Je lis le sujet et je comprends ce qu’on attend.",
        "Je liste les étapes et je fixe une date pour chacune.",
        "Je réalise chaque étape une par une.",
        "Je relis, je corrige, et je vérifie que tout est complet."
      ]
    },

    {
      "temps": "situation",
      "type": "scenario",
      "scenes": [
        {
          "em": "😓",
          "audio": "Tu voulais réviser 20 minutes ce soir. Mais tu es crevé après l’atelier. Ton copain t’invite à jouer en ligne. Que fais-tu ?",
          "text": "Tu voulais réviser 20 min ce soir. Mais tu es crevé après l’atelier. Ton copain t’invite à jouer en ligne.",
          "choices": [
            {
              "l": "Je joue, je réviserai demain.",
              "good": false,
              "fb": "Demain, il y aura une autre excuse. Repousser souvent, c’est abandonner son objectif. Mieux vaut réviser 10 minutes maintenant — même réduit, c’est une étape tenue."
            },
            {
              "l": "Je révise 10 minutes, puis je joue.",
              "good": true,
              "fb": "Bien joué ! Tu adaptes sans abandonner. Une petite étape tenue vaut mieux qu’une grande ratée."
            }
          ]
        },
        {
          "em": "😤",
          "audio": "En stage, ton maître de stage te donne une tâche que tu n’as pas encore apprise. Tu te sens bloqué. Que fais-tu ?",
          "text": "En stage, ton maître de stage te donne une tâche que tu n’as pas encore apprise. Tu te sens bloqué.",
          "choices": [
            {
              "l": "Je fais semblant de comprendre et j’essaie seul.",
              "good": false,
              "fb": "Faire semblant peut mener à une erreur ou un accident. En stage, demander de l’aide montre que tu es sérieux, pas faible."
            },
            {
              "l": "Je demande une explication avant de commencer.",
              "good": true,
              "fb": "C’est la bonne attitude. Comprendre avant d’agir, c’est une étape clé pour réussir ta tâche et progresser."
            }
          ]
        }
      ]
    },

    {
      "temps": "point",
      "type": "wrap",
      "keep": [
        {
          "ic": "🎯",
          "html": "Un bon objectif est <strong>précis</strong> : quoi faire, et pour quand."
        },
        {
          "ic": "🪜",
          "html": "Je <strong>découpe</strong> un grand objectif en petites étapes faisables."
        },
        {
          "ic": "🌱",
          "html": "Chaque étape réussie me <strong>donne de l’élan</strong> pour la suivante."
        },
        {
          "ic": "🛟",
          "html": "Si je bloque, j’<strong>adapte</strong> mon étape — sans tout abandonner."
        }
      ],
      "self": [
        "Je sais formuler un objectif précis avec une date.",
        "Je suis capable de découper un grand projet en étapes.",
        "Je connais une stratégie pour tenir mon objectif quand c’est difficile."
      ]
    }

  ]
});</script>
</body>
</html>
