<head>

<title>CPS E2.2b — Apaiser ce qui fait mal</title>
<link rel="stylesheet" href="assets/cps_kit.css?v=20260617-consigne">
<style>

.cps-prompt .cps-img,.cps-lesson .cps-img{max-height:420px;width:auto}
@media (max-width:640px){
  .cps{max-width:100%;padding:12px}
  .cps-prompt .cps-img,.cps-lesson .cps-img{max-height:300px}
}
</style>
</head>
<body>
<div id="cps-app"></div>
<script src="assets/cps_kit.js"></script>
<script>
var IMG = {
  corps:"assets/emotions/e2-3/signaux-corps-stress.jpg",
  moi:"assets/emotions/e2-3/strategies-agir-sur-moi.jpg",
  probleme:"assets/emotions/e2-3/strategies-agir-sur-probleme.jpg",
  atelier:"assets/emotions/e1-jury/dossier-atelier-erreur.jpg",
  exclusion:"assets/emotions/e1-jury/dossier-exclusion-groupe.jpg",
  cuisine:"assets/emotions/e1-jury/dossier-degout-cuisine.jpg",
  honte:"assets/emotions/e1-2/nuance-honte-erreur.jpg",
  colere:"assets/emotions/e1-2/nuance-colere-blessee.jpg",
  soulagement:"assets/emotions/e1-vocab/nuance-soulagement-fin.jpg"
};

var INTENSITE = function(bonne){
  return [
    {"l":"1 à 3 : je peux réfléchir et choisir calmement","ok":bonne==="verte"},
    {"l":"4 à 7 : je dois ralentir avant d'agir","ok":bonne==="orange"},
    {"l":"8 à 10 : priorité pause, sécurité, aide","ok":bonne==="rouge"}
  ];
};
var STRAT = function(bonne){
  return [
    {"l":"Stratégie du quotidien","ok":bonne==="quotidien"},
    {"l":"Stratégie de crise / forte intensité","ok":bonne==="crise"},
    {"l":"Piège qui aggrave","ok":bonne==="piege"}
  ];
};
var BD = function(label,bubbles,note,people){
  return {"panels":[{"label":label,"people":people||[{"name":"A"},{"name":"B","side":"right"}],"bubbles":bubbles,"note":note}]};
};
var CARTES = function(bonne){
  return [
    {"img":IMG.corps,"alt":"plusieurs élèves montrent des signes corporels de tension","l":"Lire mon corps","ok":bonne==="corps","ex":"Oui : avant d'agir, je repère souffle, ventre, épaules, fatigue, agitation."},
    {"img":IMG.moi,"alt":"respirer, marcher et parler à un adulte de confiance","l":"Apaiser mon corps et demander du soutien","ok":bonne==="moi","ex":"Oui : respiration, marche et parole peuvent faire baisser l'intensité."},
    {"img":IMG.probleme,"alt":"préparer, organiser et demander une précision","l":"Réduire le problème concret","ok":bonne==="probleme","ex":"Oui : quand le problème est encore contrôlable, je peux organiser ou demander de l'aide."},
    {"img":IMG.atelier,"alt":"élève gêné après une erreur puis dialogue avec le professeur","l":"Réparer après une erreur","ok":bonne==="atelier","ex":"Oui : je peux passer de la gêne à une action de réparation."},
    {"img":IMG.exclusion,"alt":"élève à l'écart puis inclusion dans le groupe","l":"Chercher du lien","ok":bonne==="lien","ex":"Oui : une émotion désagréable peut signaler un besoin de lien ou de soutien."}
  ];
};

CPS.init({
  "theme":"emo",
  "code":"E2.2b",
  "ref":"Réguler ses émotions désagréables",
  "icon":"🌧️",
  "title":"Apaiser ce qui fait mal",
  "subtitle":"Observer l'intensité, écouter le besoin, choisir une stratégie.",
  "parcours":[
    {
      "temps":"decouvre",
      "type":"lesson",
      "title":"💡 Une émotion difficile se régule par étapes",

      "blocks":[

        {"ic":"🌧️","html":"Une émotion désagréable est un <strong>signal</strong>. Elle peut dire : besoin de respect, sécurité, lien, aide, calme, réparation."},

        {"ic":"⚠️","html":"Les pièges : ruminer seul, se défouler sur quelqu'un, éviter longtemps, tout garder pour soi, répondre trop vite."}

    },

    {
      "temps":"entraine",
      "type":"cardpick",
      "variant":"quiz",
      "tag":"Mission 1",
      "instr":"Lis la situation. Quel niveau d'intensité semble le plus juste ?",
      "demo":{

        "alt":"élève gêné après une erreur en atelier",

        "ex":"On n'est pas à zéro : l'émotion est présente. Mais il reste capable de réfléchir et de demander une aide."

      "items":[

          "img":IMG.honte,
          "alt":"élève gênée après une erreur",

          "ex":"Intensité moyenne : on ralentit, puis on cherche une action utile."
        },
        {
          "img":IMG.exclusion,
          "alt":"élève à l'écart puis soutien du groupe",
          "text":"À la pause, tu te sens un peu seul. Tu es triste, mais tu peux encore aller vers quelqu'un ou envoyer un message.",
          "opts":INTENSITE("verte"),
          "ex":"Intensité basse à moyenne : tu peux réfléchir et choisir une stratégie de lien."
        },
        {
          "img":IMG.colere,
          "alt":"élève contrariée après une critique",
          "text":"Tu sens la tension monter vite : mâchoire serrée, envie de répondre fort, difficulté à écouter.",
          "opts":INTENSITE("rouge"),
          "ex":"Quand l'intensité est forte, la priorité est de faire une pause et d'éviter une réaction impulsive."
        },
        {
          "img":IMG.cuisine,
          "alt":"élève devant un contenant sale en cuisine",
          "text":"Tu es repoussé par un contenant sale. Tu peux prévenir l'adulte et appliquer la règle d'hygiène.",
          "opts":INTENSITE("orange"),
          "ex":"L'émotion protège : elle signale un besoin d'hygiène et de sécurité. On agit sans paniquer."
        },
        {
          "img":IMG.soulagement,
          "alt":"élève soulagé à la fin d'une tâche",
          "text":"Après avoir parlé à quelqu'un, ton corps se détend et tu retrouves de l'énergie.",
          "opts":INTENSITE("verte"),
          "ex":"Le corps redescend : tu peux analyser ce qui a aidé et garder la stratégie pour une prochaine fois."
        }
      ]
    },

    {
      "temps":"entraine",
      "type":"imagepick",
      "tag":"Mission 2",
      "instr":"Images mélangées — choisis la carte qui correspond à la stratégie.",
      "items":[
        {
          "text":"Je veux d'abord lire mon corps avant de répondre. Quelle carte choisir ?",
          "options":CARTES("corps")
        },
        {
          "text":"L'émotion est forte : je veux faire baisser l'intensité et chercher du soutien. Quelle carte choisir ?",
          "options":CARTES("moi")
        },
        {
          "text":"Je suis gêné après une erreur. Je veux comprendre comment réparer. Quelle carte choisir ?",
          "options":CARTES("atelier")
        },
        {
          "text":"Je ressens de la solitude. Le besoin touché est le lien. Quelle carte choisir ?",
          "options":CARTES("lien")
        },
        {
          "text":"Le problème est concret et encore contrôlable : je dois organiser, demander, découper. Quelle carte choisir ?",
          "options":CARTES("probleme")
        }
      ]
    },

    {
      "temps":"entraine",
      "type":"cardpick",
      "variant":"sort",
      "tag":"Mission 3",
      "instr":"Classe la réaction : quotidien, crise/forte intensité, ou piège qui aggrave ?",
      "items":[
        {
          "comic":BD("Tension forte",[
            {"who":"left","kind":"warn","text":"Je sens que ça monte."},
            {"who":"left","kind":"good","text":"Je m'arrête une minute, je respire lentement, puis je réponds."}

          "text":"Je m'arrête une minute, je respire lentement, puis je réponds.",
          "opts":STRAT("crise"),
          "ex":"Quand ça monte fort, la pause évite de répondre sous l'impulsion."
        },
        {
          "comic":BD("Parole de soutien",[
            {"who":"left","kind":"good","text":"Je ressens de la honte, j'ai besoin de comprendre comment réparer."},
            {"who":"right","text":"On va reprendre calmement ce qui s'est passé."}
          ],"Nommer l'émotion et le besoin aide à chercher une solution."),
          "text":"À la pause, j'explique à un adulte : « Je ressens de la honte, j'ai besoin de comprendre comment réparer. »",
          "opts":STRAT("quotidien"),
          "ex":"Mettre en mots l'émotion et le besoin peut réduire l'intensité et ouvrir une solution."
        },
        {
          "comic":BD("Rumination",[
            {"who":"left","kind":"warn","text":"Je repasse la scène toute la soirée."},
            {"who":"left","text":"Je cherche qui a tort, encore et encore."}
          ],"La pensée tourne en boucle sans action utile.",[{"name":"A"}]),
          "text":"Je repasse la scène dans ma tête toute la soirée en cherchant qui a tort.",
          "opts":STRAT("piege"),
          "ex":"Ruminer entretient l'émotion désagréable et bloque l'action utile."
        },
        {
          "comic":BD("Sortie courte",[
            {"who":"left","kind":"warn","text":"Si je reste, je vais parler trop fort."},
            {"who":"left","kind":"good","text":"Je sors quelques minutes, puis je reviens."}
          ],"S'éloigner brièvement sert à revenir plus disponible.",[{"name":"A","tone":"calm"}]),
          "text":"Je quitte la situation quelques minutes parce que je sens que je vais parler trop fort.",
          "opts":STRAT("crise"),
          "ex":"S'éloigner brièvement peut être une stratégie de sécurité si on revient ensuite au dialogue."
        },
        {
          "comic":BD("Faits et besoin",[
            {"who":"left","kind":"good","text":"Je note les faits, ce que j'ai ressenti et ce dont j'ai besoin."},
            {"who":"right","text":"Tu sépares la situation de l'interprétation."}
          ],"Écrire aide à mettre de l'ordre dans l'émotion."),
          "text":"Je note les faits : ce qui s'est passé, ce que j'ai ressenti, ce dont j'ai besoin.",
          "opts":STRAT("quotidien"),
          "ex":"Écrire aide à distinguer faits, émotion, besoin et interprétation."
        },
        {
          "comic":BD("Défoulement risqué",[
            {"who":"left","kind":"warn","text":"J'ai besoin que ça sorte."},
            {"who":"left","kind":"warn","text":"Je me défoule sur quelqu'un qui n'a rien fait."},
            {"who":"right","text":"Je ne comprends pas pourquoi tu m'attaques."}
          ],"Le soulagement immédiat crée un nouveau problème relationnel."),
          "text":"Je me défoule sur quelqu'un qui n'a rien fait, parce que j'ai besoin que ça sorte.",
          "opts":STRAT("piege"),
          "ex":"Ça peut soulager sur le moment, mais ça crée un nouveau problème relationnel."
        },
        {
          "comic":BD("Marche de retour au calme",[
            {"who":"left","kind":"good","text":"Je marche dix minutes pour redescendre."},
            {"who":"left","text":"Après, je reprends la discussion."}
          ],"Le mouvement aide le corps à évacuer la tension.",[{"name":"A","tone":"calm"}]),
          "text":"Je marche dix minutes pour redescendre avant de reprendre la discussion.",
          "opts":STRAT("crise"),
          "ex":"Le mouvement aide le corps à décharger la tension."
        },
        {
          "comic":BD("Soutien",[
            {"who":"left","kind":"good","text":"Je demande du soutien au lieu de garder tout pour moi."},
            {"who":"right","text":"On peut chercher une solution ensemble."}
          ],"Le lien aide souvent à faire baisser l'intensité."),
          "text":"Je demande du soutien à quelqu'un de confiance au lieu de garder tout pour moi.",
          "opts":STRAT("quotidien"),
          "ex":"Le soutien social est une stratégie efficace pour apaiser une émotion désagréable."
        }
      ]
    },

    {
      "temps":"situation",
      "type":"order",
      "title":"🪜 Redescendre sans exploser",
      "instr":"Remets les étapes dans le bon ordre quand l'émotion devient très forte.",
      "audio":"Quand l'émotion devient très forte, on ne résout pas tout de suite. On s'arrête, on sécurise, on respire, on nomme ce qu'on ressent, on demande de l'aide si besoin, puis on revient au problème plus tard.",
      "steps":[
        "Je remarque le signal rouge : mon corps monte très fort.",
        "Je fais une pause : je ne réponds pas tout de suite.",
        "Je sécurise : je m'éloigne, je respire ou je demande un adulte.",
        "Je nomme : je ressens de la colère, de la honte, de la peur ou de la tristesse.",
        "Je repère le besoin : respect, lien, réparation, sécurité, calme.",
        "Quand je suis redescendu, je choisis une action utile."
      ],
      "stepImages":[IMG.corps, IMG.colere, IMG.moi, IMG.honte, IMG.exclusion, IMG.probleme],
      "stepAlts":[
        "signaux du corps",
        "élève contrariée",
        "respirer marcher parler",
        "élève gênée",
        "besoin de lien",
        "organiser et demander de l'aide"
      ]
    },

    {
      "temps":"situation",
      "type":"scenario",
      "tag":"Mission 4",
      "scenes":[
        {
          "img":IMG.atelier,
          "alt":"élève gêné après une erreur puis dialogue avec le professeur",
          "text":"En atelier, ton erreur est montrée devant d'autres élèves. Tu ressens de la honte et de la tension. Que fais-tu ?",
          "audio":"En atelier, ton erreur est montrée devant d'autres élèves. Tu ressens de la honte et de la tension. Que fais-tu ?",
          "choices":[
            {
              "l":"Je respire, puis je demande : « Qu'est-ce que je peux corriger en premier ? »",
              "good":true,
              "fb":"Oui. Tu fais baisser l'intensité et tu transformes la honte en action de réparation."
            },
            {
              "l":"Je me dis que je suis nul et je n'écoute plus rien.",
              "good":false,
              "fb":"Cette pensée augmente la honte. Il vaut mieux revenir aux faits et à une petite action."
            },
            {
              "l":"Je réponds sèchement pour ne pas perdre la face.",
              "good":false,
              "fb":"Répondre sous tension peut aggraver la relation. Pause d'abord."
            }
          ]
        },
        {
          "img":IMG.exclusion,
          "alt":"élève à l'écart puis inclusion dans le groupe",
          "text":"Tu te sens mis à l'écart dans un groupe. L'émotion est triste et lourde, mais tu peux encore parler. Quelle action est utile ?",
          "audio":"Tu te sens mis à l'écart dans un groupe. L'émotion est triste et lourde, mais tu peux encore parler. Quelle action est utile ?",
          "choices":[
            {
              "l":"Je choisis une personne de confiance et je dis que j'aimerais participer.",
              "good":true,
              "fb":"Oui. Tu écoutes le besoin de lien et tu fais une demande claire."
            },
            {
              "l":"Je conclus que personne ne m'aime et je m'isole toute la journée.",
              "good":false,
              "fb":"C'est une interprétation globale. Elle risque d'augmenter la tristesse."
            },
            {
              "l":"Je fais semblant que ça ne me touche pas et je garde tout.",
              "good":false,
              "fb":"Tout garder peut alourdir l'émotion. Un petit soutien peut aider."
            }
          ]
        },
        {
          "img":IMG.cuisine,
          "alt":"élève devant un contenant sale en cuisine pédagogique",
          "text":"En cuisine, un contenant sale te repousse. Tu ressens du dégoût. Quelle réaction est la plus adaptée ?",
          "audio":"En cuisine, un contenant sale te repousse. Tu ressens du dégoût. Quelle réaction est la plus adaptée ?",
          "choices":[
            {
              "l":"Je ne touche pas inutilement, je préviens l'adulte et j'applique la règle d'hygiène.",
              "good":true,
              "fb":"Oui. Le dégoût protège : ici il signale un besoin d'hygiène et de sécurité."
            },
            {
              "l":"Je crie sur le groupe parce que c'est insupportable.",
              "good":false,
              "fb":"L'émotion est utile, mais crier crée un autre problème. On agit sur l'hygiène."
            },
            {
              "l":"Je fais comme si je n'avais rien vu.",
              "good":false,
              "fb":"Ignorer un signal d'hygiène peut être dangereux. Il faut prévenir."
            }
          ]
        },
        {
          "img":IMG.colere,
          "alt":"élève contrariée après une critique",
          "text":"Une critique te touche. Tu sens que l'intensité est à 9 sur 10. Que faire d'abord ?",
          "audio":"Une critique te touche. Tu sens que l'intensité est à neuf sur dix. Que faire d'abord ?",
          "choices":[
            {
              "l":"Je fais une pause, je respire, et je reprends la discussion quand je suis redescendu.",
              "good":true,
              "fb":"Oui. À forte intensité, on protège la relation et on évite l'impulsivité."
            },
            {
              "l":"Je cherche tout de suite la phrase parfaite pour gagner la discussion.",
              "good":false,
              "fb":"À 9 sur 10, le cerveau réfléchit moins bien. Il faut d'abord redescendre."
            },
            {
              "l":"Je dis la première chose qui me passe par la tête.",
              "good":false,
              "fb":"C'est précisément le moment où une pause est nécessaire."
            }
          ]
        }
      ]
    },

    {
      "temps":"point",
      "type":"wrap",
      "keep":[
        {"ic":"🌧️","html":"Une émotion désagréable est un <strong>signal</strong> : un besoin peut être non satisfait ou menacé."},
        {"ic":"📏","html":"La stratégie dépend de <strong>l'intensité</strong> : basse, moyenne ou forte."},
        {"ic":"🔴","html":"À forte intensité, priorité à la <strong>pause</strong>, à la sécurité et à l'aide."},
        {"ic":"🌱","html":"Au quotidien, je peux respirer, marcher, parler, écrire les faits, demander du soutien."},
        {"ic":"🧩","html":"Quand je suis redescendu, je peux agir sur le problème : réparer, demander, clarifier, organiser."},
        {"ic":"⚠️","html":"Ruminer, se défouler, éviter longtemps ou tout garder pour soi peut aggraver l'émotion."}
      ],
      "self":[
        "Je sais repérer l'intensité d'une émotion désagréable.",
        "Je sais écouter le besoin derrière l'émotion.",
        "Je connais au moins deux stratégies pour redescendre.",
        "Je sais quoi faire quand l'intensité est très forte.",
        "Je sais reconnaître une réaction piège qui aggrave."
      ]
    }
  ]
});
</script>
