<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPS E1.2 — Le corps donne des indices</title>
<link rel="stylesheet" href="assets/cps_kit.css?v=20260618-bd">
</head>
<body>
<div id="cps-app"></div>
<script src="assets/cps_kit.js?v=20260618-bd"></script>
<script>
function shuf(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
var C = "assets/emotions/corps/";
var P = "assets/emotions/e1-3/";
var p = function(name){ return P + name; };
var ZONES = ["ventre","poings","gorge","poitrine / cœur","visage","tout le corps"];
function zoneOpts(bonne){
  var autres = shuf(ZONES.filter(function(z){ return z!==bonne; })).slice(0,3);
  return shuf([{l:bonne,ok:true}].concat(autres.map(function(z){ return {l:z,ok:false}; })));
}
function hypoOpts(bonne){
  return [
    {"l":"Peur / stress","ok":bonne==="peur"},
    {"l":"Colère / frustration","ok":bonne==="colere"},
    {"l":"Tristesse / déception","ok":bonne==="tristesse"},
    {"l":"Joie / fierté","ok":bonne==="joie"},
    {"l":"Honte / gêne","ok":bonne==="honte"},
    {"l":"Surprise","ok":bonne==="surprise"}
  ];
}
CPS.init({
  "theme":"emo",
  "code":"E1.2",
  "ref":"Identifier ses émotions",
  "icon":"🧍",
  "title":"Le corps donne des indices",
  "subtitle":"Repère le signal, puis vérifie avec la situation.",
  "parcours":[
    {
      "temps":"decouvre","type":"lesson","title":"💡 Le corps parle, mais il faut vérifier",
      "audio":"Une émotion se voit parfois sur le visage, mais elle se sent aussi dans le corps. Le ventre, les poings, la gorge, le cœur, le visage ou tout le corps peuvent donner des indices. Attention : un même signal peut avoir plusieurs sens. Le cœur peut battre vite avec la peur, la joie ou la surprise. On observe donc le corps et la situation.",
      "blocks":[
        {"img":p("corps-peur-ventre.jpg"),"alt":"Élève inquiète, main sur le ventre","html":"Le corps donne un <strong>indice</strong> : ici, ventre serré et posture tendue."},
        {"ic":"🔎","html":"On ne conclut pas trop vite : on croise <strong>signal du corps + contexte + pensée</strong>."},
        {"ic":"❤️","html":"Le cœur peut battre fort avec la <strong>peur</strong>, la <strong>joie</strong> ou la <strong>surprise</strong>."},
        {"ic":"✊","html":"Les mains serrées peuvent montrer de la <strong>colère</strong>, de la <strong>frustration</strong> ou une tension très forte."},
        {"ic":"🎯","html":"Objectif : dire <strong>où je sens</strong>, puis <strong>ce que ça peut vouloir dire</strong>."}
      ],
      "cta":"▶️ Je m’entraîne"
    },
    {
      "temps":"entraine","type":"cardpick","variant":"quiz","tag":"Indice corporel",
      "instr":"Observe l’image. Quel signal du corps est le plus visible ?",
      "demo":{"img":p("corps-peur-ventre.jpg"),"alt":"Élève inquiète avec une main sur le ventre","text":"Avant une évaluation, l’élève pose une main sur son ventre.","audio":"Avant une évaluation, l’élève pose une main sur son ventre.","opts":zoneOpts("ventre"),"ex":"La main sur le ventre et les épaules tendues orientent vers un signal au ventre."},
      "items":[
        {"img":p("corps-colere-poings.jpg"),"alt":"Élève tendu avec les poings fermés","text":"On vient de franchir une limite. Les mains se ferment.","audio":"On vient de franchir une limite. Les mains se ferment.","opts":zoneOpts("poings"),"ex":"Les poings fermés sont un indice de tension, souvent colère ou frustration."},
        {"img":p("corps-tristesse-poitrine.jpg"),"alt":"Élève triste, main près de la poitrine","text":"L’élève est isolée et garde une main près de la poitrine.","audio":"L’élève est isolée et garde une main près de la poitrine.","opts":zoneOpts("poitrine / cœur"),"ex":"La poitrine ou le cœur peuvent devenir lourds quand on est triste ou blessé."},
        {"img":p("corps-joie-coeur.jpg"),"alt":"Élève heureux, main près du cœur","text":"Après un retour positif, le corps s’ouvre et la main va vers le cœur.","audio":"Après un retour positif, le corps s’ouvre et la main va vers le cœur.","opts":zoneOpts("poitrine / cœur"),"ex":"Le cœur peut aussi être lié à une émotion agréable : joie, fierté, reconnaissance."},
        {"img":p("corps-honte-visage.jpg"),"alt":"Élève gênée après une erreur","text":"Après une erreur, l’élève baisse le regard et touche son visage.","audio":"Après une erreur, l’élève baisse le regard et touche son visage.","opts":zoneOpts("visage"),"ex":"Rougir, baisser le regard, cacher un peu son visage : indices de gêne ou de honte."},
        {"img":p("corps-surprise-tout.jpg"),"alt":"Élève surpris, corps figé","text":"Une annonce inattendue arrive. Le corps se fige d’un coup.","audio":"Une annonce inattendue arrive. Le corps se fige d’un coup.","opts":zoneOpts("tout le corps"),"ex":"La surprise peut faire réagir tout le corps : arrêt, sursaut, yeux ouverts."}
      ]
    },
    {
      "temps":"entraine","type":"bodymap","title":"👆 Carte du corps",
      "instr":"Lis la situation, puis clique sur la zone qui donne l’indice principal.",
      "image":C+"corps-vierge.svg","alt":"silhouette du corps",
      "zones":[
        {"ans":"visage","x":50,"y":16},
        {"ans":"gorge","x":50,"y":27},
        {"ans":"poitrine","x":50,"y":39},
        {"ans":"ventre","x":50,"y":50},
        {"ans":"poings","x":26,"y":61},
        {"ans":"poings","x":74,"y":61}
      ],
      "items":[
        {"ask":"Avant l’oral, mon ventre se serre.","ok":"ventre","ex":"Ici, le ventre est l’indice principal. Il peut signaler peur ou stress."},
        {"ask":"Après une critique injuste, mes mains se ferment.","ok":"poings","ex":"Les mains ou poings serrés signalent souvent colère ou frustration."},
        {"ask":"Après une mauvaise nouvelle, j’ai la gorge serrée.","ok":"gorge","ex":"La gorge serrée peut accompagner la tristesse ou l’envie de pleurer."},
        {"ask":"Après une erreur devant le groupe, mon visage chauffe.","ok":"visage","ex":"Le visage chaud ou le regard baissé peut signaler gêne ou honte."}
      ]
    },
    {
      "temps":"entraine","type":"cardpick","variant":"quiz","tag":"Hypothèse",
      "instr":"Même signal, plusieurs sens : quelle hypothèse colle le mieux à la situation ?",
      "items":[
        {"img":p("corps-peur-ventre.jpg"),"alt":"Élève inquiète avant évaluation","text":"Ventre serré + évaluation bientôt.","audio":"Ventre serré et évaluation bientôt.","opts":hypoOpts("peur"),"ex":"Le contexte d’évaluation oriente vers peur, stress ou appréhension."},
        {"img":p("corps-joie-coeur.jpg"),"alt":"Élève heureux après retour positif","text":"Cœur qui bat + retour positif du formateur.","audio":"Cœur qui bat et retour positif du formateur.","opts":hypoOpts("joie"),"ex":"Le même cœur qui bat fort peut être agréable ici : joie ou fierté."},
        {"img":p("corps-colere-poings.jpg"),"alt":"Élève avec poings fermés en atelier","text":"Poings fermés + matériel utilisé sans accord.","audio":"Poings fermés et matériel utilisé sans accord.","opts":hypoOpts("colere"),"ex":"Le besoin de respect est touché : colère ou frustration."},
        {"img":p("corps-honte-visage.jpg"),"alt":"Élève gênée après erreur","text":"Visage chaud + erreur vue par les autres.","audio":"Visage chaud et erreur vue par les autres.","opts":hypoOpts("honte"),"ex":"Le regard des autres compte : honte ou gêne probable."},
        {"img":p("corps-surprise-tout.jpg"),"alt":"Élève surpris par annonce","text":"Corps figé + annonce inattendue.","audio":"Corps figé et annonce inattendue.","opts":hypoOpts("surprise"),"ex":"Le corps s’arrête pour traiter une nouveauté : surprise."}
      ]
    },
    {
      "temps":"situation","type":"imagepick","tag":"Comparer les signaux",
      "instr":"Choisis l’image où le signal du corps correspond le mieux à la phrase.",
      "items":[
        {
          "text":"Je sens une tension dans les mains : quelque chose me paraît injuste.",
          "audio":"Je sens une tension dans les mains : quelque chose me paraît injuste.",
          "options":[
            {"img":p("corps-colere-poings.jpg"),"alt":"poings fermés","ok":true,"ex":"Oui : mains fermées + injustice = colère ou frustration."},
            {"img":p("corps-joie-coeur.jpg"),"alt":"main sur le cœur, joie"},
            {"img":p("corps-surprise-tout.jpg"),"alt":"surprise"},
            {"img":p("corps-tristesse-poitrine.jpg"),"alt":"tristesse"}
          ]
        },
        {
          "text":"Je ne suis pas sûr de réussir et mon ventre se serre.",
          "audio":"Je ne suis pas sûr de réussir et mon ventre se serre.",
          "options":[
            {"img":p("corps-peur-ventre.jpg"),"alt":"main sur le ventre","ok":true,"ex":"Oui : incertitude + ventre serré = peur, stress ou appréhension."},
            {"img":p("corps-honte-visage.jpg"),"alt":"gêne"},
            {"img":p("corps-colere-poings.jpg"),"alt":"colère"},
            {"img":p("corps-joie-coeur.jpg"),"alt":"joie"}
          ]
        },
        {
          "text":"Une bonne nouvelle arrive : mon cœur bat fort, mais c’est agréable.",
          "audio":"Une bonne nouvelle arrive : mon cœur bat fort, mais c’est agréable.",
          "options":[
            {"img":p("corps-joie-coeur.jpg"),"alt":"joie, main sur le cœur","ok":true,"ex":"Oui : le cœur qui bat fort n’est pas toujours de la peur."},
            {"img":p("corps-peur-ventre.jpg"),"alt":"stress"},
            {"img":p("corps-tristesse-poitrine.jpg"),"alt":"tristesse"},
            {"img":p("corps-honte-visage.jpg"),"alt":"gêne"}
          ]
        }
      ]
    },
    {
      "temps":"point","type":"wrap",
      "keep":[
        {"ic":"🧍","html":"Une émotion donne des <strong>signaux corporels</strong> : ventre, gorge, cœur, mains, visage, posture."},
        {"ic":"🔎","html":"Un signal ne suffit pas toujours : on vérifie avec le <strong>contexte</strong>."},
        {"ic":"❤️","html":"Le même signal peut avoir plusieurs sens : le cœur rapide peut être <strong>peur</strong>, <strong>joie</strong> ou <strong>surprise</strong>."},
        {"ic":"🗣️","html":"Phrase utile : <strong>je sens...</strong> dans mon corps, donc je me demande si je ressens..."}
      ],
      "self":["Je sais repérer un signal dans mon corps","Je comprends qu’un même signal peut avoir plusieurs sens","Je peux relier corps + contexte pour nommer une émotion"]
    }
  ]
});
</script>
</body>
</html>
