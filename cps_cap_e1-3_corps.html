<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPS E1.2 — Où ça se passe dans mon corps ?</title>
<link rel="stylesheet" href="assets/cps_kit.css">
</head>
<body>
<div id="cps-app"></div>
<script src="assets/cps_kit.js"></script>
<script>
function shuf(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
var PARTS = ["le ventre","les poings","la gorge","le cœur","le nez","tout le corps"];
function partOpts(bonne){
  var autres = shuf(PARTS.filter(function(p){ return p!==bonne; })).slice(0,3);
  return shuf([{l:bonne,ok:true}].concat(autres.map(function(p){ return {l:p, ok:false}; })));
}
var C = "assets/emotions/corps/";
CPS.init({
  "theme":"emo",
  "code":"E1.2",
  "ref":"Identifier ses émotions",
  "icon":"🧍",
  "title":"Où ça se passe dans mon corps ?",
  "subtitle":"Une émotion se sent aussi dans le corps.",
  "parcours":[
    {
      "temps":"decouvre","type":"lesson","title":"💡 L’émotion se sent dans le corps",
      "audio":"Une émotion ne se voit pas que sur le visage. On la sent aussi dans le corps. La peur serre le ventre. La colère serre les poings. La tristesse serre la gorge. Connaître son corps aide à reconnaître ce qu’on ressent.",
      "blocks":[
        {"ic":"👀","html":"Une émotion ne se voit pas que sur le <strong>visage</strong>. On la sent aussi dans le <strong>corps</strong>."},
        {"img":C+"corps-ventre.svg","alt":"silhouette, le ventre est mis en lumière","html":"La <strong>peur</strong> : le <strong>ventre</strong> se serre."},
        {"img":C+"corps-poings.svg","alt":"silhouette, les poings sont mis en lumière","html":"La <strong>colère</strong> : les <strong>poings</strong> se serrent."},
        {"img":C+"corps-gorge.svg","alt":"silhouette, la gorge est mise en lumière","html":"La <strong>tristesse</strong> : la <strong>gorge</strong> se serre."},
        {"ic":"🎯","html":"Repérer son corps aide à <strong>reconnaître</strong> ce qu’on ressent."}
      ],
      "cta":"▶️ Je m’entraîne"
    },
    {
      "temps":"entraine","type":"cardpick","variant":"quiz",
      "instr":"Regarde le visage. Où sens-tu surtout cette émotion dans le corps ?",
      "items":[
        {"text":"La colère 😡","img":"assets/emotions/colere-furieuse.png","alt":"un visage en colère","opts":partOpts("les poings"),"ex":"La colère, on la sent souvent dans les poings serrés."},
        {"text":"La peur 😨","img":"assets/emotions/peur-apeuree.png","alt":"un visage qui a peur","opts":partOpts("le ventre"),"ex":"La peur, on la sent souvent dans le ventre."},
        {"text":"La tristesse 😢","img":"assets/emotions/tristesse-triste.png","alt":"un visage triste","opts":partOpts("la gorge"),"ex":"La tristesse serre la gorge."},
        {"text":"La joie 😀","img":"assets/emotions/joie-joyeux.png","alt":"un visage joyeux","opts":partOpts("le cœur"),"ex":"La joie, le cœur est léger."},
        {"text":"La surprise 😲","img":"assets/emotions/surprise-surpris.png","alt":"un visage surpris","opts":partOpts("tout le corps"),"ex":"La surprise fait sursauter tout le corps."},
        {"text":"Le dégoût 🤢","img":"assets/emotions/degout-degoute.png","alt":"un visage dégoûté","opts":partOpts("le nez"),"ex":"Le dégoût plisse le nez."}
      ]
    },
    {
      "temps":"situation","type":"match","title":"🔗 Relie la carte du corps à la phrase",
      "instr":"Clique une image, puis la phrase qui va avec.",
      "audio":"Relie chaque carte du corps à la bonne phrase. Clique d’abord une image, puis la phrase qui va avec.",
      "pairs":[
        {"img":C+"corps-ventre.svg","alt":"le ventre","r":"Le ventre se serre","ex":"C’est souvent la peur."},
        {"img":C+"corps-poings.svg","alt":"les poings","r":"Les poings se serrent","ex":"C’est souvent la colère."},
        {"img":C+"corps-gorge.svg","alt":"la gorge","r":"La gorge se serre","ex":"C’est souvent la tristesse."},
        {"img":C+"corps-coeur.svg","alt":"le cœur","r":"Le cœur bat fort","ex":"C’est la joie ou la peur."},
        {"img":C+"corps-nez.svg","alt":"le nez","r":"Le nez se plisse","ex":"C’est souvent le dégoût."},
        {"img":C+"corps-tout.svg","alt":"tout le corps","r":"Tout le corps sursaute","ex":"C’est souvent la surprise."}
      ]
    },
    {
      "temps":"point","type":"wrap",
      "keep":[
        {"ic":"👀","html":"Une émotion se sent dans le <strong>corps</strong>, pas seulement sur le visage."},
        {"ic":"✋","html":"Peur → le <strong>ventre</strong>. Colère → les <strong>poings</strong>. Tristesse → la <strong>gorge</strong>."},
        {"ic":"🎯","html":"Repérer son corps aide à <strong>nommer</strong> son émotion."}
      ],
      "self":["Je sais qu’une émotion se sent dans le corps","Je peux dire où je sens une émotion"]
    }
  ]
});
</script>
</body>
</html>
