<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Communication — Gérer le trac, oser</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#f3fbfd;color:#1e293b;line-height:1.6;padding-bottom:40px}
.wrap{max-width:640px;margin:0 auto;padding:14px}
.back{display:inline-block;color:#0e7490;text-decoration:none;font-weight:800;font-size:1rem;margin-bottom:10px}
.back:hover{text-decoration:underline}
.prog{position:sticky;top:0;z-index:5;background:#f3fbfd;padding:6px 0 10px}
.prog .label{font-size:.78rem;font-weight:800;color:#155e75;margin-bottom:4px;text-align:center}
.prog .track{height:10px;background:#cffafe;border-radius:20px;overflow:hidden}
.prog .track > i{display:block;height:100%;width:0;background:linear-gradient(90deg,#0891b2,#06b6d4);border-radius:20px;transition:width .4s ease}
.card{background:#fff;border-radius:20px;padding:22px;box-shadow:0 3px 14px rgba(0,0,0,.06);animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.hero{background:linear-gradient(135deg,#0891b2,#06b6d4);color:#fff;border-radius:20px;padding:26px 20px;text-align:center;margin-bottom:6px}
.hero .ic{font-size:3rem;display:block;margin-bottom:6px}
.hero h1{font-size:1.5rem;font-weight:900}
.hero p{opacity:.95;font-size:.96rem;margin-top:6px}
.txt{font-size:1.12rem;font-weight:600;line-height:1.5;margin:6px 0 12px}
.teach{background:#ecfeff;border-left:6px solid #0891b2;border-radius:0 12px 12px 0;padding:12px 14px;font-size:1.04rem;margin-bottom:12px}
.steps3{list-style:none;margin:8px 0}
.steps3 li{background:#ecfeff;border-radius:12px;padding:11px 13px;margin-bottom:8px;font-size:1.03rem;font-weight:600}
.steps3 b{color:#155e75}
.q{font-size:1.12rem;font-weight:800;color:#155e75;margin:6px 0 12px}
.opts{display:flex;flex-direction:column;gap:10px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt{display:block;width:100%;text-align:left;padding:15px 16px;border-radius:14px;border:2px solid #a5f3fc;background:#fff;cursor:pointer;font-family:inherit;font-size:1.05rem;font-weight:700;color:#1e293b;transition:.15s}
.opt.center{text-align:center}
.opt:hover:not(:disabled){border-color:#0891b2;background:#ecfeff}
.opt:disabled{cursor:default}
.opt.ok{border-color:#22c55e;background:#dcfce7;color:#166534}
.opt.no{border-color:#fca5a5;background:#fee2e2;color:#991b1b}
.breathwrap{display:flex;flex-direction:column;align-items:center;gap:16px;margin:26px 0 10px}
.breath{width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#a5f3fc,#0891b2);transition:transform 4s ease-in-out;transform:scale(.7);box-shadow:0 6px 24px rgba(8,145,178,.35)}
.breathlabel{font-size:1.4rem;font-weight:900;color:#155e75;min-height:1.5em}
.fb{margin-top:14px}
.msg{border-radius:14px;padding:13px 15px;font-weight:700;font-size:1rem;animation:fade .3s}
.msg.good{background:#dcfce7;border:2px solid #86efac;color:#166534}
.msg.bad{background:#fff7ed;border:2px solid #fed7aa;color:#9a3412}
.msg.win{background:#ecfeff;border:2px solid #67e8f9;color:#155e75}
.btn{display:block;width:100%;background:linear-gradient(135deg,#0891b2,#06b6d4);color:#fff;border:none;border-radius:14px;padding:15px;font-size:1.1rem;font-weight:800;cursor:pointer;font-family:inherit;margin-top:12px;text-align:center;text-decoration:none}
.btn:active{transform:translateY(1px)}
.btn.soft{background:#cffafe;color:#155e75}
.say{float:right;background:#ecfeff;color:#0e7490;border:none;border-radius:10px;padding:6px 11px;font-size:.95rem;font-weight:800;cursor:pointer}
.recap{list-style:none;margin:10px 0 0}
.recap li{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:10px 13px;margin-bottom:8px;font-size:.98rem}
.badge{text-align:center;font-size:1.1rem;font-weight:900;color:#155e75;margin:10px 0}
@media(max-width:600px){.wrap{padding:10px}.card{padding:16px}.txt{font-size:1.05rem}.hero h1{font-size:1.3rem}}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← Accueil</a>
  <div class="prog"><div class="label" id="proglabel"></div><div class="track"><i id="progbar"></i></div></div>
  <div id="scene"></div>
</div>
<script>
(function(){
  var scene=document.getElementById('scene');
  var idx=0;
  function speak(t){ try{ if(!('speechSynthesis' in window))return; speechSynthesis.cancel(); var u=new SpeechSynthesisUtterance(String(t).replace(/<[^>]+>/g,'')); u.lang='fr-FR'; u.rate=0.95; speechSynthesis.speak(u);}catch(e){} }
  function go(i){ idx=i; try{speechSynthesis.cancel();}catch(e){} render(); }
  function progress(){ document.getElementById('progbar').style.width=Math.round(idx/(STEPS.length-1)*100)+'%'; document.getElementById('proglabel').textContent='Étape '+(idx+1)+' / '+STEPS.length; }
  function continueBtn(label){ var b=document.createElement('button'); b.className='btn'; b.textContent=label||'Continuer →'; b.onclick=function(){ go(idx+1); }; return b; }

  var STEPS=[
    { type:'intro', text:"Avoir le <strong>trac</strong> avant de parler, c’est NORMAL. Le trac n’est pas votre ennemi : bien géré, il devient de l’<strong>énergie</strong>. Apprenons à l’apprivoiser et à oser." },

    { type:'notion',
      teach:"Presque tout le monde a le trac : le cœur bat, le ventre se serre, la voix tremble un peu. C’est le corps qui se <strong>prépare</strong>. Cette énergie, bien gérée, vous rend plus présent.",
      q:"Le trac, c’est…",
      options:[
        {l:"normal, et ça peut se transformer en énergie",ok:true},
        {l:"le signe qu’on n’est pas fait pour parler",ok:false},
        {l:"quelque chose qui ne disparaît jamais",ok:false}
      ],
      wrong:"Pas tout à fait. Le trac ne dit rien de votre valeur, et il diminue dès qu’on l’apprivoise.",
      good:"Exactement. Le trac est normal ; bien utilisé, il devient un moteur." },

    { type:'sort',
      teach:"Certaines habitudes <strong>font baisser</strong> le trac, d’autres l’<strong>augmentent</strong>. Faites le tri.",
      q:"Ça calme le trac, ou ça l’augmente ?",
      a:"🧊 Ça calme", b:"🔥 Ça augmente",
      items:[
        {l:"Bien préparer et répéter à voix haute.",good:true,ex:"Ça calme : on se sent prêt, donc plus serein."},
        {l:"Se répéter « je vais tout rater, je suis nul ».",good:false,ex:"Ça augmente : ces pensées noires nourrissent la peur."},
        {l:"Respirer lentement avant de commencer.",good:true,ex:"Ça calme : la respiration fait redescendre la tension."},
        {l:"Arriver en avance pour repérer le lieu.",good:true,ex:"Ça calme : le connu rassure, l’inconnu inquiète."},
        {l:"Tout improviser sans aucune préparation.",good:false,ex:"Ça augmente : sans filet, le stress grimpe."}
      ] },

    { type:'breath',
      title:"🫁 Respirons pour faire baisser le trac",
      intro:"Suivez le cercle : il grossit quand vous <strong>inspirez</strong>, il rétrécit quand vous <strong>expirez</strong>. Quelques respirations suffisent.",
      audio:"Suivez le cercle. Inspirez quand il grossit, expirez quand il rétrécit. Respirez doucement.",
      done:"Vous sentez ? Le corps s’apaise. À faire juste avant de prendre la parole." },

    { type:'cases',
      teach:"Le trac grandit avec les <strong>pensées noires</strong>. On les remplace par une pensée <strong>juste</strong>.",
      q:"Choisissez la pensée qui aide.",
      items:[
        { text:"Dans votre tête : « Je vais bafouiller, tout le monde va se moquer. »",
          options:[
            {l:"« Je me suis préparé. Si je bute, je respire et je continue. »",good:true,fb:"Oui : une pensée réaliste qui vous garde en mouvement."},
            {l:"« C’est sûr, ce sera une catastrophe. »",good:false,fb:"Une prédiction noire qui ne fait qu’amplifier le trac."},
            {l:"« De toute façon, je suis nul à l’oral. »",good:false,fb:"C’est un jugement, pas un fait — et il vous décourage."}
          ] },
        { text:"Dans votre tête : « Le jury va voir que je stresse. »",
          options:[
            {l:"« Le trac se voit un peu, ce n’est pas grave : je continue. »",good:true,fb:"Oui : un peu de trac est normal et bien accepté par un jury."},
            {l:"« S’ils voient mon stress, je suis fichu. »",good:false,fb:"Faux : le trac ne disqualifie personne."},
            {l:"« Je ferais mieux de renoncer. »",good:false,fb:"Renoncer vous prive de progresser."}
          ] }
      ] },

    { type:'cases',
      teach:"<strong>Oser</strong>, c’est se lancer même quand on n’est pas parfait. C’est ainsi qu’on progresse.",
      q:"Que faites-vous ?",
      items:[
        { text:"En classe, vous avez une bonne réponse mais vous n’osez pas lever la main.",
          options:[
            {l:"Je me lance, même si la voix tremble un peu",good:true,fb:"Oui : à force d’oser, parler devient de plus en plus facile."},
            {l:"Je me tais pour ne pas avoir l’air bête",good:false,fb:"Se taire par peur, c’est se priver de progresser."},
            {l:"J’attends que quelqu’un d’autre la donne",good:false,fb:"Attendre les autres ne vous fait pas avancer."}
          ] }
      ] },

    { type:'method', title:"🧰 Mon kit anti-trac",
      intro:"À faire avant un oral pour aborder le moment plus sereinement :",
      steps:[
        "<b>Avant</b> — je prépare et je répète à voix haute (devant un miroir, un proche).",
        "<b>Sur place</b> — j’arrive en avance, je repère le lieu, je bois une gorgée d’eau.",
        "<b>Juste avant</b> — je respire lentement et je me dis une pensée juste.",
        "<b>Pendant</b> — je regarde un visage bienveillant ; si je bute, je fais une pause et je reprends."
      ],
      cta:"J’ai mon kit →" },

    { type:'perso',
      text:"À vous. Avant votre <strong>prochain oral</strong>, quels <strong>deux gestes</strong> ferez-vous pour faire baisser le trac ?",
      note:"Répondez dans votre tête, à l’oral (🔊) ou en une phrase. Il n’y a pas de mauvaise réponse." },

    { type:'bilan',
      recap:[
        "😮‍💨 Le <strong>trac est normal</strong> et même utile : c’est de l’énergie.",
        "🧰 Je le fais baisser : <strong>préparer, répéter, respirer, arriver en avance</strong>.",
        "💭 Je remplace « je vais rater » par une <strong>pensée juste</strong>.",
        "🙋 J’<strong>ose</strong> me lancer — c’est en osant qu’on progresse."
      ] }
  ];

  function render(){
    var s=STEPS[idx]; progress(); window.scrollTo({top:0,behavior:'smooth'});

    if(s.type==='intro'){
      scene.innerHTML='<div class="hero"><span class="ic">😮‍💨</span><h1>Gérer le trac, oser</h1><p>Apprendre à communiquer · confiance</p></div><div class="card"><p class="txt">'+s.text+'</p></div>';
      var b=document.createElement('button'); b.className='btn'; b.textContent='▶️ Commencer'; b.onclick=function(){ go(idx+1); }; scene.querySelector('.card').appendChild(b); return;
    }

    if(s.type==='notion'){
      scene.innerHTML='<div class="card"><button class="say">🔊 Écouter</button><div class="teach">'+s.teach+'</div><div class="q">'+s.q+'</div><div class="opts"></div><div class="fb"></div></div>';
      scene.querySelector('.say').onclick=function(){ speak(s.teach+' '+s.q); };
      var opts=scene.querySelector('.opts'), fb=scene.querySelector('.fb'), done=false;
      s.options.forEach(function(o){
        var b=document.createElement('button'); b.className='opt'; b.textContent=o.l;
        b.onclick=function(){
          if(done)return;
          if(o.ok){ done=true; opts.querySelectorAll('.opt').forEach(function(x){x.disabled=true;}); b.classList.add('ok'); fb.innerHTML='<div class="msg good">✓ '+s.good+'</div>'; fb.appendChild(continueBtn()); }
          else { b.classList.add('no'); b.disabled=true; fb.innerHTML='<div class="msg bad">💡 '+s.wrong+' <strong>Réessayez.</strong></div>'; }
        };
        opts.appendChild(b);
      });
      return;
    }

    if(s.type==='sort'){
      var j=0;
      scene.innerHTML='<div class="card"><button class="say">🔊 Écouter</button><div class="teach">'+s.teach+'</div><div class="q">'+s.q+'</div><div id="so"></div></div>';
      scene.querySelector('.say').onclick=function(){ speak(s.teach); };
      var area=scene.querySelector('#so');
      function drawItem(){
        var it=s.items[j];
        area.innerHTML='<p class="txt">'+it.l+'</p><div class="two"><button class="opt center" data-v="1">'+s.a+'</button><button class="opt center" data-v="0">'+s.b+'</button></div><div class="fb"></div>';
        var fb=area.querySelector('.fb'), answered=false;
        area.querySelectorAll('.opt').forEach(function(b){
          b.onclick=function(){
            if(answered)return; answered=true;
            var ok=((b.getAttribute('data-v')==='1')===it.good);
            area.querySelectorAll('.opt').forEach(function(x){x.disabled=true;});
            b.classList.add(ok?'ok':'no');
            fb.innerHTML='<div class="msg '+(ok?'good':'bad')+'">'+(ok?'✓ ':'💡 ')+it.ex+'</div>';
            var nb=document.createElement('button'); nb.className='btn'; nb.textContent=(j>=s.items.length-1)?'Continuer →':'Suivant →';
            nb.onclick=function(){ if(j>=s.items.length-1){ go(idx+1); } else { j++; drawItem(); } };
            fb.appendChild(nb);
          };
        });
      }
      drawItem();
      return;
    }

    if(s.type==='breath'){
      scene.innerHTML='<div class="card"><button class="say">🔊 Écouter</button><div class="q">'+s.title+'</div><p class="txt" style="font-weight:600;font-size:1rem">'+s.intro+'</p><div class="breathwrap"><div class="breathlabel">Prêt…</div><div class="breath"></div></div><div class="fb"></div></div>';
      scene.querySelector('.say').onclick=function(){ speak(s.audio); };
      var circle=scene.querySelector('.breath'), label=scene.querySelector('.breathlabel'), fb=scene.querySelector('.fb');
      var phase=0;
      function stepB(){
        if(!document.body.contains(circle))return;
        if(phase%2===0){ label.textContent='Inspirez…'; circle.style.transform='scale(1.45)'; }
        else { label.textContent='Expirez…'; circle.style.transform='scale(0.7)'; }
        phase++; setTimeout(stepB,4200);
      }
      setTimeout(stepB,500);
      fb.innerHTML='<div class="msg win">'+s.done+'</div>'; fb.appendChild(continueBtn("J’ai respiré →"));
      return;
    }

    if(s.type==='cases'){
      var j=0;
      scene.innerHTML='<div class="card"><button class="say">🔊 Écouter</button><div class="teach">'+s.teach+'</div><div class="q">'+s.q+'</div><div id="cc"></div></div>';
      scene.querySelector('.say').onclick=function(){ speak(s.teach); };
      var area=scene.querySelector('#cc');
      function drawCase(){
        var it=s.items[j];
        area.innerHTML='<p class="txt">'+it.text+'</p><div class="opts"></div><div class="fb"></div>';
        var opts=area.querySelector('.opts'), fb=area.querySelector('.fb'), done=false;
        it.options.forEach(function(o){
          var b=document.createElement('button'); b.className='opt'; b.textContent=o.l;
          b.onclick=function(){
            if(done)return;
            if(o.good){ done=true; opts.querySelectorAll('.opt').forEach(function(x){x.disabled=true;}); b.classList.add('ok'); fb.innerHTML='<div class="msg good">✓ '+o.fb+'</div>'; var nb=document.createElement('button'); nb.className='btn'; nb.textContent=(j>=s.items.length-1)?'Continuer →':'Suivant →'; nb.onclick=function(){ if(j>=s.items.length-1){ go(idx+1);} else {j++; drawCase();} }; fb.appendChild(nb); }
            else { b.classList.add('no'); b.disabled=true; fb.innerHTML='<div class="msg bad">💡 '+o.fb+' <strong>Réessayez.</strong></div>'; }
          };
          opts.appendChild(b);
        });
      }
      drawCase();
      return;
    }

    if(s.type==='method'){
      var h='<div class="card"><button class="say">🔊 Écouter</button><div class="q">'+s.title+'</div><p class="txt" style="font-weight:600;font-size:1rem">'+s.intro+'</p><ul class="steps3">';
      s.steps.forEach(function(x){ h+='<li>'+x+'</li>'; });
      h+='</ul></div>';
      scene.innerHTML=h;
      scene.querySelector('.say').onclick=function(){ speak(s.intro+' '+s.steps.join('. ')); };
      var b=document.createElement('button'); b.className='btn'; b.textContent=s.cta; b.onclick=function(){ go(idx+1); }; scene.querySelector('.card').appendChild(b);
      return;
    }

    if(s.type==='perso'){
      scene.innerHTML='<div class="card"><button class="say">🔊 Écouter</button><p class="txt">'+s.text+'</p><div class="msg" style="background:#ecfeff;border:2px solid #a5f3fc;color:#155e75">'+s.note+'</div></div>';
      scene.querySelector('.say').onclick=function(){ speak(s.text); };
      var b=document.createElement('button'); b.className='btn'; b.textContent="J’y ai réfléchi →"; b.onclick=function(){ go(idx+1); }; scene.querySelector('.card').appendChild(b); return;
    }

    if(s.type==='bilan'){
      var h='<div class="hero"><span class="ic">💪</span><h1>Bravo !</h1><p>Vous savez apprivoiser le trac.</p></div><div class="card"><div class="badge">😮‍💨 Trac maîtrisé</div><p class="txt" style="font-size:1rem;font-weight:800;color:#155e75">Ce que vous avez appris :</p><ul class="recap">';
      s.recap.forEach(function(r){ h+='<li>'+r+'</li>'; });
      h+='</ul></div>';
      scene.innerHTML=h;
      var c=scene.querySelector('.card');
      var rb=document.createElement('button'); rb.className='btn'; rb.textContent='🔄 Recommencer'; rb.onclick=function(){ go(0); }; c.appendChild(rb);
      var hb=document.createElement('a'); hb.className='btn soft'; hb.href='index.html'; hb.textContent='← Retour à l’accueil'; c.appendChild(hb);
      return;
    }
  }
  render();
})();
</script>
</body>
</html>
