<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<title>Escape — Le coffre des émotions</title>

</head>
<body>
<div id="cps-app"></div>
<script src="assets/cps_kit.js?v=20260618-bd"></script>
<script>CPS.escape({
  "theme": "emo",
  "icon": "🧰",
  "title": "Le coffre des émotions",
  "subtitle": "4 épreuves, 4 chiffres, et le coffre s’ouvre.",
  "intro": "Devant toi, un coffre fermé par un cadenas à 4 chiffres. Pour l’ouvrir, réussis les 4 épreuves sur les émotions. Chaque épreuve réussie te donne un chiffre. À toi de jouer !",
  "audio": "Devant toi, un coffre fermé par un cadenas à 4 chiffres. Pour l’ouvrir, réussis les 4 épreuves sur les émotions. Chaque épreuve réussie te donne un chiffre.",
  "keep": [
    {"ic":"📩","html":"Une émotion est un <strong>message</strong> de ton corps."},
    {"ic":"🚦","html":"Besoin rempli = émotion <strong>agréable</strong> ; pas rempli = <strong>désagréable</strong>."},
    {"ic":"🔑","html":"<strong>Nommer</strong> son émotion aide déjà à se sentir mieux."}
  ],
  "salles": [
    {
      "titre": "Épreuve 1 — Agréable ou désagréable ?",
      "intro": "Range chaque situation dans la bonne case. Réussis pour ouvrir le 1er cadenas.",
      "audio": "Range chaque situation dans la bonne case.",
      "digit": 4,
      "module": {
        "type": "cardpick", "variant": "sort",
        "instr": "Cette situation : émotion agréable ou désagréable ?",
        "items": [
          {"em":"🏆","text":"Tu réussis ton geste en atelier du premier coup.","opts":[{"l":"🙂 Agréable","ok":true},{"l":"😣 Désagréable","ok":false}],"ex":"Ton besoin de réussite est rempli : c’est agréable."},
          {"em":"📱","text":"Tu reçois un message méchant sur les réseaux.","opts":[{"l":"🙂 Agréable","ok":false},{"l":"😣 Désagréable","ok":true}],"ex":"Ton besoin de respect n’est pas rempli : c’est désagréable."},
          {"em":"🤝","text":"Ton maître de stage te félicite devant l’équipe.","opts":[{"l":"🙂 Agréable","ok":true},{"l":"😣 Désagréable","ok":false}],"ex":"Ton besoin d’être reconnu est rempli : c’est agréable."},
          {"em":"🚌","text":"Tu rates ton bus et tu vas être en retard.","opts":[{"l":"🙂 Agréable","ok":false},{"l":"😣 Désagréable","ok":true}],"ex":"Ton besoin de sécurité n’est pas rempli : c’est désagréable."}
        ]
      }
    },
    {
      "titre": "Épreuve 2 — Relie l’émotion à son message",
      "intro": "Chaque émotion t’envoie un message. Relie-les pour ouvrir le 2e cadenas.",
      "audio": "Chaque émotion t’envoie un message. Relie chaque émotion à ce qu’elle te dit.",
      "digit": 2,
      "module": {
        "type": "match", "title": "🔗 Relie",
        "instr": "Relie chaque émotion à son message.",
        "audio": "Relie chaque émotion à son message.",
        "pairs": [
          {"l":"😀 Joie","r":"Mon besoin est rempli."},
          {"l":"😨 Peur","r":"Il y a un danger : prépare-toi."},
          {"l":"😡 Colère","r":"Une limite a été franchie."},
          {"l":"😢 Tristesse","r":"J’ai perdu quelque chose."}
        ]
      }
    },
    {
      "titre": "Épreuve 3 — Quelle émotion ?",
      "intro": "Lis chaque situation et trouve la bonne émotion. Réussis pour ouvrir le 3e cadenas.",
      "audio": "Lis chaque situation et trouve la bonne émotion.",
      "digit": 7,
      "module": {
        "type": "cardpick", "variant": "quiz",
        "instr": "Quelle émotion ressent ce jeune ?",
        "items": [
          {"em":"⚖️","text":"On accuse Léa d’une bêtise qu’elle n’a pas faite.","opts":[{"l":"😀 Joie","ok":false},{"l":"😨 Peur","ok":false},{"l":"😡 Colère","ok":true},{"l":"😢 Tristesse","ok":false}],"ex":"L’injustice fait monter la colère."},
          {"em":"🎤","text":"Noah doit passer à l’oral, ses mains tremblent.","opts":[{"l":"😀 Joie","ok":false},{"l":"😨 Peur","ok":true},{"l":"😡 Colère","ok":false},{"l":"😢 Tristesse","ok":false}],"ex":"C’est la peur (le trac) : elle prépare à affronter."},
          {"em":"🎉","text":"Yasmine apprend qu’elle a réussi son examen.","opts":[{"l":"😀 Joie","ok":true},{"l":"😨 Peur","ok":false},{"l":"😡 Colère","ok":false},{"l":"😢 Tristesse","ok":false}],"ex":"Son besoin de réussir est rempli : c’est la joie."}
        ]
      }
    },
    {
      "titre": "Épreuve 4 — Le bon réflexe",
      "intro": "Dernière épreuve : choisis le bon réflexe. Réussis pour ouvrir le 4e cadenas.",
      "audio": "Choisis le bon réflexe dans chaque situation.",
      "digit": 1,
      "module": {
        "type": "scenario",
        "scenes": [
          {"em":"😰","text":"Tu stresses juste avant ton évaluation.","audio":"Tu stresses juste avant ton évaluation. Que fais-tu ?","choices":[
            {"l":"Je respire lentement 3 fois et je me lance.","good":true,"fb":"Bravo ! Respirer calme le corps et aide à se concentrer."},
            {"l":"Je me dis « je vais tout rater ».","good":false,"fb":"Cette pensée fait monter le stress. Respire d’abord, puis lance-toi."}
          ]},
          {"em":"😡","text":"Un camarade se moque de toi. Tu bouilles.","audio":"Un camarade se moque de toi. Tu bouilles. Que fais-tu ?","choices":[
            {"l":"Je m’éloigne un instant pour me calmer.","good":true,"fb":"Bien vu ! Prendre du recul évite de réagir sur un coup de colère."},
            {"l":"Je le pousse et je crie.","good":false,"fb":"La colère retombe sur toi (punition…). Mieux vaut s’éloigner et se calmer."}
          ]}
        ]
      }
    }
  ]
});</script>

</html>
