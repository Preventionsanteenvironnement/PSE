<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPS C1.1 — Vu de dehors, vécu de dedans</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#f4f7fc;color:#1e293b;line-height:1.6;padding-bottom:40px}
.wrap{max-width:640px;margin:0 auto;padding:14px}
.back{display:inline-block;color:#1d4ed8;text-decoration:none;font-weight:800;font-size:1rem;margin-bottom:10px}
.back:hover{text-decoration:underline}
.prog{position:sticky;top:0;z-index:5;background:#f4f7fc;padding:6px 0 10px}
.prog .label{font-size:.78rem;font-weight:800;color:#1e40af;margin-bottom:4px;text-align:center}
.prog .track{height:10px;background:#dbeafe;border-radius:20px;overflow:hidden}
.prog .track > i{display:block;height:100%;width:0;background:linear-gradient(90deg,#1d4ed8,#3b82f6);border-radius:20px;transition:width .4s ease}
.card{background:#fff;border-radius:20px;padding:22px;box-shadow:0 3px 14px rgba(0,0,0,.06);animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.hero{background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff;border-radius:20px;padding:26px 20px;text-align:center;margin-bottom:6px}
.hero .ic{font-size:3rem;display:block;margin-bottom:6px}
.hero h1{font-size:1.5rem;font-weight:900}
.hero p{opacity:.95;font-size:.96rem;margin-top:6px}
.txt{font-size:1.12rem;font-weight:600;line-height:1.5;margin:6px 0 12px}
.teach{background:#eff6ff;border-left:6px solid #1d4ed8;border-radius:0 12px 12px 0;padding:12px 14px;font-size:1.04rem;margin-bottom:12px}
.q{font-size:1.12rem;font-weight:800;color:#1e40af;margin:6px 0 12px}
.opts{display:flex;flex-direction:column;gap:10px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt{display:block;width:100%;text-align:left;padding:15px 16px;border-radius:14px;border:2px solid #bfdbfe;background:#fff;cursor:pointer;font-family:inherit;font-size:1.05rem;font-weight:700;color:#1e293b;transition:.15s}
.opt.center{text-align:center}
.opt:hover:not(:disabled){border-color:#1d4ed8;background:#eff6ff}
.opt:disabled{cursor:default}
.opt.ok{border-color:#22c55e;background:#dcfce7;color:#166534}
.opt.no{border-color:#fca5a5;background:#fee2e2;color:#991b1b}
.reveal{border:2px solid #bfdbfe;border-radius:14px;padding:14px;margin-bottom:10px;background:#fff}
.reveal .name{font-weight:900;color:#1e40af;margin-bottom:4px}
.reveal .out{font-size:1rem}
.reveal .in{margin-top:10px;background:#eff6ff;border-radius:10px;padding:10px 12px;font-size:1rem;display:none}
.reveal .in.show{display:block;animation:fade .3s}
.reveal .rev{margin-top:10px;background:#1d4ed8;color:#fff;border:none;border-radius:10px;padding:9px 14px;font-weight:800;cursor:pointer;font-family:inherit}
.fb{margin-top:14px}
.msg{border-radius:14px;padding:13px 15px;font-weight:700;font-size:1rem;animation:fade .3s}
.msg.good{background:#dcfce7;border:2px solid #86efac;color:#166534}
.msg.bad{background:#fff7ed;border:2px solid #fed7aa;color:#9a3412}
.msg.win{background:#dbeafe;border:2px solid #93c5fd;color:#1e40af;font-size:1.05rem}
.btn{display:block;width:100%;background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff;border:none;border-radius:14px;padding:15px;font-size:1.1rem;font-weight:800;cursor:pointer;font-family:inherit;margin-top:12px;text-align:center;text-decoration:none}
.btn:active{transform:translateY(1px)}
.btn.soft{background:#e0e7ff;color:#3730a3}
.say{float:right;background:#eff6ff;color:#1d4ed8;border:none;border-radius:10px;padding:6px 11px;font-size:.95rem;font-weight:800;cursor:pointer}
.recap{list-style:none;margin:10px 0 0}
.recap li{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:10px 13px;margin-bottom:8px;font-size:.98rem}
.badge{text-align:center;font-size:1.1rem;font-weight:900;color:#1e40af;margin:10px 0}
@media(max-width:600px){.wrap{padding:10px}.card{padding:16px}.txt{font-size:1.05rem}.hero h1{font-size:1.3rem}}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← Accueil</a>
  <div class="prog"><div class="label" id="proglabel"></div><div class="track"><i id="progbar"></i></div></div>
  <div id="scene"></div>
</div>
<script>
(function(){
  var scene=document.getElementById('scene');
  var idx=0;
  function speak(t){ try{ if(!('speechSynthesis' in window))return; speechSynthesis.cancel(); var u=new SpeechSynthesisUtterance(String(t).replace(/<[^>]+>/g,'')); u.lang='fr-FR'; u.rate=0.95; speechSynthesis.speak(u);}catch(e){} }
  function go(i){ idx=i; try{speechSynthesis.cancel();}catch(e){} render(); }
  function progress(){
    document.getElementById('progbar').style.width=Math.round(idx/(STEPS.length-1)*100)+'%';
    document.getElementById('proglabel').textContent='Étape '+(idx+1)+' / '+STEPS.length;
  }
  function continueBtn(label){ var b=document.createElement('button'); b.className='btn'; b.textContent=label||'Continuer →'; b.onclick=function(){ go(idx+1); }; return b; }

  var STEPS=[
    { type:'intro',
      text:"On croit souvent connaître quelqu’un rien qu’en le regardant. Pourtant, chacun a des côtés qu’on ne voit pas. Et vous, savez-vous vraiment qui vous êtes ? Découvrons-le ensemble." },

    { type:'reveal', title:"👀 Vu de dehors, vécu de dedans",
      intro:"Voici trois élèves. Vous voyez d’abord ce que les autres remarquent. Cliquez pour découvrir ce qu’ils vivent <strong>en dedans</strong>.",
      cards:[
        {name:"Léo", out:"En classe, Léo fait le clown et rit très fort.", in:"En dedans, il a peur de son oral de demain."},
        {name:"Inès", out:"Inès reste silencieuse, elle ne dit presque rien.", in:"En dedans, elle a plein d’idées, mais elle n’ose pas les dire."},
        {name:"Tom", out:"Tom répond sèchement, il a l’air en colère.", in:"En dedans, il est triste : son chien est malade."}
      ] },

    { type:'notion',
      teach:"Vous l’avez vu : ce qu’une personne <strong>montre</strong> n’est pas toujours ce qu’elle <strong>ressent</strong>. On ne voit jamais tout d’une personne.",
      q:"Ce qu’on voit d’une personne, c’est…",
      options:[
        {l:"tout ce qu’elle est",ok:false},
        {l:"seulement une partie de ce qu’elle vit",ok:true},
        {l:"forcément la vérité",ok:false}
      ],
      wrong:"Pas tout à fait. On ne voit que l’extérieur. Ce qu’une personne ressent en dedans reste caché.",
      good:"Exactement. On ne voit qu’une partie : le reste se passe à l’intérieur." },

    { type:'faitavis',
      teach:"Sur vous-même, il y a des <strong>faits</strong> et des <strong>avis</strong>. Un <strong>fait</strong>, on peut le vérifier (« j’ai 16 ans »). Un <strong>avis</strong>, c’est un jugement sur soi (« je suis nul ») : ce n’est pas la vérité, et il peut changer.",
      q:"Pour chaque phrase : un fait, ou un avis ?",
      items:[
        {l:"« J’ai les cheveux bruns. »",fait:true,ex:"On peut le voir : c’est un fait."},
        {l:"« Je suis nul en tout. »",fait:false,ex:"C’est un jugement très dur sur soi : un avis, pas un fait. Et il peut changer."},
        {l:"« J’ai raté mon contrôle de maths. »",fait:true,ex:"C’est un événement précis et vérifiable : un fait."},
        {l:"« Personne ne m’aime. »",fait:false,ex:"C’est une pensée, pas une vérité — et souvent fausse, en plus."}
      ] },

    { type:'transform',
      teach:"Quand on se dit un avis dur, on peut le formuler <strong>plus justement</strong> : décrire la situation, sans s’insulter ni se comparer.",
      items:[
        { bad:"« Je suis nul en atelier. »",
          options:[
            {l:"« Je n’ai pas encore réussi cette pièce. Je vais m’entraîner. »",good:true,fb:"Voilà une pensée juste : elle décrit la situation et ouvre une suite."},
            {l:"« Je suis vraiment trop bête. »",good:false,fb:"C’est encore une insulte envers soi. On peut faire plus juste."},
            {l:"« De toute façon, les autres sont meilleurs. »",good:false,fb:"Se comparer n’aide pas. Parlez plutôt de vous et de vos progrès."}
          ] },
        { bad:"« Tout le monde me déteste. »",
          options:[
            {l:"« Aujourd’hui, je me suis disputé avec un ami. Je peux lui reparler. »",good:true,fb:"Juste : un fait précis, et une action possible."},
            {l:"« Je finirai toujours seul. »",good:false,fb:"C’est un avis très dur sur l’avenir, pas une vérité."},
            {l:"« Les gens sont tous méchants. »",good:false,fb:"Une généralisation : ce n’est pas un fait."}
          ] }
      ] },

    { type:'choice',
      text:"Vous ratez un exercice devant la classe. Une petite voix vous dit « je suis nul ». Que choisissez-vous de vous dire ?",
      options:[
        {l:"« Ce n’est pas grave, je recommence calmement. »",good:true,fb:"Vous vous parlez avec respect : vous restez motivé pour réessayer."},
        {l:"« Je suis vraiment nul, j’arrête. »",good:false,fb:"Cette pensée vous décourage — et ce n’est qu’un avis, pas la vérité."},
        {l:"« C’est la faute du professeur. »",good:false,fb:"Accuser les autres n’aide pas à progresser."}
      ] },

    { type:'perso',
      text:"À vous. Pensez à <strong>une qualité</strong> que les autres ne voient pas toujours chez vous. Puis à <strong>un avis dur</strong> que vous vous dites parfois : comment pourriez-vous le dire plus justement ?",
      note:"Répondez dans votre tête, à l’oral (🔊) ou en une phrase. Il n’y a pas de mauvaise réponse." },

    { type:'bilan',
      recap:[
        "👀 Ce qu’on voit d’une personne n’est qu’une <strong>partie</strong> d’elle.",
        "💭 Ce que vous pensez de vous est un <strong>avis</strong>, pas un fait — et un avis peut <strong>changer</strong>.",
        "🌱 Vous pouvez <strong>choisir</strong> de vous parler avec respect."
      ] }
  ];

  function render(){
    var s=STEPS[idx]; progress();
    window.scrollTo({top:0,behavior:'smooth'});

    if(s.type==='intro'){
      scene.innerHTML='<div class="hero"><span class="ic">🪞</span><h1>Vu de dehors, vécu de dedans</h1><p>Compétence C1.1 · Santé publique France 2025</p></div><div class="card"><p class="txt">'+s.text+'</p></div>';
      var b=document.createElement('button'); b.className='btn'; b.textContent='▶️ Commencer'; b.onclick=function(){ go(idx+1); };
      scene.querySelector('.card').appendChild(b); return;
    }

    if(s.type==='reveal'){
      var h='<div class="card"><button class="say">🔊 Écouter</button><div class="q">'+s.title+'</div><p class="txt" style="font-weight:600;font-size:1rem">'+s.intro+'</p><div id="cards"></div></div>';
      scene.innerHTML=h;
      scene.querySelector('.say').onclick=function(){ speak(s.intro); };
      var cwrap=scene.querySelector('#cards');
      s.cards.forEach(function(c){
        var d=document.createElement('div'); d.className='reveal';
        d.innerHTML='<div class="name">'+c.name+'</div><div class="out">👀 '+c.out+'</div><button class="rev">🔓 Regarder en dedans</button><div class="in">💙 '+c.in+'</div>';
        d.querySelector('.rev').onclick=function(){ d.querySelector('.in').classList.add('show'); this.style.display='none'; };
        cwrap.appendChild(d);
      });
      scene.querySelector('.card').appendChild(continueBtn());
      return;
    }

    if(s.type==='notion'){
      scene.innerHTML='<div class="card"><button class="say">🔊 Écouter</button><div class="teach">'+s.teach+'</div><div class="q">'+s.q+'</div><div class="opts"></div><div class="fb"></div></div>';
      scene.querySelector('.say').onclick=function(){ speak(s.teach+' '+s.q); };
      var opts=scene.querySelector('.opts'), fb=scene.querySelector('.fb'), done=false;
      s.options.forEach(function(o){
        var b=document.createElement('button'); b.className='opt'; b.textContent=o.l;
        b.onclick=function(){
          if(done)return;
          if(o.ok){ done=true; opts.querySelectorAll('.opt').forEach(function(x){x.disabled=true;}); b.classList.add('ok'); fb.innerHTML='<div class="msg good">✓ '+s.good+'</div>'; fb.appendChild(continueBtn()); }
          else { b.classList.add('no'); b.disabled=true; fb.innerHTML='<div class="msg bad">💡 '+s.wrong+' <strong>Réessayez.</strong></div>'; }
        };
        opts.appendChild(b);
      });
      return;
    }

    if(s.type==='faitavis'){
      var i2=0;
      scene.innerHTML='<div class="card"><button class="say">🔊 Écouter</button><div class="teach">'+s.teach+'</div><div class="q">'+s.q+'</div><div id="fa"></div></div>';
      scene.querySelector('.say').onclick=function(){ speak(s.teach); };
      var area=scene.querySelector('#fa');
      function drawItem(){
        var it=s.items[i2];
        area.innerHTML='<p class="txt" style="text-align:center">'+it.l+'</p><div class="two"><button class="opt center" data-v="1">📏 Un fait</button><button class="opt center" data-v="0">💭 Un avis</button></div><div class="fb"></div>';
        var fb=area.querySelector('.fb'), answered=false;
        area.querySelectorAll('.opt').forEach(function(b){
          b.onclick=function(){
            if(answered)return; answered=true;
            var said=b.getAttribute('data-v')==='1';
            var ok=(said===it.fait);
            area.querySelectorAll('.opt').forEach(function(x){x.disabled=true;});
            b.classList.add(ok?'ok':'no');
            fb.innerHTML='<div class="msg '+(ok?'good':'bad')+'">'+(ok?'✓ ':'💡 ')+it.ex+'</div>';
            var nb=document.createElement('button'); nb.className='btn'; nb.textContent=(i2>=s.items.length-1)?'Continuer →':'Phrase suivante →';
            nb.onclick=function(){ if(i2>=s.items.length-1){ go(idx+1); } else { i2++; drawItem(); } };
            fb.appendChild(nb);
          };
        });
      }
      drawItem();
      return;
    }

    if(s.type==='transform'){
      var j=0;
      scene.innerHTML='<div class="card"><button class="say">🔊 Écouter</button><div class="teach">'+s.teach+'</div><div id="tr"></div></div>';
      scene.querySelector('.say').onclick=function(){ speak(s.teach); };
      var area=scene.querySelector('#tr');
      function drawT(){
        var it=s.items[j];
        var h='<div class="q">Dites-le plus justement :</div><p class="txt" style="text-align:center;color:#991b1b">'+it.bad+'</p><div class="opts"></div><div class="fb"></div>';
        area.innerHTML=h;
        var opts=area.querySelector('.opts'), fb=area.querySelector('.fb'), done=false;
        it.options.forEach(function(o){
          var b=document.createElement('button'); b.className='opt'; b.textContent=o.l;
          b.onclick=function(){
            if(done)return;
            if(o.good){ done=true; opts.querySelectorAll('.opt').forEach(function(x){x.disabled=true;}); b.classList.add('ok'); fb.innerHTML='<div class="msg good">✓ '+o.fb+'</div>'; var nb=document.createElement('button'); nb.className='btn'; nb.textContent=(j>=s.items.length-1)?'Continuer →':'Phrase suivante →'; nb.onclick=function(){ if(j>=s.items.length-1){ go(idx+1);} else {j++; drawT();} }; fb.appendChild(nb); }
            else { b.classList.add('no'); b.disabled=true; fb.innerHTML='<div class="msg bad">💡 '+o.fb+' <strong>Réessayez.</strong></div>'; }
          };
          opts.appendChild(b);
        });
      }
      drawT();
      return;
    }

    if(s.type==='choice'){
      scene.innerHTML='<div class="card"><button class="say">🔊 Écouter</button><p class="txt">'+s.text+'</p><div class="opts"></div><div class="fb"></div></div>';
      scene.querySelector('.say').onclick=function(){ speak(s.text); };
      var opts=scene.querySelector('.opts'), fb=scene.querySelector('.fb'), picked=false;
      s.options.forEach(function(o){
        var b=document.createElement('button'); b.className='opt'; b.textContent=o.l;
        b.onclick=function(){
          if(picked)return; picked=true;
          opts.querySelectorAll('.opt').forEach(function(x){x.disabled=true;});
          b.classList.add(o.good?'ok':'no');
          fb.innerHTML='<div class="msg '+(o.good?'good':'bad')+'">'+(o.good?'✓ ':'💡 ')+o.fb+'</div>';
          fb.appendChild(continueBtn());
        };
        opts.appendChild(b);
      });
      return;
    }

    if(s.type==='perso'){
      scene.innerHTML='<div class="card"><button class="say">🔊 Écouter</button><p class="txt">'+s.text+'</p><div class="msg" style="background:#eff6ff;border:2px solid #bfdbfe;color:#1e40af">'+s.note+'</div></div>';
      scene.querySelector('.say').onclick=function(){ speak(s.text); };
      var b=document.createElement('button'); b.className='btn'; b.textContent="J’y ai réfléchi →"; b.onclick=function(){ go(idx+1); };
      scene.querySelector('.card').appendChild(b);
      return;
    }

    if(s.type==='bilan'){
      var h='<div class="hero"><span class="ic">🏁</span><h1>Bravo !</h1><p>Vous avez exploré qui vous êtes vraiment.</p></div><div class="card"><div class="badge">🪞 Vous vous connaissez un peu mieux</div><p class="txt" style="font-size:1rem;font-weight:800;color:#1e40af">Ce que vous avez appris :</p><ul class="recap">';
      s.recap.forEach(function(r){ h+='<li>'+r+'</li>'; });
      h+='</ul></div>';
      scene.innerHTML=h;
      var c=scene.querySelector('.card');
      var rb=document.createElement('button'); rb.className='btn'; rb.textContent='🔄 Recommencer'; rb.onclick=function(){ go(0); }; c.appendChild(rb);
      var hb=document.createElement('a'); hb.className='btn soft'; hb.href='index.html'; hb.textContent='← Retour à l’accueil'; c.appendChild(hb);
      return;
    }
  }
  render();
})();
</script>
</body>
</html>
