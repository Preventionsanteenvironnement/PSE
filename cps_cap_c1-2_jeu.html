<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPS C1.2 — Vrai, ou juste une rumeur ?</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#f4f7fc;color:#1e293b;line-height:1.6;padding-bottom:40px}
.wrap{max-width:640px;margin:0 auto;padding:14px}
.back{display:inline-block;color:#1d4ed8;text-decoration:none;font-weight:800;font-size:1rem;margin-bottom:10px}
.back:hover{text-decoration:underline}
.prog{position:sticky;top:0;z-index:5;background:#f4f7fc;padding:6px 0 10px}
.prog .label{font-size:.78rem;font-weight:800;color:#1e40af;margin-bottom:4px;text-align:center}
.prog .track{height:10px;background:#dbeafe;border-radius:20px;overflow:hidden}
.prog .track > i{display:block;height:100%;width:0;background:linear-gradient(90deg,#1d4ed8,#3b82f6);border-radius:20px;transition:width .4s ease}
.card{background:#fff;border-radius:20px;padding:22px;box-shadow:0 3px 14px rgba(0,0,0,.06);animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.hero{background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff;border-radius:20px;padding:26px 20px;text-align:center;margin-bottom:6px}
.hero .ic{font-size:3rem;display:block;margin-bottom:6px}
.hero h1{font-size:1.5rem;font-weight:900}
.hero p{opacity:.95;font-size:.96rem;margin-top:6px}
.txt{font-size:1.12rem;font-weight:600;line-height:1.5;margin:6px 0 12px}
.teach{background:#eff6ff;border-left:6px solid #1d4ed8;border-radius:0 12px 12px 0;padding:12px 14px;font-size:1.04rem;margin-bottom:12px}
.q{font-size:1.12rem;font-weight:800;color:#1e40af;margin:6px 0 12px}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{display:block;width:100%;text-align:left;padding:15px 16px;border-radius:14px;border:2px solid #bfdbfe;background:#fff;cursor:pointer;font-family:inherit;font-size:1.05rem;font-weight:700;color:#1e293b;transition:.15s}
.opt:hover:not(:disabled){border-color:#1d4ed8;background:#eff6ff}
.opt:disabled{cursor:default}
.opt.ok{border-color:#22c55e;background:#dcfce7;color:#166534}
.opt.no{border-color:#fca5a5;background:#fee2e2;color:#991b1b}
.link{border:2px solid #bfdbfe;border-radius:12px;padding:11px 13px;margin-bottom:9px;background:#fff;animation:fade .3s}
.link .ct{font-size:.74rem;font-weight:800;color:#1e40af;text-transform:uppercase;letter-spacing:.4px}
.link .cm{font-size:1.05rem;margin-top:3px}
.link.start{border-color:#86efac;background:#f0fdf4}
.link.end{border-color:#fca5a5;background:#fff7ed}
.fb{margin-top:14px}
.msg{border-radius:14px;padding:13px 15px;font-weight:700;font-size:1rem;animation:fade .3s}
.msg.good{background:#dcfce7;border:2px solid #86efac;color:#166534}
.msg.bad{background:#fff7ed;border:2px solid #fed7aa;color:#9a3412}
.btn{display:block;width:100%;background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff;border:none;border-radius:14px;padding:15px;font-size:1.1rem;font-weight:800;cursor:pointer;font-family:inherit;margin-top:12px;text-align:center;text-decoration:none}
.btn:active{transform:translateY(1px)}
.btn.soft{background:#e0e7ff;color:#3730a3}
.say{float:right;background:#eff6ff;color:#1d4ed8;border:none;border-radius:10px;padding:6px 11px;font-size:.95rem;font-weight:800;cursor:pointer}
.recap{list-style:none;margin:10px 0 0}
.recap li{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:10px 13px;margin-bottom:8px;font-size:.98rem}
.badge{text-align:center;font-size:1.1rem;font-weight:900;color:#1e40af;margin:10px 0}
@media(max-width:600px){.wrap{padding:10px}.card{padding:16px}.txt{font-size:1.05rem}.hero h1{font-size:1.3rem}}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← Accueil</a>
  <div class="prog"><div class="label" id="proglabel"></div><div class="track"><i id="progbar"></i></div></div>
  <div id="scene"></div>
</div>
<script>
(function(){
  var scene=document.getElementById('scene');
  var idx=0;
  function speak(t){ try{ if(!('speechSynthesis' in window))return; speechSynthesis.cancel(); var u=new SpeechSynthesisUtterance(String(t).replace(/<[^>]+>/g,'')); u.lang='fr-FR'; u.rate=0.95; speechSynthesis.speak(u);}catch(e){} }
  function go(i){ idx=i; try{speechSynthesis.cancel();}catch(e){} render(); }
  function progress(){ document.getElementById('progbar').style.width=Math.round(idx/(STEPS.length-1)*100)+'%'; document.getElementById('proglabel').textContent='Étape '+(idx+1)+' / '+STEPS.length; }
  function continueBtn(label){ var b=document.createElement('button'); b.className='btn'; b.textContent=label||'Continuer →'; b.onclick=function(){ go(idx+1); }; return b; }

  var STEPS=[
    { type:'intro', text:"Chaque jour, on reçoit des infos : une rumeur, une publicité, un message, l’avis des copains. Mais tout n’est pas vrai ! Vous allez apprendre à <strong>vérifier avant de croire</strong> — et à <strong>penser par vous-même</strong>." },

    { type:'chain', title:"📣 La rumeur qui se déforme",
      intro:"Regardez ce qui arrive à une info quand elle passe de personne en personne. Cliquez pour la faire avancer.",
      links:[
        {ct:"Ce qui s’est vraiment passé",cm:"Sami a eu 12 au contrôle de maths.",cls:"start"},
        {ct:"Un élève répète",cm:"Il paraît que Sami a eu une note bizarre…"},
        {ct:"Un autre répète",cm:"On dit que Sami a été aidé pendant le contrôle…"},
        {ct:"À la fin de la journée",cm:"Tout le monde dit que Sami a triché !",cls:"end"}
      ],
      next:"→ Quelqu’un le répète",
      concl:"Au départ, c’était vrai. À l’arrivée, c’est <strong>faux</strong>. Une rumeur se déforme à chaque bouche : voilà pourquoi il faut <strong>vérifier</strong>." },

    { type:'notion',
      teach:"Une <strong>info</strong>, on peut la <strong>vérifier</strong> (une preuve, une source sûre). Une <strong>rumeur</strong>, c’est ce que les gens <strong>répètent sans preuve</strong>.",
      q:"Une rumeur, c’est…",
      options:[
        {l:"une information déjà vérifiée",ok:false},
        {l:"ce que les gens répètent sans preuve",ok:true},
        {l:"toujours vrai si tout le monde le dit",ok:false}
      ],
      wrong:"Pas tout à fait. Une rumeur n’a pas de preuve : ce n’est pas parce que beaucoup la répètent qu’elle est vraie.",
      good:"Exactement. Sans preuve, ce n’est qu’une rumeur — même si tout le monde la répète." },

    { type:'cases',
      teach:"Le réflexe de l’enquêteur : avant de croire, je me demande <strong>« Qui le dit ? »</strong> et <strong>« Y a-t-il une preuve ? »</strong>.",
      q:"Mène l’enquête. Quel est le bon réflexe ?",
      items:[
        { text:"Un copain vous dit : « Il paraît que le contrôle de demain est annulé. »",
          options:[
            {l:"Je vérifie auprès du professeur",good:true,fb:"Bon réflexe : vous allez à la source sûre avant de croire."},
            {l:"Je le répète à toute la classe",good:false,fb:"Vous propagez une info non vérifiée : c’est ainsi que naissent les rumeurs."},
            {l:"Je décide que c’est sûrement vrai",good:false,fb:"« Il paraît » n’est pas une preuve."}
          ] },
        { text:"Une publicité affiche : « Maigrissez en 7 jours, sans aucun effort ! »",
          options:[
            {l:"Je me méfie : c’est trop beau, et une pub cherche à vendre",good:true,fb:"Exact : quand c’est trop beau et que ça veut vendre, on se méfie."},
            {l:"Je commande tout de suite",good:false,fb:"Une promesse trop belle est presque toujours fausse."},
            {l:"Je partage à mes amis",good:false,fb:"Partager sans vérifier, c’est répandre l’intox."}
          ] },
        { text:"Un message reçu : « Partage ce message à 10 personnes, sinon il t’arrivera malheur ! »",
          options:[
            {l:"Je ne partage pas : c’est une chaîne, sans aucune preuve",good:true,fb:"Bravo : une menace dans un message en chaîne, c’est du vent."},
            {l:"Je partage, au cas où",good:false,fb:"La peur n’est pas une preuve. Ces chaînes sont fausses."}
          ] }
      ] },

    { type:'choice',
      text:"Dans votre groupe, tout le monde dit qu’un nouvel élève est « bizarre » et personne ne lui parle. Et vous ?",
      options:[
        {l:"Je me fais MON propre avis : je vais lui parler d’abord",good:true,fb:"C’est ça, penser par soi-même : vous jugez après avoir vérifié, pas en suivant le groupe."},
        {l:"Je fais comme les autres, je l’évite",good:false,fb:"Suivre le groupe sans réfléchir, c’est juger sans savoir."},
        {l:"Je répète aux autres qu’il est bizarre",good:false,fb:"Vous propagez un jugement non vérifié : une rumeur de plus."}
      ] },

    { type:'perso',
      text:"À vous. Pensez à une information qu’on vous a racontée récemment. <strong>Comment pourriez-vous vérifier</strong> si elle est vraie ? <strong>Qui</strong> pourrait vous le confirmer ?",
      note:"Répondez dans votre tête, à l’oral (🔊) ou en une phrase. Il n’y a pas de mauvaise réponse." },

    { type:'bilan',
      recap:[
        "🔍 Avant de croire, je me demande : <strong>qui le dit ?</strong> et <strong>y a-t-il une preuve ?</strong>",
        "📣 Une rumeur se déforme et n’est <strong>pas une preuve</strong>, même si tout le monde la répète.",
        "🧠 Je me fais <strong>mon propre avis</strong> ; je ne suis pas le groupe sans réfléchir."
      ] }
  ];

  function render(){
    var s=STEPS[idx]; progress(); window.scrollTo({top:0,behavior:'smooth'});

    if(s.type==='intro'){
      scene.innerHTML='<div class="hero"><span class="ic">🔍</span><h1>Vrai, ou juste une rumeur ?</h1><p>Compétence C1.2 · Santé publique France 2025</p></div><div class="card"><p class="txt">'+s.text+'</p></div>';
      var b=document.createElement('button'); b.className='btn'; b.textContent='▶️ Commencer l’enquête'; b.onclick=function(){ go(idx+1); }; scene.querySelector('.card').appendChild(b); return;
    }

    if(s.type==='chain'){
      scene.innerHTML='<div class="card"><button class="say">🔊 Écouter</button><div class="q">'+s.title+'</div><p class="txt" style="font-weight:600;font-size:1rem">'+s.intro+'</p><div id="ch"></div><div class="fb"></div></div>';
      scene.querySelector('.say').onclick=function(){ speak(s.intro); };
      var ch=scene.querySelector('#ch'), fb=scene.querySelector('.fb'), n=0;
      function addLink(){
        var l=s.links[n];
        var d=document.createElement('div'); d.className='link '+(l.cls||''); d.innerHTML='<div class="ct">'+l.ct+'</div><div class="cm">« '+l.cm+' »</div>';
        ch.appendChild(d); n++;
        fb.innerHTML='';
        if(n<s.links.length){ var b=document.createElement('button'); b.className='btn'; b.textContent=s.next; b.onclick=addLink; fb.appendChild(b); }
        else { fb.innerHTML='<div class="msg bad">'+s.concl+'</div>'; fb.appendChild(continueBtn()); }
      }
      addLink();
      return;
    }

    if(s.type==='notion'){
      scene.innerHTML='<div class="card"><button class="say">🔊 Écouter</button><div class="teach">'+s.teach+'</div><div class="q">'+s.q+'</div><div class="opts"></div><div class="fb"></div></div>';
      scene.querySelector('.say').onclick=function(){ speak(s.teach+' '+s.q); };
      var opts=scene.querySelector('.opts'), fb=scene.querySelector('.fb'), done=false;
      s.options.forEach(function(o){
        var b=document.createElement('button'); b.className='opt'; b.textContent=o.l;
        b.onclick=function(){
          if(done)return;
          if(o.ok){ done=true; opts.querySelectorAll('.opt').forEach(function(x){x.disabled=true;}); b.classList.add('ok'); fb.innerHTML='<div class="msg good">✓ '+s.good+'</div>'; fb.appendChild(continueBtn()); }
          else { b.classList.add('no'); b.disabled=true; fb.innerHTML='<div class="msg bad">💡 '+s.wrong+' <strong>Réessayez.</strong></div>'; }
        };
        opts.appendChild(b);
      });
      return;
    }

    if(s.type==='cases'){
      var j=0;
      scene.innerHTML='<div class="card"><button class="say">🔊 Écouter</button><div class="teach">'+s.teach+'</div><div class="q">'+s.q+'</div><div id="cs"></div></div>';
      scene.querySelector('.say').onclick=function(){ speak(s.teach); };
      var area=scene.querySelector('#cs');
      function drawCase(){
        var it=s.items[j];
        area.innerHTML='<p class="txt">'+it.text+'</p><div class="opts"></div><div class="fb"></div>';
        var opts=area.querySelector('.opts'), fb=area.querySelector('.fb'), picked=false;
        it.options.forEach(function(o){
          var b=document.createElement('button'); b.className='opt'; b.textContent=o.l;
          b.onclick=function(){
            if(picked)return; picked=true;
            opts.querySelectorAll('.opt').forEach(function(x){x.disabled=true;});
            b.classList.add(o.good?'ok':'no');
            fb.innerHTML='<div class="msg '+(o.good?'good':'bad')+'">'+(o.good?'✓ ':'💡 ')+o.fb+'</div>';
            var nb=document.createElement('button'); nb.className='btn'; nb.textContent=(j>=s.items.length-1)?'Continuer →':'Cas suivant →';
            nb.onclick=function(){ if(j>=s.items.length-1){ go(idx+1); } else { j++; drawCase(); } };
            fb.appendChild(nb);
          };
          opts.appendChild(b);
        });
      }
      drawCase();
      return;
    }

    if(s.type==='choice'){
      scene.innerHTML='<div class="card"><button class="say">🔊 Écouter</button><p class="txt">'+s.text+'</p><div class="opts"></div><div class="fb"></div></div>';
      scene.querySelector('.say').onclick=function(){ speak(s.text); };
      var opts=scene.querySelector('.opts'), fb=scene.querySelector('.fb'), picked=false;
      s.options.forEach(function(o){
        var b=document.createElement('button'); b.className='opt'; b.textContent=o.l;
        b.onclick=function(){
          if(picked)return; picked=true;
          opts.querySelectorAll('.opt').forEach(function(x){x.disabled=true;});
          b.classList.add(o.good?'ok':'no');
          fb.innerHTML='<div class="msg '+(o.good?'good':'bad')+'">'+(o.good?'✓ ':'💡 ')+o.fb+'</div>';
          fb.appendChild(continueBtn());
        };
        opts.appendChild(b);
      });
      return;
    }

    if(s.type==='perso'){
      scene.innerHTML='<div class="card"><button class="say">🔊 Écouter</button><p class="txt">'+s.text+'</p><div class="msg" style="background:#eff6ff;border:2px solid #bfdbfe;color:#1e40af">'+s.note+'</div></div>';
      scene.querySelector('.say').onclick=function(){ speak(s.text); };
      var b=document.createElement('button'); b.className='btn'; b.textContent="J’y ai réfléchi →"; b.onclick=function(){ go(idx+1); }; scene.querySelector('.card').appendChild(b); return;
    }

    if(s.type==='bilan'){
      var h='<div class="hero"><span class="ic">🕵️</span><h1>Enquête réussie !</h1><p>Vous savez vérifier avant de croire.</p></div><div class="card"><div class="badge">🔍 Bon réflexe d’enquêteur</div><p class="txt" style="font-size:1rem;font-weight:800;color:#1e40af">Ce que vous avez appris :</p><ul class="recap">';
      s.recap.forEach(function(r){ h+='<li>'+r+'</li>'; });
      h+='</ul></div>';
      scene.innerHTML=h;
      var c=scene.querySelector('.card');
      var rb=document.createElement('button'); rb.className='btn'; rb.textContent='🔄 Recommencer'; rb.onclick=function(){ go(0); }; c.appendChild(rb);
      var hb=document.createElement('a'); hb.className='btn soft'; hb.href='index.html'; hb.textContent='← Retour à l’accueil'; c.appendChild(hb);
      return;
    }
  }
  render();
})();
</script>
</body>
</html>
